<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard - Wycombe Abbey Economics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz-styles.css">
<style>
.t-login{max-width:380px;margin:6rem auto;background:rgba(26,39,68,.6);border:1px solid var(--bdr);border-radius:12px;padding:2.2rem}
.t-login h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:.3rem}
.t-login .sub{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);opacity:.5;margin-bottom:1.2rem}
.t-input{width:100%;padding:.65rem .8rem;margin-bottom:.7rem;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:6px;color:#fff;font-family:Nunito,sans-serif;font-size:.9rem;outline:none}
.t-input:focus{border-color:var(--blue)}
.t-err{font-size:.78rem;color:var(--red);margin-bottom:.6rem;min-height:1.2em}

.tabs{display:flex;gap:.3rem;margin-bottom:1.2rem;border-bottom:1px solid var(--bdr);padding-bottom:.5rem;flex-wrap:wrap}
.tab{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.45rem .9rem;border-radius:4px 4px 0 0;cursor:pointer;color:var(--mut);background:transparent;border:1px solid transparent;border-bottom:none;transition:all .15s}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.tab.active{color:var(--goldl);border-color:var(--bdr);background:rgba(26,39,68,.6)}
.panel{display:none}.panel.active{display:block}

/* SCORES TABLE */
.scores-controls{display:flex;gap:.6rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.scores-controls select,.scores-controls input{font-family:'IBM Plex Mono',monospace;font-size:.7rem;padding:.4rem .6rem;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);outline:none}
.scores-wrap{overflow-x:auto;margin-bottom:1.5rem}
table.scores{border-collapse:collapse;font-size:.72rem;width:100%;min-width:600px}
table.scores th{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);padding:.4rem .3rem;text-align:center;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--navyd);white-space:nowrap}
table.scores th:first-child{text-align:left;min-width:120px}
table.scores td{padding:.35rem .3rem;text-align:center;border-bottom:1px solid rgba(46,63,96,.3);font-family:'IBM Plex Mono',monospace;font-size:.65rem}
table.scores td:first-child{text-align:left;font-family:Nunito,sans-serif;font-size:.78rem;font-weight:600}
table.scores tr:hover td{background:rgba(255,255,255,.03)}
.cell-g{color:var(--green);font-weight:700}.cell-a{color:var(--goldl);font-weight:600}.cell-r{color:var(--red)}.cell-e{color:var(--mut);opacity:.2}
.student-class{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--bluel);opacity:.7;margin-left:.3rem}

/* ADMIN */
.admin-section{margin-bottom:2rem}
.admin-section h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin-bottom:.6rem}
.add-form{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:flex-end}
.add-form div{display:flex;flex-direction:column;gap:.2rem}
.add-form label{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);opacity:.55}
.add-form input,.add-form select{font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:.45rem .6rem;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);outline:none;min-width:100px}
.student-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.5rem}
.scard{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.65rem .85rem;display:flex;justify-content:space-between;align-items:center}
.scard-info{flex:1}
.scard-name{font-size:.85rem;font-weight:600}
.scard-user{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--bluel)}
.scard-class{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--mut);opacity:.6}
.scard-actions{display:flex;gap:.3rem}
.scard-btn{font-family:'IBM Plex Mono',monospace;font-size:.5rem;padding:.25rem .5rem;border-radius:3px;cursor:pointer;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--mut);transition:all .15s}
.scard-btn:hover{color:var(--txt);background:rgba(255,255,255,.08)}
.scard-btn.del:hover{color:var(--red);border-color:var(--red)}
.new-student-result{background:rgba(76,175,128,.08);border:1px solid rgba(76,175,128,.3);border-radius:8px;padding:.8rem 1rem;margin-bottom:1rem;display:none}
.new-student-result code{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--goldl);background:rgba(0,0,0,.2);padding:.15rem .4rem;border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="hl">
    <img class="hlogo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Wycombe_Abbey_Lozenge_Grey_on_Blue_for_Wikipedia_19.02.20_KL.jpg" alt="WA" onerror="this.style.display='none'">
    <div>
      <div class="htit">Teacher Dashboard</div>
      <div class="hsub">A-Level Economics &middot; Student Tracking</div>
    </div>
  </div>
  <div class="hnav">
    <a href="micro-quiz.html" class="hbtn">Paper 1</a>
    <a href="macro-quiz.html" class="hbtn">Paper 2</a>
  </div>
</header>

<div class="app" id="root">
  <!-- Login form (shown initially) -->
  <div id="teacher-login" class="t-login">
    <h2>Teacher Access</h2>
    <div class="sub">Enter your teaching password</div>
    <input id="t-pass" type="password" class="t-input" placeholder="Password" autofocus>
    <div id="t-err" class="t-err"></div>
    <button class="btn b-blue" onclick="teacherLogin()" style="width:100%">Enter</button>
  </div>

  <!-- Dashboard (hidden until authenticated) -->
  <div id="teacher-dash" style="display:none">
    <div class="tabs">
      <div class="tab active" data-tab="scores" onclick="switchTab('scores')">Scores Overview</div>
      <div class="tab" data-tab="admin" onclick="switchTab('admin')">Manage Students</div>
    </div>

    <!-- Scores Panel -->
    <div id="panel-scores" class="panel active">
      <div class="scores-controls">
        <select id="class-filter" onchange="renderScores()">
          <option value="all">All classes</option>
        </select>
        <select id="paper-filter" onchange="renderScores()">
          <option value="all">All papers</option>
          <option value="micro">Paper 1 (Micro)</option>
          <option value="macro">Paper 2 (Macro)</option>
        </select>
      </div>
      <div id="scores-table" class="scores-wrap"></div>
    </div>

    <!-- Admin Panel -->
    <div id="panel-admin" class="panel">
      <div class="admin-section">
        <h3>Add Student</h3>
        <div class="add-form">
          <div><label>First name</label><input id="add-name" type="text" placeholder="e.g. Amelia"></div>
          <div><label>Class</label>
            <select id="add-class">
              <option value="U6-B">U6-B</option>
              <option value="L6-B">L6-B</option>
            </select>
          </div>
          <button class="btn b-blue" onclick="addStudent()" style="padding:.45rem .9rem;align-self:flex-end">Generate &amp; Add</button>
        </div>
        <div id="new-result" class="new-student-result"></div>
      </div>

      <div class="admin-section">
        <h3>Current Students</h3>
        <div class="scores-controls" style="margin-bottom:.6rem">
          <select id="admin-class-filter" onchange="renderStudentList()">
            <option value="all">All classes</option>
          </select>
        </div>
        <div id="student-list" class="student-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="quiz-data.js"></script>
<script src="tracker.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
var TEACHER_PASS = '';
var DATA = { students: [], attempts: [] };

// ═══════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════
document.getElementById('t-pass').addEventListener('keydown', function(e){
  if (e.key === 'Enter') teacherLogin();
});

async function teacherLogin() {
  var pw = document.getElementById('t-pass').value;
  var errDiv = document.getElementById('t-err');
  if (!pw) { errDiv.textContent = 'Please enter a password'; return; }

  var sb = getSupabase();
  if (!sb) { errDiv.textContent = 'Tracker not configured - check SUPABASE_URL in tracker.js'; return; }

  var { data, error } = await sb.rpc('teacher_login', { p_password: pw });
  if (error || !data) {
    errDiv.textContent = 'Invalid password';
    return;
  }

  TEACHER_PASS = pw;
  document.getElementById('teacher-login').style.display = 'none';
  document.getElementById('teacher-dash').style.display = 'block';
  await loadData();
}

async function loadData() {
  var sb = getSupabase();
  var { data } = await sb.rpc('get_teacher_data', { p_password: TEACHER_PASS });
  if (data) {
    DATA = data;
    populateClassFilters();
    renderScores();
    renderStudentList();
  }
}

// ═══════════════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.panel').forEach(function(p){
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
}

// ═══════════════════════════════════════════════════════════════
//  CLASS FILTERS
// ═══════════════════════════════════════════════════════════════
function populateClassFilters() {
  var classes = [];
  DATA.students.forEach(function(s) {
    if (classes.indexOf(s.class_set) === -1) classes.push(s.class_set);
  });
  classes.sort();

  ['class-filter', 'admin-class-filter'].forEach(function(id) {
    var sel = document.getElementById(id);
    // Keep "All" option, add rest
    while (sel.options.length > 1) sel.remove(1);
    classes.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  });

  // Also update the add-class dropdown
  var addSel = document.getElementById('add-class');
  addSel.innerHTML = '';
  classes.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    addSel.appendChild(opt);
  });
  // Add "Other" option for new classes
  var otherOpt = document.createElement('option');
  otherOpt.value = '__other'; otherOpt.textContent = '+ New class...';
  addSel.appendChild(otherOpt);
}

// ═══════════════════════════════════════════════════════════════
//  SCORES TABLE
// ═══════════════════════════════════════════════════════════════
function renderScores() {
  var classFilter = document.getElementById('class-filter').value;
  var paperFilter = document.getElementById('paper-filter').value;

  // Filter students
  var students = DATA.students.filter(function(s) {
    return classFilter === 'all' || s.class_set === classFilter;
  });

  // Get quiz list (filtered by paper)
  var quizIds = Object.keys(QUIZZES).filter(function(qid) {
    if (paperFilter === 'all') return true;
    return QUIZZES[qid].paper === paperFilter;
  });

  // Build best-score map: profileId -> { quizId -> bestPct }
  var bestMap = {};
  DATA.attempts.forEach(function(a) {
    if (!bestMap[a.profile_id]) bestMap[a.profile_id] = {};
    var pct = Math.round(a.score / a.max_score * 100);
    if (!bestMap[a.profile_id][a.quiz_id] || pct > bestMap[a.profile_id][a.quiz_id]) {
      bestMap[a.profile_id][a.quiz_id] = pct;
    }
  });

  // Build table
  var html = '<table class="scores"><thead><tr><th>Student</th>';
  quizIds.forEach(function(qid) {
    // Abbreviate title
    var title = QUIZZES[qid].title;
    if (title.length > 18) title = title.substring(0, 16) + '...';
    html += '<th title="' + QUIZZES[qid].title + '">' + title + '</th>';
  });
  html += '<th>Avg</th></tr></thead><tbody>';

  students.forEach(function(s) {
    html += '<tr><td>' + escHtml(s.display_name) + '<span class="student-class">' + escHtml(s.class_set) + '</span></td>';
    var sum = 0, count = 0;
    quizIds.forEach(function(qid) {
      var best = bestMap[s.id] && bestMap[s.id][qid];
      if (typeof best === 'number') {
        var cls = best >= 70 ? 'cell-g' : best >= 40 ? 'cell-a' : 'cell-r';
        html += '<td class="' + cls + '">' + best + '</td>';
        sum += best; count++;
      } else {
        html += '<td class="cell-e">&middot;</td>';
      }
    });
    var avg = count > 0 ? Math.round(sum / count) : '';
    var avgCls = avg >= 70 ? 'cell-g' : avg >= 40 ? 'cell-a' : avg ? 'cell-r' : 'cell-e';
    html += '<td class="' + avgCls + '" style="font-weight:700;border-left:1px solid var(--bdr)">' + (avg || '&middot;') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';

  if (students.length === 0) {
    html = '<div style="text-align:center;padding:2rem;color:var(--mut);opacity:.5">No students found. Add students in the Manage Students tab.</div>';
  }

  document.getElementById('scores-table').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  STUDENT MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function renderStudentList() {
  var classFilter = document.getElementById('admin-class-filter').value;
  var students = DATA.students.filter(function(s) {
    return classFilter === 'all' || s.class_set === classFilter;
  });

  if (students.length === 0) {
    document.getElementById('student-list').innerHTML =
      '<div style="color:var(--mut);opacity:.5;padding:1rem">No students yet. Use the form above to add students.</div>';
    return;
  }

  var html = '';
  students.forEach(function(s) {
    html += '<div class="scard">'
      + '<div class="scard-info">'
      + '<div class="scard-name">' + escHtml(s.display_name) + '</div>'
      + '<div class="scard-user">' + escHtml(s.username) + '</div>'
      + '<div class="scard-class">' + escHtml(s.class_set) + '</div>'
      + '</div>'
      + '<div class="scard-actions">'
      + '<button class="scard-btn" onclick="resetStudentPin(' + s.id + ',\'' + escHtml(s.display_name) + '\')">Reset PIN</button>'
      + '<button class="scard-btn del" onclick="deleteStudent(' + s.id + ',\'' + escHtml(s.display_name) + '\')">Remove</button>'
      + '</div></div>';
  });
  document.getElementById('student-list').innerHTML = html;
}

async function addStudent() {
  var name = document.getElementById('add-name').value.trim();
  var classSel = document.getElementById('add-class');
  var classSet = classSel.value;

  if (classSet === '__other') {
    classSet = prompt('Enter new class name (e.g. U6-A):');
    if (!classSet) return;
  }
  if (!name) { alert('Please enter a first name'); return; }

  var username = generateUsername();
  var pin = generatePin();

  var sb = getSupabase();
  var { data } = await sb.rpc('create_student', {
    p_password: TEACHER_PASS,
    p_username: username,
    p_pin: pin,
    p_display_name: name,
    p_class_set: classSet
  });

  if (data && data.error) {
    alert(data.error);
    return;
  }

  if (data) {
    var resultDiv = document.getElementById('new-result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML =
      '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:.4rem">Student Created</div>'
      + '<div style="font-size:.9rem;margin-bottom:.3rem"><strong>' + escHtml(name) + '</strong> &middot; ' + escHtml(classSet) + '</div>'
      + '<div style="font-size:.85rem">Username: <code>' + escHtml(username) + '</code></div>'
      + '<div style="font-size:.85rem">PIN: <code>' + escHtml(pin) + '</code></div>'
      + '<div style="font-size:.7rem;color:var(--mut);opacity:.5;margin-top:.4rem">Note this PIN down - it cannot be viewed again (only reset).</div>';

    document.getElementById('add-name').value = '';
    await loadData();
  }
}

async function deleteStudent(id, name) {
  if (!confirm('Remove ' + name + '? This will delete all their quiz attempts too.')) return;

  var sb = getSupabase();
  await sb.rpc('delete_student', { p_password: TEACHER_PASS, p_profile_id: id });
  await loadData();
}

async function resetStudentPin(id, name) {
  var newPin = generatePin();
  if (!confirm('Reset PIN for ' + name + '?\n\nNew PIN will be: ' + newPin)) return;

  var sb = getSupabase();
  await sb.rpc('reset_pin', { p_password: TEACHER_PASS, p_profile_id: id, p_new_pin: newPin });
  alert('PIN for ' + name + ' reset to: ' + newPin);
}
</script>
</body>
</html>
