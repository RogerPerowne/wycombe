<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wa-root" content="">
<title>Quiz - Wycombe Abbey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/quiz.css">
</head>
<body>
<!-- Script load order matters:
     1. Supabase CDN     — provides window.supabase
     2. quiz-data.js     — provides QUIZZES, THEMES
     3. quiz-engine.js   — provides bootQuiz(), references WA (set by auth.js)
     4. config.js        — provides SUPABASE_URL, SUPABASE_ANON_KEY
     5. db/client.js     — provides getSupabase()
     6. db/auth.js       — provides window.WA, showLoginModal(), etc.; auto-inits header
     7. db/attempts.js   — provides saveQuizResult() called via WA.saveScore()
     By the time a quiz finishes and WA.saveScore() is called, all scripts are loaded. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="quiz-data.js"></script>
<script src="quiz-engine.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/db/client.js"></script>
<script src="assets/js/db/auth.js"></script>
<script src="assets/js/db/attempts.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  Universal Quiz Runner
// ───────────────────────────────────────────────────────────────
//  Reads ?topic=XYZ from the URL, looks up question data in the
//  QUIZZES object (defined in quiz-data.js), then boots the quiz
//  engine. To add a new topic, just add an entry to quiz-data.js
//  — no new HTML file needed.
// ═══════════════════════════════════════════════════════════════

(function(){
  var params  = new URLSearchParams(window.location.search);
  var topicId = params.get('topic');

  if (!topicId || !QUIZZES[topicId]) {
    document.body.innerHTML =
      '<div style="max-width:640px;margin:80px auto;padding:32px;'
      +'background:#1a2744;border:1px solid #2e3f60;border-radius:12px;'
      +'color:#fff;font-family:Nunito,sans-serif;text-align:center">'
      +'<h1 style="font-family:Cormorant Garamond,serif;color:#c9a84c;'
      +'margin-bottom:16px">Quiz not found</h1>'
      +'<p style="color:#c8d4ee;margin-bottom:24px">'
      +(topicId
        ? 'No quiz exists yet for topic <strong>'+topicId+'</strong>.'
        : 'No topic was specified in the URL.')
      +'</p>'
      +'<p style="margin-bottom:24px">'
      +'<a href="micro-quiz.html" '
      +'style="color:#c9a84c;text-decoration:none;border:1px solid #c9a84c;'
      +'padding:10px 20px;border-radius:6px;display:inline-block;margin-right:8px">'
      +'&larr; Micro hub</a>'
      +'<a href="macro-quiz.html" '
      +'style="color:#c9a84c;text-decoration:none;border:1px solid #c9a84c;'
      +'padding:10px 20px;border-radius:6px;display:inline-block">'
      +'&larr; Macro hub</a></p>'
      +'</div>';
    return;
  }

  var quiz = QUIZZES[topicId];
  quiz.questions.forEach(function(q, i){ q.n = i + 1; });

  var hubUrl = (quiz.paper === 'macro') ? 'macro-quiz.html' : 'micro-quiz.html';
  document.title = quiz.title + ' - Wycombe Abbey';

  bootQuiz(quiz.questions, {
    id:       topicId,
    title:    quiz.title,
    subtitle: quiz.subtitle,
    badge:    quiz.badge,
    hubUrl:   hubUrl,
    homeUrl:  'index.html'
  });
})();
</script>
</body>
</html>
