<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cartel Room — Wycombe Abbey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navyd:#0f1729;--gold:#c9a84c;--goldl:#e2c47a;--green:#4caf80;--red:#e05060;--orange:#e0933a;--blue:#4a7fb5;--bluel:#6fa8d8;--purple:#9775b5;--crim:#b03040;--criml:#d44455;--txt:#fff;--mut:#dde3f0;--bdr:#2e3f60;--pan:#1e2e4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navyd);color:var(--txt);font-family:'Nunito','Segoe UI',sans-serif;font-size:16px;min-height:100vh}
header{background:linear-gradient(135deg,var(--navyd),var(--navy) 60%,#1e3060);border-bottom:2px solid var(--gold);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hl{display:flex;align-items:center;gap:.9rem}
.hlogo{height:48px;width:48px;object-fit:contain;border-radius:4px}
.hsch{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:var(--goldl);line-height:1.2}
.htit{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:700;color:var(--txt)}
.hsub{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.7}
.hbdg{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.09em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);padding:.24rem .78rem;border-radius:3px;background:rgba(201,168,76,.08)}
.hnav{display:flex;align-items:center;gap:.6rem}
.hbtn{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);padding:.28rem .72rem;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block}
.hbtn:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.app{max-width:1060px;margin:0 auto;padding:1.4rem 1.8rem}
@media(max-width:650px){header{padding:0 1rem;height:64px}.htit{font-size:1rem}.hbdg{display:none}.app{padding:1rem}}

/* HUB */
.hub-hero{text-align:center;padding:2.2rem 1rem 1.2rem}
.hub-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;opacity:.85}
.hub-hero h1{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;line-height:1.1;margin-bottom:.35rem;color:var(--txt)}
.hub-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--goldl);margin-bottom:.9rem}
.hub-intro{font-size:.9rem;color:var(--mut);max-width:640px;margin:0 auto 1.2rem;line-height:1.8;opacity:.88}

/* MARKET STATS */
.mkt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.7rem;margin-bottom:1.4rem}
.mkt-stat{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.85rem 1rem;text-align:center}
.mkt-stat-num{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--goldl);line-height:1;margin-bottom:.18rem}
.mkt-stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.55}
.mkt-stat-sub{font-size:.7rem;color:var(--mut);opacity:.5;margin-top:.25rem;line-height:1.4}

/* MATRIX */
.matrix-wrap{background:rgba(26,39,68,.6);border:1px solid var(--bdr);border-radius:12px;padding:1.4rem;margin-bottom:1.4rem}
.matrix-title{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;opacity:.85}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;max-width:580px;margin:0 auto}
.mx{border-radius:6px;padding:.8rem .7rem;text-align:center;font-size:.8rem}
.mx-corner{background:transparent}
.mx-head{background:rgba(255,255,255,.05);font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);display:flex;align-items:center;justify-content:center;padding:.65rem .5rem;text-align:center;line-height:1.4}
.mx-head.your-head{color:var(--goldl)}
.mx-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;min-height:80px;border:1px solid var(--bdr);border-radius:6px}
.mx-cell.good{background:rgba(76,175,128,.12);border-color:rgba(76,175,128,.35)}
.mx-cell.bad{background:rgba(224,80,96,.1);border-color:rgba(224,80,96,.3)}
.mx-cell.nash{background:rgba(224,147,58,.1);border-color:rgba(224,147,58,.35)}
.mx-cell.great{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4)}
.mx-profit{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;line-height:1}
.mx-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.06em;text-transform:uppercase;opacity:.7}
.mx-cell.good .mx-profit{color:var(--green)}
.mx-cell.bad .mx-profit{color:var(--red)}
.mx-cell.nash .mx-profit{color:var(--orange)}
.mx-cell.great .mx-profit{color:var(--goldl)}
.matrix-note{font-size:.76rem;color:var(--mut);opacity:.65;text-align:center;margin-top:.8rem;line-height:1.6;font-style:italic}

/* FIRMS */
.firms-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:.8rem;margin-bottom:1.4rem}
.firm-card{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:.95rem 1.1rem;position:relative;overflow:hidden}
.firm-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--fc,var(--bdr))}
.firm-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;margin-bottom:.2rem;color:var(--txt)}
.firm-strategy{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.07em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;opacity:.8}
.firm-desc{font-size:.75rem;color:var(--mut);line-height:1.6;opacity:.8}
.firm-reliability{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;margin-top:.5rem;padding:.18rem .45rem;border-radius:3px;display:inline-block}
.rel-high{background:rgba(76,175,128,.15);border:1px solid rgba(76,175,128,.3);color:var(--green)}
.rel-med{background:rgba(224,147,58,.12);border:1px solid rgba(224,147,58,.3);color:var(--orange)}
.rel-low{background:rgba(224,80,96,.12);border:1px solid rgba(224,80,96,.3);color:var(--red)}

.start-btn{display:block;margin:0 auto 2rem;padding:.9rem 2.8rem;background:linear-gradient(135deg,#a03035,var(--crim));border:none;border-radius:8px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(176,48,64,.35)}
.start-btn:hover{background:linear-gradient(135deg,var(--crim),var(--criml));transform:translateY(-2px);box-shadow:0 8px 28px rgba(176,48,64,.45)}

/* ROUND SCREEN */
.round-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.9rem 1.3rem;background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px 9px 0 0}
.round-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:.25rem;opacity:.85}
.round-title{font-family:'Cormorant Garamond',serif;font-size:1.32rem;font-weight:700;color:var(--txt)}
.round-scorebox{text-align:right;flex-shrink:0}
.round-score-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);opacity:.6}
.round-score-num{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--goldl)}
.round-progress{height:4px;background:var(--bdr);margin-bottom:1.1rem}
.round-pfill{height:100%;background:linear-gradient(90deg,var(--crim),var(--criml));transition:width .4s ease}
.scenario-box{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:0 0 9px 9px;padding:1.3rem;margin-bottom:1rem;font-size:.92rem;line-height:1.8;color:var(--txt)}

/* ALERTS */
.alert{border-radius:8px;padding:.85rem 1.1rem;margin-bottom:1rem;display:flex;gap:.75rem;align-items:flex-start}
.alert-cma{background:rgba(176,48,64,.12);border:1px solid rgba(176,48,64,.4)}
.alert-len{background:rgba(224,147,58,.1);border:1px solid rgba(224,147,58,.4)}
.alert-price{background:rgba(74,127,181,.1);border:1px solid rgba(74,127,181,.35)}
.alert-grim{background:rgba(224,80,96,.13);border:1px solid rgba(224,80,96,.45)}
.alert-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem}
.alert-body{font-size:.82rem;line-height:1.65;color:var(--mut)}
.alert-body strong{color:var(--txt)}
.alert-title{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem}
.alert-cma .alert-title{color:var(--crim)}
.alert-len .alert-title{color:var(--orange)}
.alert-price .alert-title{color:var(--bluel)}
.alert-grim .alert-title{color:var(--red)}

/* SIGNALS */
.section-label{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.55;margin-bottom:.6rem}
.signals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.65rem;margin-bottom:1.1rem}
.signal-card{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:8px;padding:.8rem 1rem;position:relative;overflow:hidden}
.signal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.signal-card.coop::before{background:var(--green)}
.signal-card.warn::before{background:var(--orange)}
.signal-card.host::before{background:var(--red)}
.signal-card.neut::before{background:var(--bdr)}
.signal-card.sil::before{background:var(--mut);opacity:.2}
.signal-firm{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.32rem}
.signal-card.coop .signal-firm{color:var(--green)}
.signal-card.warn .signal-firm{color:var(--orange)}
.signal-card.host .signal-firm{color:var(--red)}
.signal-card.neut .signal-firm,.signal-card.sil .signal-firm{color:var(--mut);opacity:.6}
.signal-quote{font-size:.8rem;font-style:italic;color:var(--mut);line-height:1.55;opacity:.88}
.signal-card.sil .signal-quote{opacity:.3}
.signal-badge{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.05em;text-transform:uppercase;padding:.12rem .38rem;border-radius:3px;display:inline-block;margin-top:.42rem}
.badge-public{background:rgba(74,127,181,.18);border:1px solid rgba(74,127,181,.4);color:var(--bluel)}
.badge-unrel{background:rgba(224,80,96,.12);border:1px solid rgba(224,80,96,.3);color:var(--red)}

/* MINI LEADERBOARD */
.mini-lb{background:rgba(26,39,68,.35);border:1px solid var(--bdr);border-radius:8px;padding:.8rem 1rem;margin-bottom:1rem}
.mini-lb-title{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);opacity:.55;margin-bottom:.6rem}
.mini-lb-rows{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.4rem}
.mlb-row{display:flex;align-items:center;gap:.55rem}
.mlb-name{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);width:90px;flex-shrink:0}
.mlb-name.you{color:var(--goldl)}
.mlb-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.mlb-fill{height:100%;border-radius:3px;transition:width .4s ease}
.mlb-val{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--mut);width:36px;text-align:right;flex-shrink:0}
.mlb-val.you{color:var(--goldl)}

/* CHOICE BUTTONS */
.choice-title{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.6;margin-bottom:.7rem;text-align:center}
.choice-btns{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.85rem;margin-bottom:1rem}
.choice-btn{border:2px solid;border-radius:10px;padding:1.1rem 1.2rem;cursor:pointer;transition:all .2s;text-align:left;background:transparent;width:100%;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.choice-btn:hover::before{opacity:1}
.coop-btn{border-color:rgba(76,175,128,.5)}.coop-btn::before{background:rgba(76,175,128,.07)}
.coop-btn:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 6px 20px rgba(76,175,128,.2)}
.def-btn{border-color:rgba(224,80,96,.5)}.def-btn::before{background:rgba(224,80,96,.07)}
.def-btn:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 6px 20px rgba(224,80,96,.2)}
.len-btn{border-color:rgba(224,147,58,.5)}.len-btn::before{background:rgba(224,147,58,.07)}
.len-btn:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 6px 20px rgba(224,147,58,.2)}
.cb-icon{font-size:1.5rem;margin-bottom:.45rem}
.cb-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem}
.coop-btn .cb-label{color:var(--green)}.def-btn .cb-label{color:var(--red)}.len-btn .cb-label{color:var(--orange)}
.cb-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;margin-bottom:.3rem;color:var(--txt)}
.cb-desc{font-size:.76rem;color:var(--mut);line-height:1.55;opacity:.82}

/* RESULT */
.result-table{width:100%;border-collapse:collapse;margin-bottom:1rem}
.result-table th{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);opacity:.6;text-align:left;padding:.5rem .8rem;border-bottom:1px solid var(--bdr)}
.result-table td{padding:.65rem .8rem;border-bottom:1px solid rgba(46,63,96,.45);font-size:.84rem;color:var(--mut)}
.result-table tr.player-row td{background:rgba(201,168,76,.05);color:var(--txt)}
.result-table tr.player-row .firm-col{font-weight:700;color:var(--goldl)}
.choice-pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.07em;text-transform:uppercase;padding:.16rem .52rem;border-radius:3px;font-weight:700}
.pill-c{background:rgba(76,175,128,.15);border:1px solid rgba(76,175,128,.4);color:var(--green)}
.pill-d{background:rgba(224,80,96,.12);border:1px solid rgba(224,80,96,.35);color:var(--red)}
.pill-w{background:rgba(224,147,58,.15);border:1px solid rgba(224,147,58,.4);color:var(--orange)}
.profit-col{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--mut)}
.profit-col.mine{color:var(--goldl)}
.sig-acc{font-family:'IBM Plex Mono',monospace;font-size:.56rem;padding:.12rem .4rem;border-radius:3px;margin-left:.4rem;white-space:nowrap}
.sig-ok{background:rgba(76,175,128,.12);color:var(--green)}
.sig-bad{background:rgba(224,80,96,.1);color:var(--red)}
.sig-na{background:rgba(46,63,96,.5);color:var(--mut);opacity:.5}

.round-summary-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:1.1rem 1.3rem;margin-bottom:1rem}
.rs-row{display:flex;justify-content:space-around;align-items:center;gap:.6rem;flex-wrap:wrap}
.rs-item{text-align:center}
.rs-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);opacity:.6;margin-bottom:.2rem}
.rs-val{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;color:var(--goldl)}

.econ-insight{background:rgba(74,127,181,.08);border:1px solid rgba(74,127,181,.28);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:1rem}
.ei-lbl{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bluel);margin-bottom:.5rem}
.ei-text{font-size:.82rem;line-height:1.72;color:var(--mut)}
.ei-text strong{color:var(--txt)}

.lb-bar-wrap{margin-bottom:.32rem}
.lb-firm-name{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.18rem;display:flex;justify-content:space-between}
.lb-firm-name span{color:var(--goldl)}
.lb-bar-track{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.lb-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}

/* BUTTONS */
.btn{padding:.75rem 1.2rem;border:none;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-weight:600}
.bg{background:linear-gradient(135deg,#a03035,var(--crim));color:#fff}
.bg:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(176,48,64,.4)}
.bs{background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--mut)}
.bs:hover{background:rgba(255,255,255,.12);color:var(--txt)}
.btn-row{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap;margin-top:.6rem}

/* SUMMARY */
.summary-hero{text-align:center;padding:2rem 1rem 1rem}
.summary-eye{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.summary-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;margin-bottom:.25rem;color:var(--txt)}
.summary-bignum{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:700;color:var(--goldl);line-height:1;margin:.4rem 0 .2rem}
.summary-sub{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--mut);opacity:.6;margin-bottom:.6rem}
.verdict-box{border-radius:10px;padding:1.2rem;margin:1rem 0;text-align:center}
.verdict-box.clear{background:rgba(76,175,128,.1);border:1px solid rgba(76,175,128,.35)}
.verdict-box.guilty{background:rgba(224,80,96,.1);border:1px solid rgba(224,80,96,.35)}
.verdict-box.immune{background:rgba(224,147,58,.1);border:1px solid rgba(224,147,58,.35)}
.verdict-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem}
.verdict-box.clear .verdict-label{color:var(--green)}
.verdict-box.guilty .verdict-label{color:var(--red)}
.verdict-box.immune .verdict-label{color:var(--orange)}
.verdict-text{font-size:.86rem;line-height:1.7;color:var(--mut)}
.verdict-text strong{color:var(--txt)}
.summary-stats{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap;margin:1rem auto;max-width:620px}
.ss-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.7rem .95rem;min-width:105px;text-align:center}
.ss-num{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;color:var(--goldl)}
.ss-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.7;margin-top:.15rem}
.round-history{display:flex;gap:.35rem;flex-wrap:wrap;justify-content:center;margin:.8rem 0}
.rh-pip{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:700;border:2px solid}
.rh-pip.c{background:rgba(76,175,128,.18);border-color:var(--green);color:var(--green)}
.rh-pip.d{background:rgba(224,80,96,.15);border-color:var(--red);color:var(--red)}
.rh-pip.w{background:rgba(224,147,58,.18);border-color:var(--orange);color:var(--orange)}
.welfare-box{background:rgba(176,48,64,.08);border:1px solid rgba(176,48,64,.3);border-radius:9px;padding:1.1rem;margin-bottom:1rem}
.welfare-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--criml);margin-bottom:.5rem}
.welfare-text{font-size:.82rem;line-height:1.7;color:var(--mut)}
.welfare-text strong{color:var(--txt)}

/* DEBRIEF */
.debrief-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:10px;padding:1.4rem;min-height:120px;font-size:.86rem;line-height:1.8;color:var(--mut)}
.debrief-loading{text-align:center;padding:2rem;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);opacity:.75}
.typing-dot{display:inline-block;animation:blink 1.2s infinite;margin-left:2px}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.debrief-box p{margin-bottom:.8rem}.debrief-box p:last-child{margin-bottom:0}
.debrief-box strong{color:var(--txt)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .32s ease both}
</style>
</head>
<body>
<header>
  <div class="hl">
    <img class="hlogo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Wycombe_Abbey_Lozenge_Grey_on_Blue_for_Wikipedia_19.02.20_KL.jpg" alt="WA" onerror="this.style.display='none'">
    <div>
      <div class="hsch">Wycombe Abbey</div>
      <div class="htit">The Cartel Room</div>
      <div class="hsub">A-Level &middot; Edexcel Paper 1 &middot; Oligopoly &amp; Game Theory</div>
    </div>
  </div>
  <div class="hnav">
    <a href="index.html" class="hbtn">&#8592; Home</a>
    <button class="hbtn" onclick="goHub()">&#8962; Hub</button>
    <span class="hbdg">Game Theory</span>
  </div>
</header>
<div class="app" id="root"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  ROUND DATA  (signals include a 'reliable' flag: how predictive is this tone)
//  signal.tone: coop / warn / host / neut / sil
//  signal.reliable: 0.0–1.0 (used retrospectively to assess if signal matched)
// ══════════════════════════════════════════════════════════════
var ROUNDS = [
  { n:1, title:"The Trade Association Dinner",
    scenario:"The four major fuel retailers along the M1–M6 corridor have competed fiercely on price for years. This month, a trade association dinner provides an unusual opportunity. Your sales director returns with a quiet message: the other CEOs are prepared to hold pump prices at 130p per litre. Together, you would all earn significantly more than in an open price war. The choice is yours.",
    signals:[
      {firm:"Apex Fuels",    tone:"coop", quote:"Stable conditions benefit everyone in this market.",                   reliable:0.82},
      {firm:"Crest Energy",  tone:"coop", quote:"A price war helps nobody. We are holding at 130p.",                   reliable:0.78},
      {firm:"Vantage Petrol",tone:"warn", quote:"We are watching the market closely this quarter.",                     reliable:0.38}
    ], special:null },

  { n:2, title:"The Price Leadership Signal",
    scenario:"Apex Fuels' CEO has given a widely-reported trade press interview stating the company will hold pump prices at 130p 'for the foreseeable future, as this accurately reflects our cost base.' This is a public, on-the-record commitment. Economists call this price leadership — a form of tacit collusion that signals the cartel price without requiring an explicit agreement. Unlike last month's quiet dinner conversation, a public statement is costly to reverse. Apex is almost certainly telling the truth.",
    signals:[
      {firm:"Apex Fuels",    tone:"coop", quote:"Our CEO's statement is on record. We are holding at 130p.",           reliable:0.96, badge:'public'},
      {firm:"Crest Energy",  tone:"coop", quote:"We see no reason to deviate from current market pricing.",            reliable:0.76},
      {firm:"Vantage Petrol",tone:"warn", quote:"Cost pressures are building. We are reviewing our position.",         reliable:0.35}
    ], special:'price_leader' },

  { n:3, title:"The Wobble",
    scenario:"Vantage Petroleum's Q2 results were poor and their CEO faces pressure from institutional investors. A contact in their procurement team hints they are 'reviewing pricing strategy.' Meanwhile, FastFuel — a regional newcomer — has opened three forecourts along the A14 at 112p, undercutting all four majors. The arrangement feels fragile.",
    signals:[
      {firm:"Apex Fuels",    tone:"coop", quote:"One bad quarter does not change the fundamentals. Hold the line.",    reliable:0.80},
      {firm:"Crest Energy",  tone:"coop", quote:"FastFuel will not survive at those margins. We sit tight.",           reliable:0.74},
      {firm:"Vantage Petrol",tone:"host", quote:"Our investors expect results. We will do what is necessary.",         reliable:0.40}
    ], special:null },

  { n:4, title:"The New Entrant",
    scenario:"FastFuel has secured two more site leases and is pricing at 112p, winning loyal customers along key feeder roads. Your strategy team flags two responses: match FastFuel's price to deter further entry — a limit pricing strategy — or maintain 130p and accept some volume loss. Apex's regional manager sends a message: 'Do we need a coordinated response?' All four firms are weighing their options.",
    signals:[
      {firm:"Apex Fuels",    tone:"warn", quote:"We may need a collective response to FastFuel's expansion.",          reliable:0.70},
      {firm:"Crest Energy",  tone:"coop", quote:"If we all cut to respond, we all sacrifice margins. Hold.",           reliable:0.72},
      {firm:"Vantage Petrol",tone:"host", quote:"FastFuel is eating our volumes. Something has to change this month.", reliable:0.42}
    ], special:'new_entrant' },

  { n:5, title:"The CMA Announces",
    scenario:"The Competition and Markets Authority has launched a formal inquiry into motorway fuel pricing, citing 'suspicious price uniformity across service station operators.' Investigators have requested two years of pricing records and internal email correspondence. Your legal team warns that communications referencing price coordination are now discoverable under the inquiry powers. The arrangement has become significantly more dangerous — but changing behaviour now could itself look suspicious.",
    signals:[
      {firm:"Apex Fuels",    tone:"neut", quote:"Our lawyers have instructed us to cease all non-commercial contact.", reliable:0.55},
      {firm:"Crest Energy",  tone:"neut", quote:"We are cooperating fully with the CMA. No comment on pricing.",      reliable:0.55},
      {firm:"Vantage Petrol",tone:"host", quote:"Every firm must now act entirely in its own best interests.",         reliable:0.65}
    ], special:'cma' },

  { n:6, title:"The Leniency Window",
    scenario:"The CMA has activated its leniency programme. The first firm to come forward with evidence of collusion receives full immunity from financial penalties. The second receives a 30–50% reduction. All subsequent firms face the full penalty — potentially tens of millions of pounds. Your legal team has prepared the paperwork. Vantage has gone quiet. You have three choices.",
    signals:[
      {firm:"Apex Fuels",    tone:"neut", quote:"We have no further comment at this stage of the process.",           reliable:0.50},
      {firm:"Crest Energy",  tone:"neut", quote:"We are considering all options in light of the CMA proceedings.",    reliable:0.50},
      {firm:"Vantage Petrol",tone:"sil",  quote:"...",                                                                 reliable:0.30}
    ], special:'leniency' },

  { n:7, title:"Under the Microscope",
    scenario:"CMA investigators have visited fourteen service stations in the past fortnight, recording prices at half-hour intervals and photographing signage. The trade association has suspended its market-information newsletter pending legal review. Whatever informal communication existed between the four firms has now ceased. Each firm is pricing independently — or at least, that is what each firm is telling the CMA.",
    signals:[
      {firm:"Apex Fuels",    tone:"neut", quote:"We price independently based on our own costs and market data.",     reliable:0.52},
      {firm:"Crest Energy",  tone:"neut", quote:"Our decisions reflect normal commercial judgement. Nothing more.",    reliable:0.52},
      {firm:"Vantage Petrol",tone:"neut", quote:"We welcome the CMA's review of competitive conditions.",             reliable:0.48}
    ], special:null },

  { n:8, title:"The Last Move",
    scenario:"The CMA's provisional findings are due in four weeks. Investigators have assembled 18 months of pricing data, emails obtained under warrant, and a statement from FastFuel's founder noting the 130p ceiling held 'suspiciously constant' across all four operators. This is your final pricing decision. Whatever you do now, the evidence already exists. How do you play your last move?",
    signals:[
      {firm:"Apex Fuels",    tone:"neut", quote:"Whatever the outcome, we have always acted within the law.",         reliable:0.50},
      {firm:"Crest Energy",  tone:"neut", quote:"The CMA will find what it finds.",                                   reliable:0.50},
      {firm:"Vantage Petrol",tone:"neut", quote:"See you on the other side.",                                         reliable:0.50}
    ], special:null }
];

// ══════════════════════════════════════════════════════════════
//  PROFIT TABLE  (your profit given choice & count of others cooperating)
// ══════════════════════════════════════════════════════════════
var PT = { 'C':[2,5,8,10], 'D':[3,7,10,12] };
function profitFor(myChoice, othersArr) {
  var n = othersArr.filter(function(c){return c==='C';}).length;
  return PT[myChoice][n];
}

// ══════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════
var G = {};
function freshGame() {
  return {
    round: 0,
    playerChoices: [],
    roundData: [],
    profits: {player:0, apex:0, crest:0, vantage:0},
    whistleblew: false,
    grimFired: false,
    grimRound: -1,
    crestBetrayal: 0   // times player defected while Crest cooperated
  };
}

// ── AI DECISIONS ───────────────────────────────────────────────
function apexChoice(ri, ph) {
  if (ri === 0) return 'C';
  // Two-round punishment window — forgives after 2 clean rounds
  var p1 = ph[ri-1];
  var p2 = ri >= 2 ? ph[ri-2] : 'C';
  if (p1==='D'||p1==='W'||p2==='D'||p2==='W') return 'D';
  return 'C';
}

function crestChoice(ri, ph) {
  if (ri === 0) return 'C';
  if (G.grimFired) return 'D';  // grim trigger — permanent, no forgiveness
  return (Math.random() < (ri >= 4 ? 0.72 : 0.85)) ? 'C' : 'D';
}

function vantageChoice(ri) {
  if (ri === 0) return 'D';              // unreliable from the start
  if (ri === 5) return 'D';             // leniency round — Vantage moves first
  if (ri >= 4) return Math.random() < 0.80 ? 'D' : 'C';  // CMA era: 80% defect
  return Math.random() < 0.58 ? 'D' : 'C';
}

// ── SIGNAL ACCURACY ───────────────────────────────────────────
// Was this signal an accurate predictor of the firm's actual choice?
function signalAccurate(tone, choice) {
  if (tone === 'coop') return choice === 'C' ? 'yes' : 'no';
  if (tone === 'host' || tone === 'warn') return (choice === 'D') ? 'yes' : 'no';
  return 'na'; // neut / sil → inconclusive
}

// ══════════════════════════════════════════════════════════════
//  RENDER UTILITIES
// ══════════════════════════════════════════════════════════════
function render(html) {
  var el = document.getElementById('root');
  el.innerHTML = html;
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── HUB ───────────────────────────────────────────────────────
function goHub() { render('<div class="fade-in">'+hubHTML()+'</div>'); }

function hubHTML() {
  return '<div class="hub-hero">'
    +'<div class="hub-eyebrow">Paper 1 &middot; Oligopoly &amp; Game Theory</div>'
    +'<h1>The Cartel Room</h1>'
    +'<div class="hub-tagline">Can a cartel survive when everyone has a reason to cheat?</div>'
    +'<p class="hub-intro">You are CEO of NovaPetro, one of four major fuel retailers on the UK motorway network. An informal price-fixing arrangement keeps all four firms earning strong profits — but the incentive to secretly undercut your rivals never disappears. Over 8 rounds you will face real decisions about cooperation, defection, and the arrival of the Competition and Markets Authority. Signals from rivals are real — but not always truthful.</p>'
    +'</div>'

    // Market context stats
    +'<div class="mkt-stats">'
    +'<div class="mkt-stat"><div class="mkt-stat-num">78%</div><div class="mkt-stat-lbl">CR4 — Four-Firm Concentration Ratio</div><div class="mkt-stat-sub">Four firms control 78% of motorway fuel retail. Above 60% triggers CMA interest.</div></div>'
    +'<div class="mkt-stat"><div class="mkt-stat-num">1,840</div><div class="mkt-stat-lbl">HHI — Herfindahl-Hirschman Index</div><div class="mkt-stat-sub">HHI above 1,500 indicates a concentrated market. The US DOJ would classify this as oligopoly.</div></div>'
    +'<div class="mkt-stat"><div class="mkt-stat-num">130p</div><div class="mkt-stat-lbl">Cartel Price vs ~110p competitive</div><div class="mkt-stat-sub">The 20p margin above competitive price represents the supernormal profit the cartel generates — and consumer surplus destroyed.</div></div>'
    +'<div class="mkt-stat"><div class="mkt-stat-num">10%</div><div class="mkt-stat-lbl">Maximum CMA Fine of Annual Turnover</div><div class="mkt-stat-sub">Under the Competition Act 1998 (Chapter I Prohibition), price-fixing fines can reach 10% of global annual turnover.</div></div>'
    +'</div>'

    // Payoff matrix
    +'<div class="matrix-wrap">'
    +'<div class="matrix-title">&#9632; The Payoff Matrix &mdash; Your Profit Per Round (£m)</div>'
    +'<div class="matrix-grid">'
    +'<div class="mx mx-corner"></div>'
    +'<div class="mx mx-head">Others<br><strong style="color:#4caf80">Cooperate</strong></div>'
    +'<div class="mx mx-head">Others<br><strong style="color:#e05060">Defect</strong></div>'
    +'<div class="mx mx-head your-head">You<br><strong>Cooperate</strong><br>130p</div>'
    +'<div class="mx mx-cell good"><div class="mx-profit">£10m</div><div class="mx-lbl">Cartel Optimum</div></div>'
    +'<div class="mx mx-cell bad"><div class="mx-profit">£2m</div><div class="mx-lbl">Exploited</div></div>'
    +'<div class="mx mx-head your-head">You<br><strong>Defect</strong><br>115p</div>'
    +'<div class="mx mx-cell great"><div class="mx-profit">£12m</div><div class="mx-lbl">Free Rider</div></div>'
    +'<div class="mx mx-cell nash"><div class="mx-profit">£3m</div><div class="mx-lbl">Nash Equilibrium &#9632;</div></div>'
    +'</div>'
    +'<div class="matrix-note">Actual profits vary because each rival chooses independently. The Nash Equilibrium (all defect, £3m each) is <em>individually rational</em> but <em>collectively suboptimal</em> — seven pounds worse per firm than the cartel optimum. This gap is what makes sustained cooperation theoretically possible, and punishment strategies like tit-for-tat and grim trigger economically meaningful.</div>'
    +'</div>'

    // Rival firms
    +'<div class="section-label" style="margin-bottom:.65rem">Your Rivals &mdash; Signal Reliability</div>'
    +'<div class="firms-row">'
    +'<div class="firm-card" style="--fc:#4a7fb5">'
    +'<div class="firm-name">Apex Fuels</div>'
    +'<div class="firm-strategy">Strategy: Two-Round Punishment</div>'
    +'<div class="firm-desc">Apex cooperates until you defect, then retaliates for two full rounds before forgiving. A single defection costs you two rounds at the Nash payoff of £3m rather than £10m — a net penalty of £14m. Their signals are among the most reliable, and a public commitment from Apex is near-certain.</div>'
    +'<span class="firm-reliability rel-high">Signal Reliability: High</span>'
    +'</div>'
    +'<div class="firm-card" style="--fc:#4caf80">'
    +'<div class="firm-name">Crest Energy</div>'
    +'<div class="firm-strategy">Strategy: Grim Trigger</div>'
    +'<div class="firm-desc">Crest cooperates by default — but betray them once while they are cooperating, and they switch to permanent defection for the rest of the game. No warnings. No forgiveness. Grim trigger is the harshest credible punishment in game theory: because it has no exceptions, it should deter betrayal entirely if taken seriously.</div>'
    +'<span class="firm-reliability rel-med">Signal Reliability: Medium — until triggered</span>'
    +'</div>'
    +'<div class="firm-card" style="--fc:#e05060">'
    +'<div class="firm-name">Vantage Petroleum</div>'
    +'<div class="firm-strategy">Strategy: Predominantly Aggressive</div>'
    +'<div class="firm-desc">Vantage is unreliable from round one. Under financial or regulatory pressure they look after themselves first. Their signals frequently do not match their actions — treat everything from Vantage as potentially a bluff, particularly once the CMA arrives.</div>'
    +'<span class="firm-reliability rel-low">Signal Reliability: Low</span>'
    +'</div>'
    +'</div>'

    +'<button class="start-btn" onclick="startGame()">Enter the Cartel Room &rarr;</button>';
}

// ── GAME START ─────────────────────────────────────────────────
function startGame() { G = freshGame(); renderRound(); }

// ── ROUND SCREEN ───────────────────────────────────────────────
function renderRound() {
  var rd = ROUNDS[G.round];
  var ri = G.round;
  var prog = (ri / 8 * 100).toFixed(0);

  // Build alerts
  var alerts = '';
  if (G.grimFired && ri > G.grimRound) {
    alerts += '<div class="alert alert-grim"><div class="alert-icon">&#9888;</div><div class="alert-body"><div class="alert-title">Crest Energy: Grim Trigger Fired</div>Having been betrayed once, Crest Energy has switched to <strong>permanent defection</strong> for the remainder of the game. Grim trigger is the most severe punishment strategy in repeated game theory — it is credible precisely because it has no exceptions and no forgiveness. This is why economists argue it can sustain cooperation better than milder strategies, but only if the threat is believed from the outset.</div></div>';
  }
  if (rd.special === 'price_leader') {
    alerts += '<div class="alert alert-price"><div class="alert-icon">&#128240;</div><div class="alert-body"><div class="alert-title">Price Leadership — Tacit Collusion</div>Apex\'s public commitment is a form of <strong>tacit collusion</strong>: firms coordinate on price without an explicit agreement, sidestepping the Chapter I Prohibition. Dominant-firm price leadership is legal, but regulators watch it closely. A public statement is far more credible than a private signal because breaking it would damage reputation.</div></div>';
  }
  if (rd.special === 'new_entrant') {
    alerts += '<div class="alert alert-price"><div class="alert-icon">&#9888;</div><div class="alert-body"><div class="alert-title">Entry Threat &mdash; Limit Pricing &amp; Contestability</div>FastFuel\'s expansion tests <strong>Baumol\'s contestability theory</strong>: even a small fringe entrant can discipline incumbents if entry costs are low. <strong>Limit pricing</strong> — setting price just below the entrant\'s break-even point — could deter FastFuel but requires sacrificing the cartel margin. Your choice this round implicitly determines your response to entry.</div></div>';
  }
  if (rd.special === 'cma') {
    alerts += '<div class="alert alert-cma"><div class="alert-icon">&#9876;</div><div class="alert-body"><div class="alert-title">CMA Investigation Launched</div>The Competition and Markets Authority has opened a formal inquiry under the <strong>Competition Act 1998, Chapter I Prohibition</strong>. All pricing communications between firms are now discoverable. Detection risk raises the <strong>expected cost of cooperation</strong> — factoring in the probability of a fine changes the rational payoff from each option.</div></div>';
  }
  if (rd.special === 'leniency') {
    alerts += '<div class="alert alert-len"><div class="alert-icon">&#9878;</div><div class="alert-body"><div class="alert-title">Leniency Programme Activated</div>The CMA is offering full immunity to the first firm to come forward with evidence. This creates a <strong>prisoner\'s dilemma within the prisoner\'s dilemma</strong>: even cartel members who trusted each other now have a dominant strategy to betray their co-conspirators. This is precisely why leniency programmes are the CMA\'s most powerful cartel-detection tool.</div></div>';
  }

  // Signals
  var sigs = rd.signals.map(function(s){
    var badge = s.badge === 'public' ? '<span class="signal-badge badge-public">Public Commitment</span>' : '';
    if (s.tone === 'warn' || s.tone === 'host') badge += '<span class="signal-badge badge-unrel" style="margin-left:.3rem">Treat with caution</span>';
    return '<div class="signal-card '+s.tone+'">'
      +'<div class="signal-firm">'+s.firm+'</div>'
      +'<div class="signal-quote">&ldquo;'+s.quote+'&rdquo;</div>'
      +badge
      +'</div>';
  }).join('');

  // Mini leaderboard
  var maxP = Math.max(G.profits.player, G.profits.apex, G.profits.crest, G.profits.vantage, 1);
  function mlb(name, val, col, isYou) {
    var w = (val/maxP*100).toFixed(0);
    return '<div class="mlb-row"><div class="mlb-name'+(isYou?' you':'')+'">'+name+'</div><div class="mlb-track"><div class="mlb-fill" style="width:'+w+'%;background:'+col+'"></div></div><div class="mlb-val'+(isYou?' you':'')+'">£'+val+'m</div></div>';
  }
  var miniLb = '<div class="mini-lb"><div class="mini-lb-title">Current Standings (cumulative profit)</div><div class="mini-lb-rows">'
    +mlb('You',G.profits.player,'var(--goldl)',true)
    +mlb('Apex',G.profits.apex,'var(--blue)',false)
    +mlb('Crest',G.profits.crest,'var(--green)',false)
    +mlb('Vantage',G.profits.vantage,'var(--red)',false)
    +'</div></div>';

  // Choice buttons
  var buttons;
  if (rd.special === 'leniency') {
    buttons = ''
      +'<button class="choice-btn coop-btn" onclick="submitChoice(\'C\')">'
      +'<div class="cb-icon">&#129309;</div><div class="cb-label">Hold the Arrangement</div>'
      +'<div class="cb-price">130p per litre</div>'
      +'<div class="cb-desc">Maintain the cartel price. Riskier now the leniency window is open — if a rival comes forward first, you face the full fine with no reduction.</div>'
      +'</button>'
      +'<button class="choice-btn def-btn" onclick="submitChoice(\'D\')">'
      +'<div class="cb-icon">&#9986;</div><div class="cb-label">Defect on Price Only</div>'
      +'<div class="cb-price">115p per litre</div>'
      +'<div class="cb-desc">Undercut rivals but do not contact the CMA. You earn more this round but remain exposed if investigators find evidence.</div>'
      +'</button>'
      +'<button class="choice-btn len-btn" onclick="submitChoice(\'W\')">'
      +'<div class="cb-icon">&#128203;</div><div class="cb-label">Activate Leniency</div>'
      +'<div class="cb-price">Whistleblow to the CMA</div>'
      +'<div class="cb-desc">Defect on price and provide the CMA with evidence of the arrangement. Guaranteed full immunity from any financial penalty.</div>'
      +'</button>';
  } else {
    buttons = ''
      +'<button class="choice-btn coop-btn" onclick="submitChoice(\'C\')">'
      +'<div class="cb-icon">&#129309;</div><div class="cb-label">Cooperate</div>'
      +'<div class="cb-price">Hold at 130p per litre</div>'
      +'<div class="cb-desc">Maintain the cartel price. Earn up to £10m if others hold — but risk being exploited if a rival defects.</div>'
      +'</button>'
      +'<button class="choice-btn def-btn" onclick="submitChoice(\'D\')">'
      +'<div class="cb-icon">&#9986;</div><div class="cb-label">Defect</div>'
      +'<div class="cb-price">Cut to 115p per litre</div>'
      +'<div class="cb-desc">Undercut rivals. Earn up to £12m if others hold — but trigger retaliation if rivals adopt two-round punishment or grim trigger.</div>'
      +'</button>';
  }

  render('<div class="fade-in">'
    +'<div class="round-header">'
    +'<div><div class="round-eyebrow">Round '+rd.n+' of 8</div><div class="round-title">'+rd.title+'</div></div>'
    +'<div class="round-scorebox"><div class="round-score-lbl">Your Cumulative Profit</div><div class="round-score-num">£'+G.profits.player+'m</div></div>'
    +'</div>'
    +'<div class="round-progress"><div class="round-pfill" style="width:'+prog+'%"></div></div>'
    +alerts
    +'<div class="scenario-box">'+rd.scenario+'</div>'
    +'<div class="section-label">Intelligence &mdash; Signals from Rivals</div>'
    +'<div class="signals-grid">'+sigs+'</div>'
    +miniLb
    +'<div class="choice-title">Your Decision This Month</div>'
    +'<div class="choice-btns">'+buttons+'</div>'
    +'</div>');
}

// ── SUBMIT CHOICE ─────────────────────────────────────────────
function submitChoice(playerChoice) {
  var ri = G.round;
  var rd = ROUNDS[ri];

  var apex    = apexChoice(ri, G.playerChoices);
  var crest   = crestChoice(ri, G.playerChoices);
  var vantage = vantageChoice(ri);
  if (rd.special === 'leniency') vantage = 'D'; // always races for leniency

  var effP = (playerChoice === 'W') ? 'D' : playerChoice;
  if (playerChoice === 'W') G.whistleblew = true;

  // Grim trigger check: did player just betray Crest?
  if (effP === 'D' && crest === 'C') {
    G.crestBetrayal++;
    if (!G.grimFired) {
      G.grimFired = true;
      G.grimRound = ri;
    }
  }

  var pp = profitFor(effP,   [apex, crest, vantage]);
  var ap = profitFor(apex,   [effP, crest, vantage]);
  var cp = profitFor(crest,  [effP, apex, vantage]);
  var vp = profitFor(vantage,[effP, apex, crest]);

  G.profits.player  += pp;
  G.profits.apex    += ap;
  G.profits.crest   += cp;
  G.profits.vantage += vp;

  G.playerChoices.push(playerChoice);
  G.roundData.push({
    round:ri+1, rd:rd,
    playerChoice:playerChoice, apex:apex, crest:crest, vantage:vantage,
    playerProfit:pp, apexProfit:ap, crestProfit:cp, vantageProfit:vp,
    sigAcc:{
      apex:   signalAccurate(rd.signals[0].tone, apex),
      crest:  signalAccurate(rd.signals[1].tone, crest),
      vantage:signalAccurate(rd.signals[2].tone, vantage)
    }
  });

  renderReveal();
}

// ── REVEAL ────────────────────────────────────────────────────
function renderReveal() {
  var d = G.roundData[G.roundData.length - 1];
  var ri = G.round;
  var isLast = ri === 7;

  function pill(c) {
    if (c==='W') return '<span class="choice-pill pill-w">Whistleblew</span>';
    if (c==='C') return '<span class="choice-pill pill-c">Cooperated</span>';
    return '<span class="choice-pill pill-d">Defected</span>';
  }
  function accBadge(acc) {
    if (acc==='yes') return '<span class="sig-acc sig-ok">&#10003; Signal reliable</span>';
    if (acc==='no')  return '<span class="sig-acc sig-bad">&#10007; Signal misleading</span>';
    return '<span class="sig-acc sig-na">&#8212; Inconclusive</span>';
  }

  var maxTotal = Math.max(G.profits.player, G.profits.apex, G.profits.crest, G.profits.vantage, 1);
  function lbBar(name, val, col) {
    var w = (val/maxTotal*100).toFixed(1);
    return '<div class="lb-bar-wrap"><div class="lb-firm-name">'+name+'<span>£'+val+'m</span></div><div class="lb-bar-track"><div class="lb-bar-fill" style="width:'+w+'%;background:'+col+'"></div></div></div>';
  }

  // Grim trigger announcement if it just fired this round
  var grimAnnounce = '';
  if (G.grimFired && G.grimRound === ri) {
    grimAnnounce = '<div class="alert alert-grim" style="margin-bottom:1rem"><div class="alert-icon">&#9888;</div><div class="alert-body"><div class="alert-title">Crest Energy: Grim Trigger Activated</div>You defected while Crest was cooperating. Crest has now switched to <strong>permanent defection</strong> for all remaining rounds. Unlike two-round punishment, grim trigger never forgives — its power comes precisely from its unconditional nature. You have permanently lost a cooperative partner. The cartel is now effectively down to two participants.</div></div>';
  }

  render('<div class="fade-in">'
    +'<div class="round-header"><div><div class="round-eyebrow">Round '+d.round+' Result</div><div class="round-title">'+d.rd.title+'</div></div><div class="round-scorebox"><div class="round-score-lbl">Your Cumulative Profit</div><div class="round-score-num">£'+G.profits.player+'m</div></div></div>'
    +'<div class="round-progress"><div class="round-pfill" style="width:'+(d.round/8*100).toFixed(0)+'%"></div></div>'
    +grimAnnounce

    // Results table with signal accuracy
    +'<table class="result-table"><thead><tr><th>Firm</th><th>Decision</th><th>Profit</th><th>Signal Accuracy</th></tr></thead><tbody>'
    +'<tr class="player-row"><td class="firm-col">&#9733; You (NovaPetro)</td><td>'+pill(d.playerChoice)+'</td><td class="profit-col mine">£'+d.playerProfit+'m</td><td>&mdash;</td></tr>'
    +'<tr><td>Apex Fuels</td><td>'+pill(d.apex)+'</td><td class="profit-col">£'+d.apexProfit+'m</td><td>'+accBadge(d.sigAcc.apex)+'</td></tr>'
    +'<tr><td>Crest Energy</td><td>'+pill(d.crest)+'</td><td class="profit-col">£'+d.crestProfit+'m</td><td>'+accBadge(d.sigAcc.crest)+'</td></tr>'
    +'<tr><td>Vantage Petroleum</td><td>'+pill(d.vantage)+'</td><td class="profit-col">£'+d.vantageProfit+'m</td><td>'+accBadge(d.sigAcc.vantage)+'</td></tr>'
    +'</tbody></table>'

    +'<div class="round-summary-box"><div class="rs-row">'
    +'<div class="rs-item"><div class="rs-lbl">Your Profit This Round</div><div class="rs-val">£'+d.playerProfit+'m</div></div>'
    +'<div class="rs-item"><div class="rs-lbl">Cumulative Total</div><div class="rs-val">£'+G.profits.player+'m</div></div>'
    +'<div class="rs-item"><div class="rs-lbl">Rounds Remaining</div><div class="rs-val">'+(7-ri)+'</div></div>'
    +'</div></div>'

    +'<div class="econ-insight"><div class="ei-lbl">&#9632; Economics Commentary</div><div class="ei-text">'+getInsight(d, ri)+'</div></div>'

    +'<div class="section-label" style="margin-bottom:.5rem">Running Totals &mdash; All Firms</div>'
    +'<div class="round-summary-box">'
    +lbBar('You (NovaPetro)', G.profits.player, 'var(--goldl)')
    +lbBar('Apex Fuels', G.profits.apex, 'var(--blue)')
    +lbBar('Crest Energy', G.profits.crest, 'var(--green)')
    +lbBar('Vantage Petroleum', G.profits.vantage, 'var(--red)')
    +'</div>'

    +'<div class="btn-row"><button class="btn bg" onclick="'+(isLast?'renderSummary()':'nextRound()')+'">'+( isLast?'View Final Summary':'Next Round &rarr;')+'</button></div>'
    +'<div style="height:1.5rem"></div>'
  +'</div>');
}

function nextRound() { G.round++; renderRound(); }

// ══════════════════════════════════════════════════════════════
//  BRANCHING ECONOMICS COMMENTARY
// ══════════════════════════════════════════════════════════════
function getInsight(d, ri) {
  var pC = d.playerChoice === 'C';
  var pD = !pC;
  var aC = d.apex === 'C', cC = d.crest === 'C', vC = d.vantage === 'C';
  var othersCoopN = [aC,cC,vC].filter(Boolean).length;
  var allCoop = pC && aC && cC && vC;
  var allDef = pD && !aC && !cC && !vC;
  var vantageBluffed = (d.rd.signals[2].tone === 'coop' || d.rd.signals[2].tone === 'warn') && d.vantage === 'D';

  switch(ri) {
    case 0:
      if (allCoop) return 'The cartel held fully in round one — the <strong>Pareto optimal outcome</strong>. Notice that even here the individual incentive to defect is present: had you cut to 115p, you would have earned £12m rather than £10m. But that one-round gain of £2m would have triggered two rounds of retaliation from Apex at the Nash payoff of £3m — a net loss of £12m. The repeated game makes cooperation the rational choice, even though defection remains the dominant strategy in a single-shot game.';
      if (pC && !vC) return 'You cooperated but Vantage defected, earning £'+d.vantageProfit+'m to your £'+d.playerProfit+'m. This is the <strong>exploitation outcome</strong> — the worst position for a cooperator. It illustrates why defection is the <strong>dominant strategy</strong> in a single-shot game: it produces a better outcome regardless of what others do. Vantage\'s cautious signal was your early warning. Watch them closely.';
      if (pD) return 'You defected in round one, earning £'+d.playerProfit+'m. In a single-shot prisoner\'s dilemma, defection is the <strong>dominant strategy</strong> — it pays better than cooperation regardless of what rivals do. The cost becomes clear in repeated play: Apex\'s two-round punishment and Crest\'s grim trigger mean a one-round gain of £2m can trigger losses far exceeding that amount. The game rewards thinking three rounds ahead.';
      return 'Round one established the initial pattern. <strong>Apex</strong> uses tit-for-tat — whatever you did this round, they will mirror next time. <strong>Crest</strong> is cooperative but not unconditional. <strong>Vantage</strong> is already showing their colours. Watch the signal accuracy column carefully over the coming rounds.';

    case 1:
      if (pC) return 'You followed Apex\'s public commitment. This is <strong>tacit collusion through price leadership</strong> — legally distinct from the explicit arrangement at the trade dinner because no direct communication occurred. Dominant-firm price leadership is how many real-world oligopolies sustain coordination without violating competition law. The key insight is signal credibility: Apex\'s public statement was costly to break, making it far more reliable than Vantage\'s vague hints. The <strong>kinked demand curve</strong> model also applies here — there is little incentive to undercut because rivals would match any price cut, while raising price above the leader\'s level would mean losing market share.';
      return 'You defected despite Apex\'s public commitment. This tests the <strong>kinked demand curve model</strong> (Sweezy, 1939): when you cut price, rivals face a choice — match you (reducing everyone\'s margins) or hold and lose market share. If they match, your gain from defection is smaller than the payoff matrix suggests; if they do not, you win significant volume. The kink occurs because rivals are more likely to follow price cuts than price rises, making the demand curve more elastic above the prevailing price and less elastic below it.';

    case 2:
      if (!vC && d.rd.signals[2].tone === 'host') return 'Vantage defected as their hostile signal suggested — though for Vantage, signals are only weakly predictive. Their instability illustrates the <strong>cartel stability problem</strong>: a cartel only holds if every member finds cooperation more profitable than defection in every period. Vantage\'s investor pressure creates exactly the short-term incentive to defect that makes cartels fragile. Real-world examples — OPEC\'s periodic breakdown, the lysine cartel — show that financial stress on individual members is the most common trigger for cartel collapse.';
      if (vC) return 'Vantage cooperated this round — a surprise given their hostile signal. This illustrates the <strong>imperfect information problem</strong> in oligopoly: firms cannot observe rivals\' true intentions, only their signals. Vantage\'s signal was bearish but their action was cooperative. Over time you should calibrate how much weight to give each firm\'s signals. Apex\'s signals tend to be the most reliable; Vantage\'s the least.';
      return 'The wobble round reveals cartel fragility. <strong>Cartel discipline</strong> requires that every member\'s short-run gain from defecting is outweighed by the long-run loss from a retaliatory price war. When Vantage faces investor pressure, their discount rate effectively rises — future cooperation is worth less, making current defection more attractive. This is why cartels tend to collapse during industry downturns.';

    case 3:
      if (pD) return 'You defected this round — in the context of FastFuel\'s entry, this could be interpreted as <strong>limit pricing</strong>: pricing below the cartel level to reduce the incumbent profit that is attracting new entry. Bain\'s limit pricing theory argues incumbents will sacrifice some supernormal profit to maintain barriers to entry. The alternative — maintaining 130p — signals that high margins are available, encouraging further entry. The trade-off is: protect margins now vs protect market structure long-term.';
      return 'You held at 130p despite FastFuel\'s entry. <strong>Baumol\'s contestability theory</strong> (1982) predicts that if entry costs are low, even a small fringe player can discipline incumbent pricing. FastFuel at 112p demonstrates this: their presence may not yet be large enough to constrain you, but their growth trajectory suggests the contestable threat is real. The CMA\'s interest in this market was likely triggered partly by the visible gap between FastFuel\'s price and the majors\' coordinated 130p.';

    case 4:
      if (pD) return 'You defected in the round the CMA announced its inquiry. The <strong>expected cost of cooperation</strong> has now risen sharply: multiply the probability of detection by the fine size, and the net expected value of cooperation falls. This is rational expected-utility maximisation under uncertainty — the same framework regulators use when setting fine levels. The CMA deliberately sets fines high enough that the expected cost of collusion exceeds its expected benefit, even accounting for imperfect detection.';
      return 'You held the arrangement despite the CMA inquiry. The rational calculation depends on your estimate of detection probability. If you believe the CMA will find insufficient evidence, cooperation might still be worth it — but note that Vantage has already signalled defection, and defectors tend to make prosecution easier by behaving distinctly from non-defectors. Under the <strong>Chapter I Prohibition</strong> of the Competition Act 1998, the CMA can impose fines of up to 10% of global annual turnover — far larger than the accumulated profit from cooperation.';

    case 5:
      if (d.playerChoice === 'W') return 'You activated leniency — the theoretically optimal move for a firm that has participated in collusion and expects discovery. The leniency programme works by creating a <strong>prisoner\'s dilemma within the prisoner\'s dilemma</strong>: even if cartel members trust each other on price, they now face a first-mover advantage in coming forward. The first firm gets full immunity; waiting risks being the second or third. This is why economists regard leniency as the most powerful cartel-detection tool — it exploits the same strategic incentive that makes cartels form in the first place.';
      if (pC) return 'You held the arrangement despite the leniency window opening. Note that Vantage has defected and may have contacted the CMA. The leniency mechanism is designed to produce this uncertainty — each cartel member now has an incentive to race to come forward before rivals do, even if they are not sure whether rivals have already done so. The formal model is a <strong>race to the courthouse</strong>: delay increases the probability that a rival has already secured immunity, making your own position worse.';
      return 'You defected on price without activating leniency. You captured higher revenue this round but remain exposed to investigation. Firms that defect on price but do not cooperate with the CMA occupy an uncomfortable middle ground: they have broken the cartel (reducing the collective evidence) but have not secured immunity. Whether this is better than cooperation depends on how strong the CMA\'s existing evidence is.';

    case 6:
      if (G.grimFired) return 'With Crest on grim trigger, the informal arrangement is fragmenting from both ends — CMA scrutiny from above, and internal retaliation from within. The <strong>kinked demand curve</strong> predicts price rigidity in oligopoly: firms are reluctant to raise prices (rivals won\'t follow, losing you market share) but also reluctant to cut them (rivals will match, triggering a price war). Under CMA scrutiny, however, even the risk of tacit coordination justifies moving toward competitive pricing — the kink shifts as enforcement changes the payoff structure.';
      return 'With CMA investigators active, the coordination that made the cartel profitable has effectively ended. The market is transitioning toward <strong>non-collusive oligopoly</strong> — interdependent behaviour without coordination. Firms still watch each other\'s prices closely (interdependence remains), but the mechanism has shifted from cooperation to competitive reaction. This is the equilibrium the CMA is trying to create.';

    case 7:
      if (pD) return 'You defected in the final round. <strong>Backward induction</strong> predicts exactly this: in a finitely repeated game, rational players defect in the last round (no future punishment possible), and knowing this, they defect in the second-to-last round, and so on. The logic unravels cooperation entirely from the end backward. In practice, cooperation often persists longer than backward induction predicts — because players are uncertain about the game\'s true endpoint, value reputation beyond the game, or follow norms rather than strict rationality.';
      return 'You cooperated in the final round. Standard game theory (backward induction) predicts defection in round 8 — there is no future in which cooperation can be rewarded. That you cooperated suggests either loyalty to the arrangement, risk aversion about triggering a last-round price war, or simply not applying backward induction explicitly. In real markets, cartels sometimes persist even when the legal risk is high, precisely because members have built genuine norms of behaviour over time.';
  }
  return 'Each round\'s outcome reflects the central tension of oligopoly: what is individually rational (defect) is collectively suboptimal (all earn less). This is the prisoner\'s dilemma that defines game theory\'s core contribution to understanding strategic interaction.';
}

// ══════════════════════════════════════════════════════════════
//  SUMMARY SCREEN
// ══════════════════════════════════════════════════════════════
function renderSummary() {
  var coopN = G.playerChoices.filter(function(c){return c==='C';}).length;
  var gross = G.profits.player;
  var fine = 0, verdictClass, verdictTitle, verdictText;

  if (G.whistleblew) {
    verdictClass='immune'; verdictTitle='CMA Verdict: Full Immunity Granted';
    verdictText='You activated the leniency programme and provided the CMA with evidence. Under the CMA\'s leniency policy the first firm to come forward receives complete immunity. <strong>Fine: £0.</strong> Your rivals who did not come forward face enforcement proceedings.';
  } else if (coopN >= 5) {
    verdictClass='guilty'; verdictTitle='CMA Verdict: Cartel Participation Proven';
    fine=20;
    verdictText='Investigators found sustained price coordination across '+coopN+' of 8 rounds. NovaPetro\'s estimated annual turnover of £200m results in a fine of <strong>£20m — approximately 10% of annual turnover</strong>, the maximum permitted under the Competition Act 1998. No leniency application was made. <strong>Fine: £20m.</strong>';
  } else if (coopN >= 3) {
    verdictClass='guilty'; verdictTitle='CMA Verdict: Partial Cartel Involvement';
    fine=10;
    verdictText='The CMA found evidence of coordination in '+coopN+' of 8 rounds. NovaPetro\'s involvement was less sustained than other parties; the fine reflects partial participation. <strong>Fine: £10m</strong> — approximately 5% of estimated annual turnover.';
  } else {
    verdictClass='clear'; verdictTitle='CMA Verdict: Insufficient Evidence';
    verdictText='Your pricing decisions showed insufficient consistency with the alleged arrangement — you cooperated in only '+coopN+' of 8 rounds. The CMA has closed its file on NovaPetro. <strong>Fine: £0.</strong> The investigation continues against other parties.';
  }

  var net = gross - fine;

  // Signal accuracy summary
  var sigCorrect = 0, sigWrong = 0;
  G.roundData.forEach(function(d){
    if (d.sigAcc.apex==='yes') sigCorrect++; else if (d.sigAcc.apex==='no') sigWrong++;
    if (d.sigAcc.crest==='yes') sigCorrect++; else if (d.sigAcc.crest==='no') sigWrong++;
    if (d.sigAcc.vantage==='yes') sigCorrect++; else if (d.sigAcc.vantage==='no') sigWrong++;
  });

  // Consumer welfare
  var consumerLoss = coopN * 8; // £8m per round of collusion = 20p × volume
  var daysCartel = coopN + ' of 8 months';

  var pips = G.playerChoices.map(function(c,i){
    var cls=c==='W'?'w':c==='C'?'c':'d';
    var lbl=c==='W'?'W':c==='C'?'C':'D';
    return '<div class="rh-pip '+cls+'" title="Round '+(i+1)+'">'+lbl+'</div>';
  }).join('');

  render('<div class="fade-in">'
    +'<div class="summary-hero">'
    +'<div class="summary-eye">Game Complete &mdash; 8 Rounds</div>'
    +'<div class="summary-title">Final Results</div>'
    +'<div class="summary-bignum">£'+gross+'m</div>'
    +'<div class="summary-sub">Gross profit before regulatory outcome</div>'
    +(fine>0?'<div class="summary-bignum" style="font-size:2.4rem;color:var(--red)">&#8722;£'+fine+'m</div><div class="summary-sub">CMA Financial Penalty</div>':'')
    +'<div class="summary-bignum" style="font-size:2.8rem;margin-top:.4rem">£'+net+'m</div>'
    +'<div class="summary-sub">Net profit &mdash; final position</div>'
    +'</div>'

    +'<div class="verdict-box '+verdictClass+'">'
    +'<div class="verdict-label">'+verdictTitle+'</div>'
    +'<div class="verdict-text">'+verdictText+'</div>'
    +'</div>'

    +'<div class="summary-stats">'
    +'<div class="ss-box"><div class="ss-num">'+coopN+'</div><div class="ss-lbl">Rounds Cooperated</div></div>'
    +'<div class="ss-box"><div class="ss-num">'+(8-coopN)+'</div><div class="ss-lbl">Rounds Defected</div></div>'
    +'<div class="ss-box"><div class="ss-num">£'+G.profits.apex+'m</div><div class="ss-lbl">Apex Final</div></div>'
    +'<div class="ss-box"><div class="ss-num">£'+G.profits.crest+'m</div><div class="ss-lbl">Crest Final</div></div>'
    +'<div class="ss-box"><div class="ss-num">£'+G.profits.vantage+'m</div><div class="ss-lbl">Vantage Final</div></div>'
    +'<div class="ss-box"><div class="ss-num">'+sigCorrect+'/'+( sigCorrect+sigWrong)+'</div><div class="ss-lbl">Signals Were Accurate</div></div>'
    +'</div>'

    +'<div class="welfare-box">'
    +'<div class="welfare-title">&#9632; Consumer Welfare Impact &mdash; Allocative Efficiency</div>'
    +'<div class="welfare-text">During the '+daysCartel+' months you held the cartel price of 130p, motorists paid approximately <strong>20p per litre above the competitive price</strong> of ~110p. This represents a transfer of consumer surplus to producer surplus, plus a <strong>deadweight welfare loss</strong> — output foregone that would have occurred in a competitive market. Estimated consumer surplus destruction: approximately <strong>£'+consumerLoss+'m</strong> across the corridor. Cartel pricing leads to P &gt; MC, the hallmark of <strong>allocative inefficiency</strong>. Dynamic efficiency may also be compromised: firms insulated from competition have weaker incentives to innovate.</div>'
    +'</div>'

    +'<div style="margin:1rem 0;text-align:center">'
    +'<div class="section-label" style="margin-bottom:.6rem">Your Choices &mdash; All 8 Rounds</div>'
    +'<div class="round-history">'+pips+'</div>'
    +'<div style="font-size:.7rem;color:var(--mut);opacity:.5;font-family:\'IBM Plex Mono\',monospace;letter-spacing:.06em">C = Cooperate &nbsp;&middot;&nbsp; D = Defect &nbsp;&middot;&nbsp; W = Whistleblew</div>'
    +'</div>'

    +'<div class="section-label" style="margin-bottom:.5rem">AI Economics Tutor &mdash; Personalised Debrief</div>'
    +'<div class="debrief-box" id="debriefBox"><div class="debrief-loading">Analysing your strategy<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span></div></div>'

    +'<div class="btn-row" style="margin-top:1rem">'
    +'<button class="btn bg" onclick="startGame()">&#8635; Play Again</button>'
    +'<button class="btn bs" onclick="goHub()">&larr; Back to Hub</button>'
    +'</div><div style="height:2rem"></div>'
  +'</div>');

  fetchDebrief(coopN, gross, fine, net);
}

// ══════════════════════════════════════════════════════════════
//  AI DEBRIEF
// ══════════════════════════════════════════════════════════════
function fetchDebrief(coopN, gross, fine, net) {
  var defN = 8 - coopN;
  var choiceStr = G.playerChoices.map(function(c,i){
    return 'Round '+(i+1)+': '+(c==='C'?'Cooperated':c==='W'?'Whistleblew':'Defected');
  }).join('; ');
  var strat = coopN>=6?'predominantly cooperative'
    :coopN<=2?'predominantly competitive (frequent defector)'
    :G.whistleblew?'mixed with eventual whistleblowing'
    :'mixed — alternating between cooperation and defection';

  var grimNote = G.grimFired ? 'The student triggered Crest Energy\'s grim trigger on round '+(G.grimRound+1)+' by defecting while Crest cooperated, causing Crest to defect permanently thereafter.' : 'Crest Energy\'s grim trigger was never activated.';

  var prompt = 'You are an experienced A-level Economics teacher at a UK independent school giving personalised feedback after a game-theory simulation about oligopoly and cartel behaviour. Write in a warm but academically rigorous tone. Use plain text paragraphs only — no bullet points, no headers, no markdown. Write four focused paragraphs.\n\n'
    +'Student data: '+choiceStr+'. Overall strategy: '+strat+'. Gross profit: £'+gross+'m. CMA fine: £'+fine+'m. Net: £'+net+'m. Whistleblew: '+G.whistleblew+'. Cooperated in '+coopN+'/8 rounds, defected in '+defN+'/8. '+grimNote+'\n\n'
    +'Paragraph 1: Analyse their strategy through the lens of the prisoner\'s dilemma, Nash equilibrium, and dominant strategy. Was their approach consistent with rational game-theoretic behaviour, or did emotions/norms seem to play a role?\n\n'
    +'Paragraph 2: Comment specifically on how they responded to the two AI personalities they could learn — tit-for-tat (Apex) and grim trigger (Crest). Did they exploit Apex\'s predictability? Did they understand the grim trigger threat? What does this reveal about their strategic thinking?\n\n'
    +'Paragraph 3: Focus on the CMA phase (rounds 5–8) and the leniency decision. Relate their behaviour to real competition policy — Chapter I Competition Act 1998, the leniency programme design, and the expected-cost calculus that determines whether collusion is rational under enforcement. Connect to the consumer welfare implications shown on the summary screen.\n\n'
    +'Paragraph 4: Identify the two or three Edexcel oligopoly concepts most relevant to their specific experience — choose from: prisoner\'s dilemma, Nash equilibrium, dominant strategy, tit-for-tat, grim trigger, kinked demand curve, price leadership, tacit collusion, limit pricing, contestability, non-price competition, concentration ratios, allocative efficiency, leniency programmes. Give one sharp exam technique tip tailored to their particular pattern of play.';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var box=document.getElementById('debriefBox');
    if(box){
      var paras=text.split(/\n\n+/).filter(function(p){return p.trim();});
      box.innerHTML=paras.map(function(p){return '<p>'+p.trim()+'</p>';}).join('');
    }
  })
  .catch(function(){
    var box=document.getElementById('debriefBox');
    if(box) box.innerHTML='<p>Debrief unavailable — check your connection. Your choices: '+choiceStr+'</p>';
  });
}

// BOOT
goHub();
