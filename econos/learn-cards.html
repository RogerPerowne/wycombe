<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Learn Cards</title>
<link rel="stylesheet" href="assets/css/econos.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #0F172A; }

.learn-shell { display: flex; min-height: 100vh; max-width: 1480px; margin: 0 auto; background: #F8FAFC; border-left: 1px solid #E2E8F0; border-right: 1px solid #E2E8F0; }

/* ── SIDEBAR ── */
.dash-sidebar { width: 232px; min-width: 232px; background: #fff; border-right: 1px solid #E2E8F0; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; z-index: 20; overflow-y: auto; }
.db-logo { padding: 1.375rem 1.25rem 1rem; border-bottom: 1px solid #F1F5F9; flex-shrink: 0; }
.db-logo-graph { width: 36px; height: 28px; margin-bottom: 5px; display: block; }
.db-logo-wordmark { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.03em; color: #0F172A; }
.db-logo-wordmark .os { color: #2563EB; }
.db-logo-tagline { font-size: 0.75rem; font-weight: 500; margin-top: 2px; }
.tl { color: #16A34A; } .tli { color: #EA580C; } .tla { color: #2563EB; }
.db-nav { flex: 1; padding: 0.625rem; display: flex; flex-direction: column; gap: 0.125rem; }
.nav-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.5625rem 0.75rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; color: #475569; cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; }
.nav-item:hover { background: #F8FAFC; color: #0F172A; }
.nav-item.active { background: #EFF6FF; color: #2563EB; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.db-sidebar-footer { padding: 0.875rem 0.75rem; border-top: 1px solid #F1F5F9; flex-shrink: 0; }
.streak-card { background: #F8FAFC; border-radius: 12px; padding: 0.875rem 1rem; display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.625rem; }
.streak-num { font-size: 1.25rem; font-weight: 800; color: #0F172A; }
.streak-label { font-size: 0.75rem; font-weight: 700; color: #0F172A; line-height: 1.2; }
.streak-sub { font-size: 0.6875rem; color: #64748B; }
.user-pill { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; border-radius: 10px; cursor: pointer; }
.user-pill:hover { background: #F8FAFC; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2563EB; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-info-name { font-size: 0.8125rem; font-weight: 600; color: #0F172A; }
.user-info-role { font-size: 0.75rem; color: #64748B; }

/* ── BODY ── */
.learn-body { flex: 1; display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }

/* ── TOPBAR ── */
.learn-topbar { background: #fff; border-bottom: 1px solid #E2E8F0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 10; }
.topbar-breadcrumb { display: flex; flex-direction: column; }
.topbar-bread-top { font-size: 0.75rem; font-weight: 600; color: #16A34A; }
.topbar-bread-title { font-size: 0.9375rem; font-weight: 700; color: #0F172A; }
.topbar-left-btn { display: flex; align-items: center; gap: 0.375rem; font-size: 0.875rem; font-weight: 500; color: #475569; text-decoration: none; padding: 0.375rem 0.5rem; border-radius: 6px; margin-right: 0.75rem; }
.topbar-left-btn:hover { background: #F8FAFC; color: #0F172A; }
.topbar-left { display: flex; align-items: center; }
.topbar-right { display: flex; align-items: center; gap: 0.875rem; }
.streak-badge { display: flex; align-items: center; gap: 0.375rem; font-size: 0.875rem; font-weight: 600; color: #0F172A; }
.topbar-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2563EB; display: flex; align-items: center; justify-content: center; font-size: 0.8125rem; font-weight: 700; color: #fff; cursor: pointer; }

/* ── PROGRESS BAR ── */
.progress-bar-row { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 2rem 0.875rem 2.5rem; background: #fff; border-bottom: 1px solid #F1F5F9; }
.progress-label { font-size: 0.875rem; font-weight: 500; color: #475569; white-space: nowrap; }
.progress-track { flex: 1; height: 8px; background: #E2E8F0; border-radius: 99px; overflow: visible; position: relative; }
.progress-fill { height: 100%; background: #16A34A; border-radius: 99px; transition: width 0.4s ease; }
.progress-dot { position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: #16A34A; border: 2.5px solid #fff; box-shadow: 0 0 0 2px #16A34A; }
.progress-pct { font-size: 0.875rem; font-weight: 700; color: #0F172A; white-space: nowrap; min-width: 3rem; text-align: right; }
.btn-exit { display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem; font-weight: 600; color: #475569; background: #F8FAFC; border: 1.5px solid #E2E8F0; border-radius: 8px; padding: 0.375rem 0.875rem; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-exit:hover { background: #F1F5F9; }

/* ── CONTENT ROW ── */
.learn-content-row { display: flex; flex: 1; align-items: flex-start; }
.learn-main { flex: 1; padding: 2rem 2rem 3rem 2.5rem; min-width: 0; }

/* ── CARD SHELL ── */
.lcard { background: #fff; border: 1.5px solid #E2E8F0; border-radius: 16px; padding: 2rem 2rem 1.75rem; margin-bottom: 0; }
.lcard-label { font-size: 0.8125rem; font-weight: 700; color: #16A34A; letter-spacing: 0.02em; margin-bottom: 0.625rem; }
.lcard-title { font-size: 1.875rem; font-weight: 800; color: #0F172A; letter-spacing: -0.03em; line-height: 1.15; margin: 0 0 0.625rem; }
.lcard-subtitle { font-size: 0.9375rem; color: #64748B; line-height: 1.55; margin: 0 0 1.5rem; }

/* ── BASIC CARD ── */
.basic-hero { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 1.5rem; }
.basic-def { flex: 1; }
.basic-visual { flex-shrink: 0; width: 200px; }
.basket-svg-wrap { position: relative; }
.price-compare { position: absolute; right: -8px; top: 8px; background: #fff; border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 0.625rem 0.75rem; font-size: 0.8125rem; }
.price-row { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 0.25rem; }
.price-row:last-child { margin-bottom: 0; }
.price-year { color: #64748B; font-weight: 500; }
.price-val { font-weight: 700; color: #0F172A; }
.price-up { color: #16A34A; font-size: 1rem; }
.visual-caption { text-align: center; margin-top: 0.75rem; }
.caption-pill { display: inline-block; background: #F0FDF4; color: #16A34A; font-size: 0.75rem; font-weight: 600; padding: 0.25rem 0.875rem; border-radius: 99px; border: 1px solid #BBF7D0; }

.takeaway-box { background: #F0FDF4; border: 1.5px solid #BBF7D0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 0.875rem; }
.takeaway-icon { width: 36px; height: 36px; background: #DCFCE7; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #16A34A; }
.takeaway-label { font-size: 0.875rem; font-weight: 700; color: #16A34A; margin: 0 0 0.25rem; }
.takeaway-text { font-size: 0.875rem; color: #166534; margin: 0; line-height: 1.5; }

.why-matters-title { font-size: 1rem; font-weight: 700; color: #0F172A; margin: 0 0 0.875rem; }
.why-matters-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.875rem; }
.why-item { background: #F8FAFC; border-radius: 10px; padding: 0.875rem; }
.why-item-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 0.625rem; }
.why-item-title { font-size: 0.875rem; font-weight: 700; color: #0F172A; margin: 0 0 0.25rem; }
.why-item-text { font-size: 0.8125rem; color: #64748B; margin: 0; line-height: 1.4; }

/* ── COMPARISON CARD ── */
.key-idea-box { background: #F8FAFC; border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: flex-start; gap: 0.75rem; }
.key-idea-icon { width: 28px; height: 28px; background: #DCFCE7; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #16A34A; }
.key-idea-label { font-size: 0.8125rem; font-weight: 700; color: #0F172A; margin: 0 0 0.25rem; }
.key-idea-text { font-size: 0.8125rem; color: #475569; margin: 0; line-height: 1.5; }
.comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
.comp-col { border-radius: 12px; border: 1.5px solid; padding: 1.25rem; }
.comp-col-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
.comp-col-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.comp-col-title { font-size: 0.9375rem; font-weight: 700; }
.comp-field { margin-bottom: 0.75rem; }
.comp-field-label { font-size: 0.8125rem; font-weight: 700; margin-bottom: 0.25rem; }
.comp-field-text { font-size: 0.875rem; color: #475569; line-height: 1.45; margin: 0; }
.comp-example-box { border-radius: 8px; padding: 0.625rem 0.75rem; font-size: 0.8125rem; line-height: 1.4; }

/* ── MECHANISM CARD ── */
.chain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
.chain-col { border-radius: 12px; border: 1.5px solid; padding: 1.25rem; }
.chain-col-title { font-size: 0.9375rem; font-weight: 700; margin: 0 0 0.875rem; }
.chain-steps { display: flex; flex-direction: column; gap: 0; }
.chain-step { display: flex; gap: 0.75rem; position: relative; padding-bottom: 1rem; }
.chain-step:last-child { padding-bottom: 0; }
.chain-step::before { content: ''; position: absolute; left: 14px; top: 30px; bottom: 0; width: 2px; background: #E2E8F0; }
.chain-step:last-child::before { display: none; }
.chain-step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; z-index: 1; }
.chain-step-text { font-size: 0.8125rem; color: #334155; line-height: 1.5; padding-top: 0.375rem; }
.key-point-box { background: #F0FDF4; border: 1.5px solid #BBF7D0; border-radius: 12px; padding: 1rem 1.25rem; }
.key-point-label { font-size: 0.8125rem; font-weight: 700; color: #166534; margin: 0 0 0.25rem; }
.key-point-text { font-size: 0.875rem; color: #166534; margin: 0; line-height: 1.5; }

/* ── IMPACTS CARD ── */
.exam-skill-box { display: flex; align-items: flex-start; gap: 0.875rem; background: #FFFBEB; border: 1.5px solid #FCD34D; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; float: right; width: 280px; margin-left: 1.5rem; }
.exam-skill-icon { width: 28px; height: 28px; background: #FEF3C7; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.exam-skill-label { font-size: 0.8125rem; font-weight: 700; color: #92400E; margin: 0 0 0.25rem; }
.exam-skill-text { font-size: 0.8125rem; color: #92400E; margin: 0; line-height: 1.4; }
.impacts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; clear: both; }
.impact-col { border-radius: 12px; border: 1.5px solid; padding: 1rem; }
.impact-col-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
.impact-col-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.impact-col-title { font-size: 0.9375rem; font-weight: 700; }
.impact-col ul { margin: 0; padding: 0 0 0 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
.impact-col li { font-size: 0.8125rem; color: #475569; line-height: 1.4; }
.winners-losers-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.wl-box { border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: flex-start; gap: 0.75rem; }
.wl-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.wl-title { font-size: 0.9375rem; font-weight: 700; margin: 0 0 0.375rem; }
.wl-item { font-size: 0.8125rem; line-height: 1.4; }
.wl-who { font-weight: 700; }
.wl-why { color: #166534; }
.example-box { display: flex; align-items: flex-start; gap: 0.75rem; background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.example-icon { width: 30px; height: 30px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
.example-label { font-size: 0.8125rem; font-weight: 700; color: #1E40AF; margin: 0 0 0.25rem; }
.example-text { font-size: 0.8125rem; color: #1E40AF; margin: 0; line-height: 1.5; }

/* ── SUMMARY CARD ── */
.summary-sections { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 1rem; margin-bottom: 1.25rem; }
.summary-section { background: #F8FAFC; border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 1rem; }
.summary-section-num { font-size: 0.9375rem; font-weight: 700; color: #64748B; margin-bottom: 0.375rem; }
.summary-section-title { font-size: 0.875rem; font-weight: 700; color: #0F172A; margin-bottom: 0.625rem; }
.summary-section ul { margin: 0; padding: 0 0 0 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
.summary-section li { font-size: 0.8125rem; color: #475569; line-height: 1.4; }
.summary-cols { display: grid; gap: 0.5rem; }
.summary-cols.cols-2 { grid-template-columns: 1fr 1fr; }
.summary-cols.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.summary-mini-col { background: #fff; border-radius: 8px; padding: 0.5rem 0.625rem; }
.summary-mini-head { font-size: 0.75rem; font-weight: 700; margin-bottom: 0.125rem; }
.summary-mini-text { font-size: 0.75rem; color: #64748B; }
.flow-section { background: #F8FAFC; border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.flow-section-title { font-size: 0.875rem; font-weight: 700; color: #0F172A; margin: 0 0 1rem; }
.flow-diagram { display: flex; align-items: center; gap: 0; }
.flow-box { text-align: center; flex: 1; padding: 0.875rem 0.5rem; border-radius: 10px; }
.flow-box-label { font-size: 0.8125rem; font-weight: 700; white-space: pre-line; line-height: 1.3; margin-bottom: 0.375rem; }
.flow-box-sub { font-size: 0.6875rem; color: #64748B; }
.flow-arrow { color: #94A3B8; font-size: 1.25rem; padding: 0 0.25rem; flex-shrink: 0; }
.remember-box { background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 1rem; }
.remember-icon { width: 28px; height: 28px; background: #DBEAFE; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #2563EB; }
.remember-label { font-size: 0.8125rem; font-weight: 700; color: #1E40AF; margin: 0 0 0.25rem; }
.remember-text { font-size: 0.875rem; color: #1E40AF; margin: 0; line-height: 1.5; font-style: italic; }
.wl-summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

/* ── THINK PROMPT ── */
.think-prompt { display: flex; align-items: center; gap: 0.625rem; background: #FFFBEB; border: 1.5px solid #FCD34D; border-radius: 10px; padding: 0.875rem 1rem; margin-top: 1.25rem; }
.think-icon { width: 24px; height: 24px; flex-shrink: 0; color: #D97706; }
.think-label { font-size: 0.875rem; font-weight: 700; color: #92400E; margin-right: 0.375rem; }
.think-text { font-size: 0.875rem; color: #92400E; }

/* ── CARD NAV ── */
.card-nav { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2.5rem 1.5rem; border-top: 1px solid #F1F5F9; background: #fff; }
.btn-nav { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9375rem; font-weight: 600; color: #475569; background: #fff; border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 0.75rem 1.25rem; cursor: pointer; font-family: inherit; transition: all 0.12s; }
.btn-nav:hover:not(:disabled) { background: #F8FAFC; border-color: #CBD5E1; color: #0F172A; }
.btn-nav:disabled { opacity: 0.35; cursor: default; }
.btn-nav-primary { background: #2563EB; color: #fff; border-color: #2563EB; }
.btn-nav-primary:hover:not(:disabled) { background: #1D4ED8; border-color: #1D4ED8; color: #fff; }
.card-counter { font-size: 0.9375rem; font-weight: 500; color: #64748B; }

/* ── RIGHT PANEL ── */
.learn-right { width: 280px; min-width: 280px; background: #fff; border-left: 1px solid #E2E8F0; padding: 1.5rem 1.25rem; position: sticky; top: 56px; max-height: calc(100vh - 56px); overflow-y: auto; }
.right-heading { font-size: 0.9375rem; font-weight: 700; color: #0F172A; margin: 0 0 0.25rem; }
.right-subhead { font-size: 0.8125rem; color: #64748B; margin: 0 0 1rem; }
.step-dots { display: flex; align-items: center; gap: 0; margin-bottom: 1.25rem; }
.step-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 0.8125rem; font-weight: 700; color: #94A3B8; background: #fff; flex-shrink: 0; transition: all 0.2s; }
.step-dot.active { border-color: #2563EB; background: #2563EB; color: #fff; }
.step-dot.done { border-color: #16A34A; background: #16A34A; color: #fff; }
.step-line { flex: 1; height: 2px; background: #E2E8F0; }
.step-line.done { background: #16A34A; }
.right-cards-title { font-size: 0.8125rem; font-weight: 700; color: #0F172A; margin: 0 0 0.625rem; }
.right-cards-list { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1.25rem; }
.right-card-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.625rem; border-radius: 8px; cursor: pointer; transition: background 0.1s; }
.right-card-item:hover { background: #F8FAFC; }
.right-card-item.active { background: #F0FDF4; }
.right-card-num { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; font-weight: 700; color: #94A3B8; flex-shrink: 0; }
.right-card-num.active { border-color: #16A34A; background: #16A34A; color: #fff; }
.right-card-num.done { border-color: #16A34A; background: #16A34A; color: #fff; }
.right-card-label { font-size: 0.8125rem; color: #64748B; flex: 1; }
.right-card-label.active { font-weight: 700; color: #16A34A; }
.right-card-badge { font-size: 0.6875rem; font-weight: 600; background: #DCFCE7; color: #16A34A; padding: 0.125rem 0.5rem; border-radius: 6px; }
.right-card-check { color: #16A34A; flex-shrink: 0; }
.right-tip-card { border-radius: 12px; padding: 1rem; border: 1.5px solid; }
.right-tip-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.right-tip-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.right-tip-label { font-size: 0.8125rem; font-weight: 700; }
.right-tip-text { font-size: 0.8125rem; line-height: 1.5; margin: 0; }
.right-tip-sub { font-size: 0.8125rem; margin: 0.25rem 0 0; }
.right-tip-link { font-size: 0.8125rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.5rem; }

/* ── LOADING ── */
.learn-loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #94A3B8; font-size: 0.9375rem; }
</style>
</head>
<body>
<div id="loadingScreen" class="learn-loading">Loading…</div>
<div class="learn-shell" id="learnShell" style="display:none">

  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="db-logo">

  }
  return `
    <div class="lcard-label">Learn: Card 3 of ${topic.cards.length}</div>
    <h2 class="lcard-title">${c.title}</h2>
    <p class="lcard-subtitle">${c.intro}</p>

      <div class="wl-box" style="background:#F0FDF4;border:1.5px solid #BBF7D0">
        <div class="wl-icon" style="background:#DCFCE7;color:#16A34A">${IC.arrowUp}</div>
        <div>
          <div class="wl-title" style="color:#16A34A">Winners</div>
          ${c.winners.map(w => `<div style="font-size:0.8125rem;color:#166534">• ${w}</div>`).join('')}
        </div>
      </div>
      <div class="wl-box" style="background:#FEF2F2;border:1.5px solid #FECACA">
        <div class="wl-icon" style="background:#FEE2E2;color:#DC2626">${IC.arrowDown}</div>
        <div>
          <div class="wl-title" style="color:#DC2626">Losers</div>
          ${c.losers.map(l => `<div style="font-size:0.8125rem;color:#991B1B">• ${l}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="remember-box">
      <div class="remember-icon">${IC.bulb}</div>
      <div>
        <div class="remember-label">If you remember one thing…</div>
        <p class="remember-text">${c.rememberOne}</p>
      </div>
    </div>`;
}

function thinkPrompt(text) {
  return `<div class="think-prompt">
    <svg class="think-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 5 11.9V17H7v-3.1A7 7 0 0 1 12 2z"/></svg>
    <span class="think-label">Think</span>
    <span class="think-text">${text}</span>
  </div>`;
}

function renderCard(idx) {
  const c = topic.cards[idx];
  const renderers = { basic: renderBasic, comparison: renderComparison, mechanism: renderMechanism, impacts: renderImpacts, summary: renderSummary };
  return (renderers[c.type] || renderBasic)(c);
}

/* ── RIGHT PANEL ── */
function stepForCard(idx) {
  if (idx <= 2) return 0;
  if (idx === 3) return 1;
  return 2;
}

function renderRight(idx) {
  const c = topic.cards[idx];
  const total = topic.cards.length;
  const step = stepForCard(idx);
  const stepLabels = ['Core understanding', 'Application', 'Summary'];

  const dots = [0, 1, 2].map(i => {
    let cls = '';
    if (i < step || (i === step && completedCards.has(idx))) cls = 'done';
    else if (i === step) cls = 'active';
    return { cls, label: stepLabels[i] };
  });

  const dotsHtml = dots.map((d, i) => `
    ${i > 0 ? `<div class="step-line${d.cls === 'done' || (i <= step && step > 0) ? ' done' : ''}"></div>` : ''}
    <div class="step-dot ${d.cls}">${d.cls === 'done' ? IC.check : i + 1}</div>`).join('');

  const cardsHtml = topic.cards.map((card, i) => {
    const isDone = completedCards.has(i);
    const isActive = i === idx;
    return `<div class="right-card-item${isActive ? ' active' : ''}" onclick="jumpTo(${i})">
      <div class="right-card-num${isActive ? ' active' : isDone ? ' done' : ''}">${isDone ? IC.check : i + 1}</div>
      <div class="right-card-label${isActive ? ' active' : ''}">${card.title}</div>
      ${isActive ? '<span class="right-card-badge">Current</span>' : ''}
      ${isDone && !isActive ? `<span class="right-card-check">${IC.check}</span>` : ''}
    </div>`;
  }).join('');

  const tip = c.sideTip;
  let tipHtml = '';
  if (tip.type === 'complete') {
    tipHtml = `<div class="right-tip-card" style="background:#F0FDF4;border-color:#BBF7D0">
      <div class="right-tip-header">
        <div class="right-tip-icon" style="background:#DCFCE7;color:#16A34A">${IC.check}</div>
        <div class="right-tip-label" style="color:#16A34A">${tip.label}</div>
      </div>
    </div>
    <div class="right-tip-card" style="background:#F5F3FF;border-color:#DDD6FE;margin-top:0.75rem">
      <div class="right-tip-header">
        <div class="right-tip-icon" style="background:#EDE9FE;color:#7C3AED">${IC.grad}</div>
        <div class="right-tip-label" style="color:#7C3AED">What's next?</div>
      </div>
      <div style="font-size:0.9375rem;font-weight:700;color:#0F172A;margin-bottom:0.25rem">Quick check</div>
      <p class="right-tip-text" style="color:#64748B">Test your understanding with 10 exam-style questions.</p>
      <a href="learn-quiz.html?topic=${params().tid}" class="right-tip-link" style="color:#7C3AED">Go to quick check ${IC.arrow}</a>
    </div>`;
  } else if (tip.type === 'next') {
    tipHtml = `<div class="right-tip-card" style="background:${tip.bg};border-color:${tip.color}44">
      <div class="right-tip-header">
        <div class="right-tip-icon" style="background:${tip.color}22;color:${tip.color}">${IC.book}</div>
        <div class="right-tip-label" style="color:${tip.color}">${tip.label}</div>
      </div>
      <div style="font-size:0.875rem;font-weight:700;color:#0F172A;margin-bottom:0.25rem">${tip.title}</div>
      <p class="right-tip-text" style="color:#64748B">${tip.text}</p>
      <a href="#" class="right-tip-link" style="color:${tip.color}">${IC.arrow}</a>
    </div>`;
  } else {
    const iconMap = { focus: IC.star, exam: IC.grad };
    tipHtml = `<div class="right-tip-card" style="background:${tip.bg};border-color:${tip.color}44">
      <div class="right-tip-header">
        <div class="right-tip-icon" style="background:${tip.color}22;color:${tip.color}">${iconMap[tip.type] || IC.star}</div>
        <div class="right-tip-label" style="color:${tip.color}">${tip.label}</div>
      </div>
      <p class="right-tip-text" style="color:${tip.color}cc">${tip.text}</p>
    </div>`;
  }

  document.getElementById('rightPanel').innerHTML = `
    <div class="right-heading">Session progress</div>
    <div class="right-subhead">Step ${step + 1} of 3: ${stepLabels[step]}</div>
    <div class="step-dots">${dotsHtml}</div>
    <div class="right-cards-title">Cards</div>
    <div class="right-cards-list">${cardsHtml}</div>
    <div class="right-divider" style="height:1px;background:#F1F5F9;margin-bottom:0.875rem"></div>
    ${tipHtml}`;
}

/* ── NAVIGATION ── */
function updateProgress(idx) {
  const pct = Math.round((idx / topic.cards.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressDot').style.left = `calc(${pct}% - 8px)`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('cardCounter').textContent = `Card ${idx + 1} of ${topic.cards.length}`;

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.disabled = idx === 0;

  if (idx === topic.cards.length - 1) {
    btnNext.innerHTML = `Start quick check <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>`;
    btnNext.onclick = () => { window.location.href = `learn-quiz.html?topic=${params().tid}`; };
  } else {
    btnNext.innerHTML = `Next card <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>`;
    btnNext.onclick = () => navigate(1);
  }
}

function showCard(idx) {
  completedCards.add(currentCard);
  currentCard = idx;
  document.getElementById('cardContent').innerHTML = renderCard(idx);
  updateProgress(idx);
  renderRight(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  const next = currentCard + dir;
  if (next < 0 || next >= topic.cards.length) return;
  showCard(next);
}

function jumpTo(idx) { showCard(idx); }

function exitSession() { window.location.href = `learn-session.html?topic=${params().tid}`; }

/* ── INIT ── */
(async function init() {
  const { createClient } = supabase;
  const sb = createClient(window.ECONOS_CONFIG.supabaseUrl, window.ECONOS_CONFIG.supabaseAnonKey);
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const user = session.user;
  const name = user.user_metadata?.full_name || user.email || 'Student';
  const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const streak = parseInt(localStorage.getItem('econosStreak') || '1');

  ['topAvatar','sidebarAvatar'].forEach(id => document.getElementById(id).textContent = initials);
  ['topStreak','sidebarStreak'].forEach(id => document.getElementById(id).textContent = streak);
  document.getElementById('sidebarName').textContent = name;

  const { tid, card } = params();
  topic = window.ECONOS_TOPICS[tid];
  if (!topic) return;

  document.title = `econOS – ${topic.title}`;
  document.getElementById('breadTop').textContent = topic.sessionLabel;
  document.getElementById('breadTitle').textContent = topic.title;
  document.getElementById('backLink').href = `learn-session.html?topic=${tid}`;
  document.getElementById('backLink').title = 'Back to session overview';

  currentCard = Math.max(0, Math.min(card - 1, topic.cards.length - 1));
  showCard(currentCard);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
  });

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('learnShell').style.display = 'flex';
})();
</script>
