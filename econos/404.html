<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – econOS</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .error-container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 800;
      color: #e2e8f0;
      line-height: 1;
      margin: 0;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0.5rem 0 1rem;
    }
    .error-desc {
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.15s;
    }
    .btn-home:hover { background: #4f46e5; }
    .error-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <span class="error-icon">🔍</span>
    <p class="error-code">404</p>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">
      The page you're looking for doesn't exist or has been moved.
      Try heading back to the dashboard.
    </p>
    <a href="login.html" class="btn-home">Go to dashboard</a>
  </div>
  <script>
    const depth = (window.location.pathname.match(/\//g) || []).length;
    const prefix = depth > 2 ? '../' : '';
    document.querySelector('.btn-home').href = prefix + 'login.html';
  </script>
</body>
</html>
