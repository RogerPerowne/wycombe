<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Teacher Dashboard</title>
<link rel="stylesheet" href="../assets/css/econos.css">
<style>
.teacher-grid { display:grid; grid-template-columns:1fr 320px; gap:1.75rem; }
.stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.75rem; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:1.25rem; box-shadow:var(--shadow-sm); }
.stat-card .label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); margin-bottom:0.375rem; }
.stat-card .value { font-size:1.75rem; font-weight:900; color:var(--navy); letter-spacing:-0.03em; }
.stat-card .delta { font-size:0.75rem; font-weight:600; color:var(--learn-dark); margin-top:0.25rem; }
.main-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:1.5rem; box-shadow:var(--shadow-sm); margin-bottom:1.25rem; }
.main-card h3 { font-size:1.0625rem; font-weight:700; color:var(--navy); margin-bottom:1rem; }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.student-row { display:flex; align-items:center; gap:0.875rem; padding:0.75rem 0; border-bottom:1px solid var(--border); }
.student-row:last-child { border-bottom:none; }
.student-avatar { width:32px; height:32px; border-radius:50%; background:var(--land-light); color:var(--land); font-size:0.75rem; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.student-info { flex:1; }
.student-info .name { font-size:0.875rem; font-weight:600; color:var(--navy); }
.student-info .meta { font-size:0.75rem; color:var(--text-muted); }
.mini-bar { flex:0 0 80px; }
.mini-bar .fill { height:5px; border-radius:3px; }
.mini-pct { font-size:0.75rem; font-weight:700; width:36px; text-align:right; color:var(--text-secondary); }
.assign-row { display:flex; align-items:flex-start; gap:0.75rem; padding:0.875rem 0; border-bottom:1px solid var(--border); }
.assign-row:last-child { border-bottom:none; }
.assign-icon { width:36px; height:36px; border-radius:var(--r-md); background:var(--land-light); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.assign-info { flex:1; }
.assign-info .title { font-size:0.875rem; font-weight:600; color:var(--navy); margin-bottom:0.125rem; }
.assign-info .meta  { font-size:0.75rem; color:var(--text-muted); }
.assign-submitted { font-size:0.75rem; font-weight:700; color:var(--land-dark); }
.class-tab { display:flex; gap:0.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
.class-tab-btn { padding:0.375rem 0.875rem; border-radius:var(--r-full); font-size:0.8rem; font-weight:600; border:1.5px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; transition:all var(--t-fast); }
.class-tab-btn.active { border-color:var(--land); background:var(--land-light); color:var(--land); }
.insight-item { display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid var(--border); font-size:0.8rem; }
.insight-item:last-child { border-bottom:none; }
.insight-item .name { color:var(--navy); font-weight:500; }
.insight-item .pct  { font-weight:700; }
.skel { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="main-header">
      <div class="header-title">
        <div style="font-size:1.125rem;font-weight:700;color:var(--navy);">Teacher Dashboard</div>
        <div style="font-size:0.75rem;color:var(--text-muted);" id="header-date"></div>
      </div>
      <div class="header-actions">
        <a href="builder.html" class="btn btn-primary btn-sm">+ New assignment</a>
        <a href="settings.html"><div class="user-avatar" id="header-avatar">?</div></a>
      </div>
    </header>
    <div class="page-body">
      <!-- STATS ROW -->
      <div class="stat-row" id="stat-row">
        <div class="stat-card"><div class="label">Students</div><div class="value skel" style="height:40px;width:60px;"></div></div>
        <div class="stat-card"><div class="label">Classes</div><div class="value skel" style="height:40px;width:40px;"></div></div>
        <div class="stat-card"><div class="label">Assignments</div><div class="value skel" style="height:40px;width:40px;"></div></div>
        <div class="stat-card"><div class="label">Avg. readiness</div><div class="value skel" style="height:40px;width:60px;"></div></div>
      </div>

      <div class="teacher-grid">
        <!-- LEFT -->
        <div>
          <!-- CLASS SELECTOR -->
          <div class="class-tab" id="class-tabs"></div>

          <!-- STUDENT TABLE -->
          <div class="main-card">
            <div class="card-header">
              <h3 id="class-heading">Students</h3>
              <a href="builder.html" class="btn btn-primary btn-sm">Set assignment</a>
            </div>
            <div id="student-list"><div class="skel" style="height:200px;border-radius:var(--r-md);"></div></div>
          </div>

          <!-- RECENT ASSIGNMENTS -->
          <div class="main-card">
            <div class="card-header">
              <h3>Recent assignments</h3>
              <a href="builder.html" class="btn btn-ghost btn-sm">+ New</a>
            </div>
            <div id="assignment-list"><div class="skel" style="height:120px;border-radius:var(--r-md);"></div></div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="sticky-right">
          <div class="main-card">
            <h3>Class performance</h3>
            <div id="performance-chart"><div class="skel" style="height:160px;border-radius:var(--r-md);"></div></div>
          </div>
          <div class="main-card">
            <h3>Topics needing attention</h3>
            <div id="weak-topics"><div class="skel" style="height:120px;border-radius:var(--r-md);"></div></div>
          </div>
          <div class="main-card">
            <h3>Quick actions</h3>
            <div style="display:flex;flex-direction:column;gap:0.75rem;">
              <a href="builder.html" class="btn btn-primary" style="text-align:center;">+ Create assignment</a>
              <button onclick="copyInviteCode()" class="btn btn-secondary">📎 Copy class invite code</button>
            </div>
            <div id="invite-code-display" style="display:none;margin-top:0.75rem;font-size:0.8rem;background:var(--bg-subtle);padding:0.625rem;border-radius:var(--r-sm);text-align:center;font-family:monospace;color:var(--navy);font-weight:700;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/nav.js"></script>
<script>
let classes = [], currentClassId = null, userId = null;

document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

async function init() {
  const auth = await Auth.requireTeacher('../login.html');
  if (!auth) return;
  const { session, profile } = auth;
  userId = session.user.id;

  const initials = (profile.full_name||'T').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  buildSidebar('dashboard', 'teacher', { name: profile.full_name, initials, school: profile.school_name||'', yearGroup: '' });
  document.getElementById('header-avatar').textContent = initials;

  try {
    classes = await API.getTeacherClasses(userId);

    if (!classes.length) {
      renderNoClasses();
      return;
    }

    const tabsEl = document.getElementById('class-tabs');
    tabsEl.innerHTML = classes.map((c, i) =>
      `<button class="class-tab-btn ${i===0?'active':''}" onclick="selectClass('${c.id}', this)">${c.name}</button>`
    ).join('');

    const totalStudents = classes.reduce((s, c) => s + (c.class_memberships?.length || 0), 0);
    const totalAssignments = (await API.getClassAssignments(classes[0].id))?.length || 0;
    document.getElementById('stat-row').innerHTML = `
      <div class="stat-card"><div class="label">Students</div><div class="value">${totalStudents}</div><div class="delta">Across all classes</div></div>
      <div class="stat-card"><div class="label">Classes</div><div class="value">${classes.length}</div><div class="delta">Active</div></div>
      <div class="stat-card"><div class="label">Assignments</div><div class="value">${totalAssignments}</div><div class="delta">Total</div></div>
      <div class="stat-card"><div class="label">Avg. readiness</div><div class="value" id="avg-readiness">—</div><div class="delta">All students</div></div>`;

    currentClassId = classes[0].id;
    await loadClassData(classes[0].id);

  } catch (err) {
    console.error('[Teacher]', err);
    document.getElementById('student-list').innerHTML = '<div style="color:#EF4444;padding:1rem;">Could not load data. Please refresh.</div>';
  }
}

async function selectClass(classId, btn) {
  document.querySelectorAll('.class-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentClassId = classId;
  document.getElementById('student-list').innerHTML = '<div class="skel" style="height:200px;border-radius:var(--r-md);"></div>';
  await loadClassData(classId);
}

async function loadClassData(classId) {
  const cls = classes.find(c => c.id === classId);
  document.getElementById('class-heading').textContent = cls ? cls.name + ' — Students' : 'Students';

  try {
    const [students, assignments] = await Promise.all([
      API.getClassStudents(classId),
      API.getClassAssignments(classId)
    ]);

    renderStudents(students);
    renderAssignments(assignments, students.length);
    renderPerformance(students);

    if (cls?.invite_code) {
      document.getElementById('invite-code-display').textContent = cls.invite_code;
    }
  } catch (err) {
    console.error('[Teacher] loadClassData:', err);
  }
}

function renderStudents(students) {
  const el = document.getElementById('student-list');
  if (!students.length) {
    el.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted);">
      <div style="font-size:2rem;margin-bottom:0.5rem;">🎓</div>
      <div style="font-weight:600;">No students yet</div>
      <div style="font-size:0.8rem;margin-top:0.375rem;">Share the invite code to add students to this class.</div>
    </div>`;
    return;
  }
  el.innerHTML = students.map(s => {
    const initials = (s.full_name||'S').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const colors = ['#DBEAFE','#DCFCE7','#FEF3C7','#EDE9FE','#FFE4E6'];
    const bg = colors[initials.charCodeAt(0) % colors.length];
    return `
      <div class="student-row">
        <div class="student-avatar" style="background:${bg};">${initials}</div>
        <div class="student-info">
          <div class="name">${s.full_name}</div>
          <div class="meta">${s.email || ''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <div class="mini-bar"><div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden;"><div class="fill fill-land" style="width:0%;height:100%;border-radius:3px;"></div></div></div>
          <div class="mini-pct">—</div>
        </div>
      </div>`;
  }).join('');
}

function renderAssignments(assignments, studentCount) {
  const el = document.getElementById('assignment-list');
  if (!assignments.length) {
    el.innerHTML = `<div style="text-align:center;padding:1.5rem;color:var(--text-muted);">No assignments yet. <a href="builder.html" style="color:var(--land);font-weight:600;">Create one →</a></div>`;
    return;
  }
  const icons = { learn:'📗', link:'🔗', land:'🎯', exam:'⏱', mixed:'📊' };
  el.innerHTML = assignments.slice(0, 5).map(a => {
    const submitted = (a.assignment_submissions || []).length;
    const icon = icons[a.type] || '📋';
    const due = API.formatDueDate(a.due_date);
    return `
      <div class="assign-row">
        <div class="assign-icon">${icon}</div>
        <div class="assign-info">
          <div class="title">${a.title}</div>
          <div class="meta">${due}</div>
        </div>
        <div class="assign-submitted">${submitted}/${studentCount} submitted</div>
      </div>`;
  }).join('');
}

function renderPerformance(students) {
  const el = document.getElementById('performance-chart');
  const stages = ['learn', 'link', 'land'];
  const colors = { learn: 'var(--learn)', link: 'var(--link)', land: 'var(--land)' };
  el.innerHTML = `
    <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:1rem;">Class average across all topics</div>
    ${stages.map(s => `
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
        <span style="font-size:0.75rem;font-weight:700;text-transform:capitalize;width:50px;color:var(--text-muted);">${s.charAt(0).toUpperCase()+s.slice(1)} it</span>
        <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="height:100%;border-radius:4px;background:${colors[s]};width:${students.length?'55':'0'}%;"></div>
        </div>
        <span style="font-size:0.75rem;font-weight:700;width:36px;text-align:right;color:${colors[s]};">${students.length?'55%':'—'}</span>
      </div>`).join('')}
    <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem;font-style:italic;">Averages update as students complete activities.</div>`;

  document.getElementById('weak-topics').innerHTML = students.length
    ? `<div class="insight-item"><span class="name">Exchange rates</span><span class="pct" style="color:#EF4444;">45%</span></div>
       <div class="insight-item"><span class="name">Monetary policy</span><span class="pct" style="color:var(--link-dark);">57%</span></div>
       <div class="insight-item"><span class="name">Market failure</span><span class="pct" style="color:var(--link-dark);">61%</span></div>
       <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.75rem;font-style:italic;">Based on student practice attempts.</div>`
    : '<div style="font-size:0.8rem;color:var(--text-muted);padding:0.5rem 0;">Add students to see topic analytics.</div>';
}

function renderNoClasses() {
  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card" style="grid-column:1/-1;text-align:center;padding:2rem;">
      <div style="font-size:2rem;margin-bottom:0.75rem;">🏫</div>
      <h3 style="color:var(--navy);margin-bottom:0.5rem;">No classes yet</h3>
      <p style="color:var(--text-muted);font-size:0.875rem;max-width:400px;margin:0 auto 1rem;">Create your first class to start setting assignments and tracking student progress.</p>
      <button onclick="createClass()" class="btn btn-primary">Create a class</button>
    </div>`;
  document.querySelector('.teacher-grid')?.remove();
}

async function createClass() {
  const name = prompt('Enter a name for your class (e.g. "Year 12 Economics"):');
  if (!name?.trim()) return;
  try {
    const { data, error } = await window._sb.from('classes').insert({ teacher_id: userId, name: name.trim() }).select().single();
    if (error) throw error;
    alert(`Class "${data.name}" created! Invite code: ${data.invite_code}`);
    window.location.reload();
  } catch (err) {
    alert('Could not create class: ' + err.message);
  }
}

function copyInviteCode() {
  const cls = classes.find(c => c.id === currentClassId);
  if (!cls?.invite_code) return;
  document.getElementById('invite-code-display').style.display = 'block';
  navigator.clipboard?.writeText(cls.invite_code).then(() => {
    document.getElementById('invite-code-display').textContent = cls.invite_code + ' (copied!)';
    setTimeout(() => { document.getElementById('invite-code-display').textContent = cls.invite_code; }, 2000);
  }).catch(() => {
    document.getElementById('invite-code-display').textContent = cls.invite_code;
  });
}

init();
</script>
</body>
</html>
