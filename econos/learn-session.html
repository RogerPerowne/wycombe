<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Learn Session</title>
<link rel="stylesheet" href="assets/css/econos.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #0F172A; }

.learn-shell { display: flex; min-height: 100vh; max-width: 1480px; margin: 0 auto; background: #F8FAFC; border-left: 1px solid #E2E8F0; border-right: 1px solid #E2E8F0; }

/* ── SIDEBAR ── */
.dash-sidebar { width: 232px; min-width: 232px; background: #fff; border-right: 1px solid #E2E8F0; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; z-index: 20; overflow-y: auto; }
.db-logo { padding: 1.375rem 1.25rem 1rem; border-bottom: 1px solid #F1F5F9; flex-shrink: 0; }
.db-logo-graph { width: 36px; height: 28px; margin-bottom: 5px; display: block; }
.db-logo-wordmark { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.03em; color: #0F172A; }
.db-logo-wordmark .os { color: #2563EB; }
.db-logo-tagline { font-size: 0.75rem; font-weight: 500; margin-top: 2px; }
.tl { color: #16A34A; } .tli { color: #EA580C; } .tla { color: #2563EB; }
.db-nav { flex: 1; padding: 0.625rem; display: flex; flex-direction: column; gap: 0.125rem; }
.nav-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.5625rem 0.75rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; color: #475569; cursor: pointer; transition: background 0.12s, color 0.12s; text-decoration: none; }
.nav-item:hover { background: #F8FAFC; color: #0F172A; }
.nav-item.active { background: #EFF6FF; color: #2563EB; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.db-sidebar-footer { padding: 0.875rem 0.75rem; border-top: 1px solid #F1F5F9; flex-shrink: 0; }
.streak-card { background: #F8FAFC; border-radius: 12px; padding: 0.875rem 1rem; display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.625rem; }
.streak-num { font-size: 1.25rem; font-weight: 800; color: #0F172A; }
.streak-label { font-size: 0.75rem; font-weight: 700; color: #0F172A; line-height: 1.2; }
.streak-sub { font-size: 0.6875rem; color: #64748B; }
.user-pill { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; border-radius: 10px; cursor: pointer; }
.user-pill:hover { background: #F8FAFC; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2563EB; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-info-name { font-size: 0.8125rem; font-weight: 600; color: #0F172A; }
.user-info-role { font-size: 0.75rem; color: #64748B; }

/* ── BODY ── */
.learn-body { flex: 1; display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }

/* ── TOPBAR ── */
.learn-topbar { background: #fff; border-bottom: 1px solid #E2E8F0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 10; }
.topbar-back { display: flex; align-items: center; gap: 0.375rem; font-size: 0.875rem; font-weight: 500; color: #475569; text-decoration: none; padding: 0.375rem 0.5rem; border-radius: 6px; transition: background 0.12s; }
.topbar-back:hover { background: #F8FAFC; color: #0F172A; }
.topbar-right { display: flex; align-items: center; gap: 0.875rem; }
.streak-badge { display: flex; align-items: center; gap: 0.375rem; font-size: 0.875rem; font-weight: 600; color: #0F172A; }
.topbar-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2563EB; display: flex; align-items: center; justify-content: center; font-size: 0.8125rem; font-weight: 700; color: #fff; cursor: pointer; }

/* ── CONTENT ROW ── */
.learn-content-row { display: flex; flex: 1; align-items: flex-start; }
.learn-main { flex: 1; padding: 2.5rem 2rem 3rem 2.5rem; min-width: 0; }

/* ── SESSION CARD ── */
.session-card { background: #fff; border: 1.5px solid #E2E8F0; border-radius: 16px; padding: 2rem 2rem 1.75rem; margin-bottom: 1.5rem; }
.session-label { font-size: 0.8125rem; font-weight: 700; color: #16A34A; letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 0.75rem; }
.session-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1.5rem; margin-bottom: 1.75rem; }
.session-title { font-size: 2rem; font-weight: 800; color: #0F172A; letter-spacing: -0.03em; line-height: 1.15; margin: 0 0 0.75rem; }
.session-subtitle { font-size: 0.9375rem; color: #64748B; line-height: 1.55; margin: 0; max-width: 400px; }
.session-chart { flex-shrink: 0; width: 180px; }

/* ── WHAT YOU'LL DO ── */
.session-what { background: #F0FDF4; border: 1.5px solid #BBF7D0; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; display: flex; align-items: flex-start; gap: 1.25rem; }
.session-what-icon { width: 40px; height: 40px; background: #DCFCE7; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #16A34A; }
.session-what-content { flex: 1; }
.session-what-title { font-size: 0.9375rem; font-weight: 700; color: #16A34A; margin: 0 0 0.375rem; }
.session-what-desc { font-size: 0.875rem; color: #166534; margin: 0 0 0.75rem; line-height: 1.5; }
.session-outcomes { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.375rem; }
.session-outcomes li { font-size: 0.875rem; color: #166534; display: flex; align-items: center; gap: 0.5rem; }
.outcome-check { width: 18px; height: 18px; background: #16A34A; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ── TIP ── */
.session-tip { background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: flex-start; gap: 0.875rem; }
.session-tip-icon { width: 32px; height: 32px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
.session-tip-label { font-size: 0.875rem; font-weight: 700; color: #1E40AF; margin: 0 0 0.25rem; }
.session-tip-text { font-size: 0.875rem; color: #1E40AF; margin: 0; line-height: 1.55; }

/* ── ACTION BAR ── */
.session-action-bar { background: #fff; border: 1.5px solid #E2E8F0; border-radius: 14px; padding: 1.25rem 1.75rem; display: flex; align-items: center; gap: 1.5rem; }
.action-meta { display: flex; align-items: center; gap: 0.625rem; flex: 1; }
.action-meta-icon { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; color: #475569; flex-shrink: 0; }
.action-meta-label { font-size: 0.75rem; color: #64748B; margin: 0 0 0.125rem; }
.action-meta-value { font-size: 0.875rem; font-weight: 600; color: #0F172A; margin: 0; }
.action-sep { width: 1px; height: 40px; background: #E2E8F0; flex-shrink: 0; }
.action-cta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.375rem; flex-shrink: 0; }
.btn-start { display: flex; align-items: center; gap: 0.5rem; padding: 0.8125rem 2rem; background: #2563EB; color: #fff; font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
.btn-start:hover { background: #1D4ED8; }
.action-hint { font-size: 0.75rem; color: #94A3B8; display: flex; align-items: center; gap: 0.25rem; }

/* ── RIGHT PANEL ── */
.learn-right { width: 280px; min-width: 280px; background: #fff; border-left: 1px solid #E2E8F0; padding: 2rem 1.5rem; position: sticky; top: 56px; max-height: calc(100vh - 56px); overflow-y: auto; }
.right-heading { font-size: 0.9375rem; font-weight: 700; color: #0F172A; margin: 0 0 1.25rem; }

/* ── STAGES ── */
.stages-list { display: flex; flex-direction: column; gap: 0; }
.stage-item { display: flex; align-items: flex-start; gap: 0.75rem; position: relative; padding-bottom: 1.5rem; }
.stage-item:last-child { padding-bottom: 0; }
.stage-item::before { content: ''; position: absolute; left: 16px; top: 33px; width: 2px; background: #E2E8F0; bottom: 0; }
.stage-item:last-child::before { display: none; }
.stage-num { width: 33px; height: 33px; border-radius: 50%; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 700; color: #94A3B8; flex-shrink: 0; background: #fff; z-index: 1; transition: all 0.2s; }
.stage-num.current { border-color: #2563EB; color: #2563EB; background: #EFF6FF; }
.stage-num.done { border-color: #16A34A; background: #16A34A; color: #fff; }
.stage-content { padding-top: 0.375rem; }
.stage-name { font-size: 0.9375rem; font-weight: 700; color: #0F172A; margin: 0 0 0.25rem; }
.stage-name.current { color: #2563EB; }
.stage-desc { font-size: 0.8125rem; color: #64748B; margin: 0 0 0.5rem; line-height: 1.4; }
.stage-badge-current { display: inline-flex; align-items: center; background: #E0F2FE; color: #0369A1; font-size: 0.75rem; font-weight: 600; padding: 0.1875rem 0.625rem; border-radius: 6px; }
.stage-lock { display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem; color: #94A3B8; }

/* ── LOADING ── */
.learn-loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #94A3B8; font-size: 0.9375rem; }
</style>
</head>
<body>
<div id="loadingScreen" class="learn-loading">Loading…</div>
<div class="learn-shell" id="learnShell" style="display:none">

  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="db-logo">
      <svg class="db-logo-graph" viewBox="0 0 48 36" fill="none"><circle cx="6" cy="28" r="5" fill="#22C55E"/><circle cx="24" cy="16" r="6" fill="#F59E0B"/><circle cx="42" cy="6" r="7" fill="#2563EB"/><line x1="10.5" y1="25.5" x2="19" y2="19" stroke="#CBD5E1" stroke-width="1.5"/><line x1="29" y1="13" x2="36" y2="9" stroke="#CBD5E1" stroke-width="1.5"/></svg>
      <div class="db-logo-wordmark">econ<span class="os">OS</span></div>
      <div class="db-logo-tagline"><span class="tl">Learn it.</span> <span class="tli">Link it.</span> <span class="tla">Land it.</span></div>
    </div>
    <nav class="db-nav">
      <a class="nav-item" href="dashboard.html"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home</a>
      <a class="nav-item active" href="#"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>My topics</a>
      <a class="nav-item" href="#"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>Progress</a>
      <a class="nav-item" href="#"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></span>Exam practice</a>
      <a class="nav-item" href="#"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>Study planner</a>
      <a class="nav-item" href="#"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Messages</a>
      <a class="nav-item" href="#"><span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M1 12h2M21 12h2M12 1v2M12 21v2"/></svg></span>Settings</a>
    </nav>
    <div class="db-sidebar-footer">
      <div class="streak-card">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#EA580C"><path d="M12 2C8.5 7 6 9.5 6 14a6 6 0 0 0 12 0c0-4.5-2.5-7-6-12z"/></svg>

        <svg style="margin-left:auto;color:#94A3B8" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>

  <!-- BODY -->
  <div class="learn-body">
    <!-- TOPBAR -->
    <header class="learn-topbar">
      <a class="topbar-back" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to dashboard
      </a>
      <div class="topbar-right">
        <span class="streak-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#EA580C"><path d="M12 2C8.5 7 6 9.5 6 14a6 6 0 0 0 12 0c0-4.5-2.5-7-6-12z"/></svg>
          <span id="topStreak">1</span> day streak
        </span>
        <div class="topbar-avatar" id="topAvatar">AB</div>
        <svg style="color:#94A3B8;cursor:pointer" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>

    <!-- CONTENT ROW -->
    <div class="learn-content-row">
      <main class="learn-main">
        <div class="session-card" id="sessionCard">
          <!-- injected by JS -->
        </div>
        <div class="session-action-bar" id="actionBar">
          <!-- injected by JS -->
        </div>
      </main>

      <!-- RIGHT PANEL -->
      <aside class="learn-right">

<script src="assets/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/topics-data.js"></script>
<script>
const CHART_SVG = `<svg viewBox="0 0 180 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%">
  <rect x="20" y="72" width="30" height="40" rx="4" fill="#A5B4FC"/>
  <rect x="58" y="50" width="30" height="62" rx="4" fill="#818CF8"/>
  <rect x="96" y="24" width="30" height="88" rx="4" fill="#4F46E5"/>
  <path d="M30 68 L65 44 L102 20" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
  <polygon points="102,12 112,22 98,24" fill="#16A34A"/>
  <rect x="4" y="14" width="28" height="16" rx="8" fill="#DCFCE7"/>
  <text x="18" y="26" font-size="9" fill="#16A34A" text-anchor="middle" font-weight="700">↑ 10%</text>
</svg>`;

const TICK_SVG = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const LOCK_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;

function topicId() {
  return new URLSearchParams(location.search).get('topic') || 'inflation';
}

(async function init() {
  const { createClient } = supabase;
  const sb = createClient(window.ECONOS_CONFIG.supabaseUrl, window.ECONOS_CONFIG.supabaseAnonKey);
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const user = session.user;
  const name = user.user_metadata?.full_name || user.email || 'Student';
  const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  const streak = parseInt(localStorage.getItem('econosStreak') || '1');

  ['topAvatar','sidebarAvatar'].forEach(id => document.getElementById(id).textContent = initials);
  ['topStreak','sidebarStreak'].forEach(id => document.getElementById(id).textContent = streak);
  document.getElementById('sidebarName').textContent = name;

  const tid = topicId();
  const topic = window.ECONOS_TOPICS[tid];
  if (!topic) { document.getElementById('sessionCard').innerHTML = '<p style="color:#EF4444">Topic not found.</p>'; return; }

  document.title = `econOS – ${topic.title}`;

  document.getElementById('sessionCard').innerHTML = `
    <div class="session-label">${topic.sessionLabel.toUpperCase()}</div>
    <div class="session-header">
      <div>
        <h1 class="session-title">${topic.title}</h1>
        <p class="session-subtitle">${topic.intro}</p>
      </div>
      <div class="session-chart">${CHART_SVG}</div>
    </div>
    <div class="session-what">
      <div class="session-what-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="session-what-content">
        <div class="session-what-title">What you'll do in this session</div>
        <div class="session-what-desc">${topic.whatYoullDo.desc}</div>
        <ul class="session-outcomes">
          ${topic.whatYoullDo.outcomes.map(o => `<li><span class="outcome-check">${TICK_SVG}</span>${o}</li>`).join('')}
        </ul>
      </div>
    </div>
    <div class="session-tip">
      <div class="session-tip-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div>
        <div class="session-tip-label">Tip</div>
        <p class="session-tip-text">${topic.orientationTip}</p>
      </div>
    </div>`;

  document.getElementById('actionBar').innerHTML = `
    <div class="action-meta">
      <div class="action-meta-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div><p class="action-meta-label">Estimated time</p><p class="action-meta-value">${topic.estimatedTime}</p></div>
    </div>
    <div class="action-sep"></div>
    <div class="action-meta">
      <div class="action-meta-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <div><p class="action-meta-label">Your goal</p><p class="action-meta-value">${topic.goal}</p></div>
    </div>
    <div class="action-cta">
      <button class="btn-start" onclick="startSession()">Start session &rarr;</button>
      <span class="action-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        Press Enter
      </span>
    </div>`;

  const stages = [
    { name: 'Learn', desc: 'Build your understanding', status: 'current' },
    { name: 'Master', desc: 'Apply in exam-style questions', status: 'locked' },
    { name: 'Review', desc: 'See your progress and next steps', status: 'locked' }
  ];
  document.getElementById('stagesList').innerHTML = stages.map((s, i) => `
    <div class="stage-item">
      <div class="stage-num ${s.status === 'current' ? 'current' : ''}">${s.status === 'done' ? TICK_SVG : i + 1}</div>
      <div class="stage-content">
        <div class="stage-name${s.status === 'current' ? ' current' : ''}">${s.name}</div>
        <div class="stage-desc">${s.desc}</div>
        ${s.status === 'current' ? '<span class="stage-badge-current">Current</span>' : `<span class="stage-lock">${LOCK_SVG} Locked</span>`}
      </div>
    </div>`).join('');

  document.addEventListener('keydown', e => { if (e.key === 'Enter') startSession(); });

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('learnShell').style.display = 'flex';
})();

function startSession() {
  const tid = topicId();
  window.location.href = `learn-cards.html?topic=${tid}&card=1`;
}
</script>
</body>
</html>
