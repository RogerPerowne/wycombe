<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Dashboard</title>
<link rel="stylesheet" href="assets/css/econos.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #0F172A; }

/* ── LAYOUT ── */
.dash-layout {
  display: flex;
  min-height: 100vh;
  max-width: 1480px;
  margin: 0 auto;
  background: #F8FAFC;
  border-left: 1px solid #E2E8F0;
  border-right: 1px solid #E2E8F0;
}

/* ── SIDEBAR ── */
.dash-sidebar {
  width: 232px; min-width: 232px;
  background: #fff;
  border-right: 1px solid #E2E8F0;
  display: flex; flex-direction: column;
  position: sticky; top: 0; align-self: flex-start;
  height: 100vh;
  z-index: 20; overflow-y: auto;
}
.db-logo {
  padding: 1.375rem 1.25rem 1rem;
  border-bottom: 1px solid #F1F5F9;
  flex-shrink: 0;
}
.db-logo-graph { width: 36px; height: 28px; margin-bottom: 5px; display: block; }
.db-logo-wordmark { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.03em; color: #0F172A; }
.db-logo-wordmark .os { color: #2563EB; }
.db-logo-tagline { font-size: 0.75rem; font-weight: 500; margin-top: 2px; }
.tl { color: #16A34A; } .tli { color: #EA580C; } .tla { color: #2563EB; }

.db-nav {
  flex: 1; padding: 0.625rem 0.625rem;
  display: flex; flex-direction: column; gap: 0.125rem;
}
.nav-item {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.5625rem 0.75rem; border-radius: 8px;
  font-size: 0.875rem; font-weight: 500; color: #475569;
  cursor: pointer; transition: background 0.12s, color 0.12s;
  text-decoration: none;
}
.nav-item:hover { background: #F8FAFC; color: #0F172A; }
.nav-item.active { background: #EFF6FF; color: #2563EB; font-weight: 600; }
.nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-lock {
  margin-left: auto; font-size: 0.625rem; font-weight: 700;
  background: #F1F5F9; color: #94A3B8;
  padding: 0.125rem 0.375rem; border-radius: 4px;
}

.db-sidebar-footer { padding: 0.875rem 0.75rem; border-top: 1px solid #F1F5F9; flex-shrink: 0; }
.db-sidebar-card { background: #F8FAFC; border-radius: 12px; padding: 1rem; }
.db-sidebar-card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 0.625rem;
}
.db-sidebar-card-title { font-size: 0.8125rem; font-weight: 700; color: #0F172A; margin-bottom: 0.25rem; }
.db-sidebar-card-body { font-size: 0.75rem; color: #64748B; line-height: 1.5; }
.db-sidebar-card-btn {
  display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.75rem;
  font-size: 0.8125rem; font-weight: 600; color: #16A34A;
  border: 1.5px solid #16A34A; border-radius: 8px; padding: 0.375rem 0.75rem;
  background: transparent; cursor: pointer; text-decoration: none;
}
.db-child-pill {
  display: flex; align-items: center; gap: 0.625rem; margin-top: 0.75rem;
  padding: 0.625rem 0.75rem; background: #fff;
  border: 1.5px solid #E2E8F0; border-radius: 10px; cursor: pointer;
}
.db-child-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.db-child-name { font-size: 0.8125rem; font-weight: 600; color: #0F172A; }
.db-child-sub { font-size: 0.75rem; color: #64748B; }
.db-child-chevron { margin-left: auto; color: #94A3B8; }

/* ── BODY ── */
.dash-body { flex: 1; display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }

/* ── TOPBAR ── */
.dash-topbar {
  background: #fff; border-bottom: 1px solid #E2E8F0;
  height: 56px; display: flex; align-items: center; justify-content: flex-end;
  padding: 0 2rem; gap: 0.875rem;
  position: sticky; top: 0; z-index: 10;
}
.topbar-greeting { font-size: 0.9375rem; font-weight: 500; color: #334155; }
.topbar-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8125rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.topbar-bell {
  position: relative; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: #F8FAFC; cursor: pointer; color: #64748B;
}
.topbar-bell-dot {
  position: absolute; top: 6px; right: 6px;
  width: 8px; height: 8px; background: #EF4444;
  border-radius: 50%; border: 2px solid #fff;
}
.topbar-user { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
.topbar-user-name { font-size: 0.875rem; font-weight: 600; color: #0F172A; text-align: right; }
.topbar-user-role { font-size: 0.75rem; color: #64748B; text-align: right; }
.topbar-chevron { color: #94A3B8; }

/* ── CONTENT ROW ── */
.dash-content-row { display: flex; flex: 1; align-items: flex-start; }

/* ── MAIN ── */
.dash-main { flex: 1; padding: 2rem 2rem 3rem 2.5rem; min-width: 0; }

/* ── PAGE HEADER ── */
.db-page-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.75rem; }
.db-header-icon {
  width: 56px; height: 56px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.db-header-text h1 {
  font-size: 1.875rem; font-weight: 800; color: #0F172A;
  letter-spacing: -0.025em; margin: 0 0 0.25rem; line-height: 1.2;
}
.db-header-text p { font-size: 0.9375rem; color: #64748B; margin: 0; line-height: 1.5; }

/* ── TOPIC CARD ── */
.db-topic-card {
  background: #fff; border: 1.5px solid #E2E8F0;
  border-radius: 16px; padding: 1.75rem; margin-bottom: 1.5rem;
}
.topic-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
.topic-info { flex: 1; }
.topic-label { font-size: 0.8125rem; font-weight: 600; color: #64748B; margin-bottom: 0.5rem; }
.topic-label.green { color: #16A34A; }
.topic-title { font-size: 1.625rem; font-weight: 800; color: #0F172A; letter-spacing: -0.025em; margin: 0 0 0.625rem; line-height: 1.2; }
.topic-desc { font-size: 0.875rem; color: #64748B; margin: 0; line-height: 1.55; max-width: 380px; }
.topic-chart { flex-shrink: 0; width: 160px; margin-left: 1.5rem; }

/* ── PHASE GRID ── */
.topic-phases { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.phase-card { background: #F8FAFC; border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 1rem; }
.phase-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
.phase-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.phase-name { font-size: 0.9375rem; font-weight: 700; }
.phase-name.learn { color: #16A34A; }
.phase-name.link  { color: #D97706; }
.phase-name.land  { color: #2563EB; }
.phase-header-lock { color: #CBD5E1; display: flex; align-items: center; }
.phase-desc { font-size: 0.8125rem; color: #475569; line-height: 1.5; margin: 0.375rem 0 0.75rem; }

.phase-badge {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.8125rem; font-weight: 600;
  padding: 0.25rem 0.625rem; border-radius: 6px;
}
.phase-badge.ready { background: #DCFCE7; color: #16A34A; }
.phase-badge.locked-badge { background: #F1F5F9; color: #94A3B8; }
.phase-step-done {
  display: inline-flex; align-items: center; gap: 0.375rem;
  font-size: 0.8125rem; font-weight: 600; color: #16A34A;
}
.phase-check-circle {
  width: 20px; height: 20px; background: #16A34A; color: #fff;
  border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.6875rem; flex-shrink: 0;
}
.phase-locked-row {
  display: inline-flex; align-items: center; gap: 0.375rem;
  font-size: 0.8125rem; font-weight: 500; color: #94A3B8;
}

/* ── CTA ── */
.topic-cta { display: flex; flex-direction: column; align-items: center; gap: 0.625rem; }
.btn-cta {
  width: 100%; padding: 1rem; background: #2563EB; color: #fff;
  font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: background 0.15s; font-family: inherit;
}
.btn-cta:hover { background: #1D4ED8; }
.topic-cta-note {
  font-size: 0.8125rem; color: #94A3B8; margin: 0;
  display: flex; align-items: center; gap: 0.375rem;
}

/* ── TRUST BADGES ── */
.db-trust-row { display: grid; gap: 1rem; }
.db-trust-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
.db-trust-row.cols-4 { grid-template-columns: repeat(4, 1fr); }
.trust-badge {
  background: #fff; border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 1rem;
  display: flex; align-items: flex-start; gap: 0.75rem;
}
.trust-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.trust-title { font-size: 0.875rem; font-weight: 700; color: #0F172A; margin-bottom: 0.25rem; }
.trust-body { font-size: 0.75rem; color: #64748B; line-height: 1.5; }

/* ── RIGHT PANEL ── */
.dash-right {
  width: 280px; min-width: 280px; background: #fff; border-left: 1px solid #E2E8F0;
  padding: 2rem 1.5rem; position: sticky; top: 56px;
  max-height: calc(100vh - 56px); overflow-y: auto;
}
.right-section-title { font-size: 1rem; font-weight: 700; color: #0F172A; margin: 0 0 0.375rem; }
.right-section-sub { font-size: 0.8125rem; color: #64748B; margin: 0 0 1.125rem; line-height: 1.5; }
.right-item { display: flex; align-items: flex-start; gap: 0.625rem; margin-bottom: 0.875rem; }
.right-item-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.right-item-title { font-size: 0.875rem; font-weight: 700; }
.right-item-title.learn  { color: #16A34A; }
.right-item-title.link   { color: #D97706; }
.right-item-title.land   { color: #2563EB; }
.right-item-title.add    { color: #16A34A; }
.right-item-title.assign { color: #D97706; }
.right-item-title.track  { color: #2563EB; }
.right-item-body { font-size: 0.8125rem; color: #64748B; line-height: 1.4; }
.right-chevron { text-align: center; color: #CBD5E1; margin: -0.375rem 0 0.625rem 2.625rem; display: block; }
.right-divider { height: 1px; background: #F1F5F9; margin: 1.125rem 0; }
.right-mini-card { background: #F8FAFC; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
.right-mini-card-title { font-size: 0.875rem; font-weight: 700; color: #0F172A; margin: 0 0 0.25rem; }
.right-mini-card-body { font-size: 0.8125rem; color: #64748B; line-height: 1.4; margin: 0 0 0.75rem; }
.right-mini-card-btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  font-size: 0.8125rem; font-weight: 600; color: #475569;
  border: 1.5px solid #E2E8F0; border-radius: 8px; padding: 0.375rem 0.75rem;
  background: #fff; cursor: pointer; text-decoration: none;
}
.right-help { display: flex; align-items: flex-start; gap: 0.625rem; }
.right-help-icon { width: 32px; height: 32px; border-radius: 50%; background: #EFF6FF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #2563EB; }
.right-help-title { font-size: 0.875rem; font-weight: 700; color: #0F172A; margin: 0 0 0.25rem; }
.right-help-body { font-size: 0.8125rem; color: #64748B; line-height: 1.4; margin-bottom: 0.375rem; }
.right-contact-link {
  font-size: 0.8125rem; font-weight: 600; color: #2563EB;
  text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem;
}
.right-contact-link:hover { text-decoration: underline; }

/* ── LOADING ── */
.dash-loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #94A3B8; font-size: 0.9375rem; }
</style>
</head>

<div class="dash-layout" id="dashLayout" style="display:none">

  <aside class="dash-sidebar">
    <div class="db-logo">

    <div class="db-sidebar-footer" id="dbSidebarFooter"></div>

  <div class="dash-body">
    <header class="dash-topbar" id="dashTopbar"></header>
    <div class="dash-content-row">
      <main class="dash-main">
        <div id="dbPageHeader" class="db-page-header"></div>
        <div id="dbTopicCard" class="db-topic-card"></div>
        <div id="dbTrustRow" class="db-trust-row"></div>
      </main>
      <aside class="dash-right" id="dashRight"></aside>
    </div>
  </div>

</div>

// ── HELPERS ──
function firstName(n) { return (n || '').split(' ')[0] || n || 'there'; }
function avatarInitials(n) {
  const p = (n || '').trim().split(/\s+/);
  if (p.length === 1) return p[0].charAt(0).toUpperCase();
  return (p[0].charAt(0) + p[p.length - 1].charAt(0)).toUpperCase();
}

function buildPhaseCard(stage, isFirst, statusHtml, role) {
  const m = PHASE_META[stage];
  const desc = (PHASE_DESCS[role] || PHASE_DESCS.student)[stage];
  const lockInHeader = !isFirst && role === 'student'
    ? `<span class="phase-header-lock">${IC.lock}</span>` : '';
  return `
    <div class="phase-card">
      <div class="phase-header">
        <div class="phase-icon" style="background:${m.iconBg};color:${m.iconColor}">${m.icon}</div>
        <span class="phase-name ${m.cls}">${m.name}</span>
        ${lockInHeader}
      </div>
      <p class="phase-desc">${desc}</p>
      ${statusHtml}
    </div>`;
}

  const role = user.user_metadata?.role || 'student';
  const phases = ['learn', 'link', 'land'].map((stage, i) =>
    buildPhaseCard(stage, i === 0, cfg.phaseStatuses[i], role)
  ).join('');
  return `
    <div class="topic-header">
      <div class="topic-info">
        <div class="${labelCls}">${label}</div>
        <h2 class="topic-title">Inflation &ndash; Cost-push vs Demand-pull</h2>
        <p class="topic-desc">A key topic in A-Level Economics that builds the foundation for many other areas of the course.</p>
      </div>
      <div class="topic-chart">${CHART_SVG}</div>
    </div>
    <div class="topic-phases">${phases}</div>
    <div class="topic-cta">
      <button class="btn-cta">${cfg.ctaLabel(user)} &rarr;</button>
      <p class="topic-cta-note">${cfg.ctaNote(user)}</p>
    </div>`;
}

// ── INIT ──
(async function init() {
  const { createClient } = supabase;
  const sb = createClient(window.ECONOS_CONFIG.supabaseUrl, window.ECONOS_CONFIG.supabaseAnonKey);

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const user = session.user;
  const role = (user.user_metadata?.role || 'student').toLowerCase();
  const cfg = ROLE_CONFIG[role] || ROLE_CONFIG.student;

  document.getElementById('dbNav').innerHTML = buildNav(cfg.navItems);
  document.getElementById('dbSidebarFooter').innerHTML = cfg.sidebarCard(user);
  document.getElementById('dashTopbar').innerHTML = cfg.topbar(user);
  document.getElementById('dbPageHeader').innerHTML = cfg.pageHeader(user);
  document.getElementById('dbTopicCard').innerHTML = buildTopicCard(cfg, user);

  const trustRow = document.getElementById('dbTrustRow');
  trustRow.className = `db-trust-row ${cfg.trustCols}`;
  trustRow.innerHTML = buildTrustBadges(cfg.trustBadges);

  document.getElementById('dashRight').innerHTML = cfg.rightPanel(user);

  document.getElementById('dashLoading').style.display = 'none';
  document.getElementById('dashLayout').style.display = 'flex';
})();
</script>
</body>
</html>
