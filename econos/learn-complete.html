<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Learn Complete</title>
<link rel="stylesheet" href="assets/css/econos.css">
<style>
.complete-main { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 2rem; }
.complete-inner { max-width:640px; width:100%; }

.complete-hero { text-align:center; margin-bottom:2rem; }
.complete-badge { width:80px; height:80px; background:linear-gradient(135deg,var(--learn),var(--learn-dark)); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; box-shadow:0 8px 24px rgba(22,163,74,0.3); }
.complete-label { font-size:0.875rem; font-weight:700; color:var(--learn-dark); letter-spacing:0.05em; text-transform:uppercase; margin-bottom:0.5rem; }
.complete-title { font-size:2.25rem; font-weight:800; color:var(--navy); letter-spacing:-0.03em; line-height:1.15; margin:0 0 0.75rem; }
.complete-subtitle { font-size:1rem; color:var(--text-secondary); margin:0; line-height:1.55; }

.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.75rem; }
.stat-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--r-xl); padding:1.25rem; text-align:center; }
.stat-val { font-size:2rem; font-weight:800; color:var(--navy); line-height:1; margin-bottom:0.25rem; }
.stat-label { font-size:0.8125rem; color:var(--text-muted); }

.stages-complete { background:var(--bg-card); border:1.5px solid var(--border); border-radius:var(--r-xl); padding:1.25rem 1.5rem; margin-bottom:1.75rem; }
.stages-complete-title { font-size:0.875rem; font-weight:700; color:var(--navy); margin:0 0 1rem; }
.stages-complete-row { display:flex; align-items:center; gap:0.5rem; }
.stage-done-pill { flex:1; display:flex; align-items:center; gap:0.625rem; background:var(--learn-light); border:1.5px solid var(--learn); border-radius:var(--r-md); padding:0.75rem 1rem; }
.stage-done-check { width:24px; height:24px; background:var(--learn); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.stage-done-name { font-size:0.875rem; font-weight:700; color:var(--learn-dark); }
.stage-done-desc { font-size:0.75rem; color:var(--learn); }
.stage-locked-pill { flex:1; display:flex; align-items:center; gap:0.625rem; background:var(--bg-subtle); border:1.5px solid var(--border); border-radius:var(--r-md); padding:0.75rem 1rem; opacity:0.6; }
.stage-locked-icon { width:24px; height:24px; background:var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.stage-locked-name { font-size:0.875rem; font-weight:700; color:var(--text-muted); }
.stages-arrow { color:var(--border); font-size:1rem; flex-shrink:0; }

.complete-ctas { display:flex; flex-direction:column; gap:0.875rem; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content" style="display:flex;flex-direction:column;min-height:100vh;">
    <header class="main-header">
      <div class="header-title">
        <div style="font-size:1.125rem;font-weight:700;color:var(--navy);">Learn Complete</div>
        <div style="font-size:0.75rem;color:var(--text-muted);" id="header-sub">📗 Learn it</div>
      </div>
      <div class="header-actions">
        <a href="student/settings.html"><div class="user-avatar" id="header-avatar">?</div></a>
      </div>
    </header>

    <div class="complete-main">
      <div class="complete-inner">
        <div class="complete-hero">
          <div class="complete-badge">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="complete-label">Learn it – Complete</div>
          <h1 class="complete-title" id="complete-title">Well done!</h1>
          <p class="complete-subtitle" id="complete-subtitle">Loading…</p>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-val" id="stat-score">—</div>
            <div class="stat-label">Quiz score</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="color:var(--learn-dark);" id="stat-mastery">—</div>
            <div class="stat-label">Learn it score</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--learn)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="stat-label">Chain built</div>
          </div>
        </div>

        <div class="stages-complete">
          <div class="stages-complete-title">Session progress</div>
          <div class="stages-complete-row">
            <div class="stage-done-pill">
              <div class="stage-done-check">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div>
                <div class="stage-done-name">📗 Learn it</div>
                <div class="stage-done-desc">Complete</div>
              </div>
            </div>
            <div class="stages-arrow">→</div>
            <div class="stage-locked-pill">
              <div class="stage-locked-icon">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div><div class="stage-locked-name">🔗 Link it</div></div>
            </div>
            <div class="stages-arrow">→</div>
            <div class="stage-locked-pill">
              <div class="stage-locked-icon">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div><div class="stage-locked-name">🎯 Land it</div></div>
            </div>
          </div>
        </div>

        <div class="complete-ctas">
          <a href="student/dashboard.html" class="btn btn-primary btn-lg" style="display:flex;align-items:center;justify-content:center;gap:0.5rem;">
            Back to dashboard
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg>
          </a>
          <a id="link-it-btn" href="student/link.html" class="btn btn-secondary btn-lg" style="display:flex;align-items:center;justify-content:center;gap:0.5rem;">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
            Continue to Link It →
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script>
async function init() {
  const auth = await Auth.requireStudent('login.html');
  if (!auth) return;
  const { session, profile } = auth;
  const userId = session.user.id;
  const initials = (profile.full_name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
  buildSidebar('learn', 'student', { name: profile.full_name, initials, school: profile.school_name || '', yearGroup: profile.year_group || 'Year 12' }, 'student/');
  document.getElementById('header-avatar').textContent = initials;

  const p = new URLSearchParams(location.search);
  const subtopicId = p.get('subtopic');
  const qs = parseInt(p.get('quizScore') || '0');
  const qt = parseInt(p.get('quizTotal') || '10');

  if (subtopicId) {
    try {
      const { data: st } = await window._sb.from('subtopics').select('title, topic:topics(title)').eq('id', subtopicId).single();
      if (st) {
        document.getElementById('complete-title').textContent = `You've completed Learn it!`;
        document.getElementById('complete-subtitle').textContent = `${st.title} · ${st.topic?.title || ''} — you've built your foundation. Try Link It next to deepen your reasoning.`;
        document.getElementById('header-sub').textContent = `📗 ${st.title}`;
      }
    } catch(e) {}

    try {
      const mastery = await API.getSubtopicMastery(userId, subtopicId);
      document.getElementById('stat-mastery').textContent = (mastery?.learn_score || 0) + '%';
    } catch(e) {}

    document.getElementById('link-it-btn').href = `student/link.html?subtopic=${subtopicId}`;
  }

  document.getElementById('stat-score').textContent = `${qs}/${qt}`;
}

init();
</script>
</body>
</html>
