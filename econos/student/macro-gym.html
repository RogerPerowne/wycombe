<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Macro Gym — Wycombe Abbey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navyd:#0f1729;--gold:#c9a84c;--goldl:#e2c47a;--green:#4caf80;--red:#e05060;--orange:#e0933a;--blue:#4a7fb5;--bluel:#6fa8d8;--purple:#9775b5;--txt:#fff;--mut:#dde3f0;--bdr:#2e3f60;--pan:#1e2e4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navyd);color:var(--txt);font-family:'Nunito','Segoe UI',sans-serif;font-size:16px;min-height:100vh}
/* HEADER */
header{background:linear-gradient(135deg,var(--navyd),var(--navy) 60%,#1e3060);border-bottom:2px solid var(--gold);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hl{display:flex;align-items:center;gap:.9rem}
.hlogo{height:48px;width:48px;object-fit:contain;border-radius:4px}
.hsch{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:var(--goldl);line-height:1.2}
.htit{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:700}
.hsub{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.7}
.hbdg{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.09em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);padding:.24rem .78rem;border-radius:3px;background:rgba(201,168,76,.08)}
.homebtn{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);padding:.28rem .72rem;border-radius:4px;cursor:pointer;margin-left:.6rem;transition:all .2s}
.homebtn:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.app{max-width:1100px;margin:0 auto;padding:1.4rem 1.8rem}
/* HUB */
.hub-hero{text-align:center;padding:2.4rem 1rem 1.5rem}
.hub-hero h1{font-family:'Cormorant Garamond',serif;font-size:2.7rem;font-weight:700;line-height:1.15;margin-bottom:.35rem}
.hub-hero .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--goldl);margin-bottom:.8rem}
.hub-hero .intro{font-size:.9rem;color:var(--mut);max-width:620px;margin:0 auto 1.2rem;line-height:1.75;opacity:.88}
.hub-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;opacity:.85}
/* MACHINE GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.1rem;margin-bottom:1.8rem}
.mcard{background:rgba(26,39,68,.7);border:1px solid var(--bdr);border-radius:12px;padding:1.4rem 1.3rem;cursor:pointer;transition:all .22s ease;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--machine-colour,var(--gold))}
.mcard:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:rgba(201,168,76,.35)}
.mc-icon{font-size:2.2rem;margin-bottom:.55rem;line-height:1}
.mc-num{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem;opacity:.85}
.mc-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:.4rem;line-height:1.25}
.mc-build{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--goldl);margin-bottom:.55rem;opacity:.85}
.mc-desc{font-size:.82rem;color:var(--mut);line-height:1.65;opacity:.82;margin-bottom:.8rem}
.mc-meta{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.65rem}
.mc-meta span{font-family:'IBM Plex Mono',monospace;font-size:.54rem;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);padding:.15rem .48rem;border-radius:3px;letter-spacing:.04em;text-transform:uppercase}
/* HUB BOTTOM */
.hub-foot{text-align:center;padding:1.2rem;border-top:1px solid var(--bdr);margin-top:1.5rem;opacity:.42}
.hub-foot p{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;color:var(--mut)}
/* SESSION LAYOUT */
.card{background:var(--pan);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;position:relative;margin-bottom:1.3rem}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--blue))}
.cb{padding:1.6rem}
.sess-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.9rem 1.4rem;background:rgba(26,39,68,.5);border-bottom:1px solid var(--bdr)}
.sess-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700}
.sess-subtitle{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);opacity:.65}
.sess-counter{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--gold);text-align:right;white-space:nowrap}
.sess-score{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--goldl);line-height:1}
.sess-progress{height:4px;background:var(--bdr);position:relative}
.sess-pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldl));transition:width .4s ease;width:0%}
/* FRICTION */
.frict-scenario{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:1.4rem;margin-bottom:1rem;font-size:1.02rem;line-height:1.75;color:var(--txt)}
.timer-bar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-bottom:1rem}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));transition:width 1s linear;width:100%}
.fopts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.6rem}
.fopt{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:7px;padding:.75rem .85rem;cursor:pointer;transition:all .18s;text-align:left;display:flex;gap:.55rem;align-items:center}
.fopt:hover:not(.locked){border-color:var(--gold);background:rgba(201,168,76,.07);transform:translateY(-1px)}
.fopt.locked{cursor:default}
.fopt.ok{border-color:var(--green)!important;background:rgba(76,175,128,.12)!important}
.fopt.bad{border-color:var(--red)!important;background:rgba(224,80,96,.1)!important}
.fopt.reveal{border-color:var(--green)!important;background:rgba(76,175,128,.06)!important}
.fopt-icon{font-size:1.15rem;flex-shrink:0}
.fopt-name{font-size:.82rem;font-weight:600}
.frict-reveal{margin-top:1rem;padding:1rem 1.1rem;background:rgba(74,127,181,.08);border:1px solid rgba(74,127,181,.3);border-radius:7px;display:none}
.frict-reveal.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.frict-reveal p{font-size:.86rem;line-height:1.7;color:var(--mut)}
.frict-reveal p strong{color:var(--txt)}
/* CHAIN BUILDER */
.chain-trigger{background:rgba(26,39,68,.5);border-left:3px solid var(--gold);padding:.95rem 1.2rem;border-radius:0 6px 6px 0;margin-bottom:1.1rem}
.chain-trigger-lbl{font-family:'IBM Plex Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:.4rem}
.chain-trigger p{font-size:.95rem;line-height:1.7;color:var(--txt)}
.chain-instr{font-size:.8rem;color:var(--mut);margin-bottom:.7rem;line-height:1.6;opacity:.85}
.chain-instr strong{color:var(--goldl)}
.chain-columns{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:680px){.chain-columns{grid-template-columns:1fr}}
.chain-col{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:8px;padding:.85rem;min-height:220px}
.chain-col-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:.65rem;opacity:.75}
.chain-col.active{border-color:rgba(201,168,76,.45)}
.chain-step{background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:6px;padding:.6rem .75rem;margin-bottom:.42rem;cursor:pointer;font-size:.82rem;line-height:1.55;transition:all .18s;display:flex;align-items:flex-start;gap:.55rem}
.chain-step:hover:not(.locked){border-color:var(--gold);background:rgba(201,168,76,.07)}
.chain-step.locked{cursor:default}
.chain-step.ordered{background:rgba(26,39,68,.8);border-color:rgba(201,168,76,.35)}
.chain-step-num{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--gold);flex-shrink:0;font-weight:600;min-width:18px}
.chain-step-txt{flex:1}
.chain-submit{text-align:center;margin:.8rem 0}
.chain-result{margin-top:1rem;padding:1rem;border-radius:7px;display:none}
.chain-result.show{display:block;animation:fadeIn .3s}
.chain-result.ok{background:rgba(76,175,128,.08);border:1px solid rgba(76,175,128,.3)}
.chain-result.bad{background:rgba(224,80,96,.08);border:1px solid rgba(224,80,96,.3)}
.chain-result-title{font-family:'IBM Plex Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.65rem}
.chain-result.ok .chain-result-title{color:var(--green)}
.chain-result.bad .chain-result-title{color:var(--red)}
.chain-result ol{padding-left:1.3rem;margin-bottom:.7rem}
.chain-result li{font-size:.82rem;line-height:1.65;color:var(--mut);margin-bottom:.32rem}
.chain-result li strong{color:var(--txt)}
/* DIAGRAM SPRINT */
.diag-prompt{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:1.2rem;margin-bottom:1rem}
.diag-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--goldl);margin-bottom:.5rem}
.diag-framework{font-family:'IBM Plex Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.11em;color:var(--gold);margin-bottom:.6rem}
.diag-prompt-text{font-size:.92rem;line-height:1.75;color:var(--txt)}
.diag-instr{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.28);border-radius:7px;padding:.85rem 1.05rem;margin-bottom:1.1rem;font-size:.8rem;color:var(--goldl);line-height:1.65}
.diag-instr strong{color:var(--gold)}
.diag-timer{text-align:center;margin:1.2rem 0}
.diag-timer-circle{width:130px;height:130px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--gold) 0deg, var(--bdr) 0deg);transition:background 1s linear;position:relative}
.diag-timer-circle::before{content:'';position:absolute;width:116px;height:116px;border-radius:50%;background:var(--navyd)}
.diag-timer-num{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:var(--goldl);z-index:2}
.diag-btn-row{text-align:center;margin-top:.8rem;display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap}
.diag-reveal{display:none}
.diag-reveal.show{display:block;animation:fadeIn .35s}
.diag-labels-box{background:rgba(74,127,181,.07);border:1px solid rgba(74,127,181,.28);border-radius:8px;padding:1.1rem;margin-bottom:.9rem}
.diag-labels-title{font-family:'IBM Plex Mono',monospace;font-size:.57rem;text-transform:uppercase;letter-spacing:.1em;color:var(--bluel);margin-bottom:.7rem}
.diag-labels-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.4rem}
.diag-label-chip{font-family:'IBM Plex Mono',monospace;font-size:.75rem;background:rgba(255,255,255,.05);border:1px solid var(--bdr);padding:.35rem .58rem;border-radius:4px;color:var(--txt);line-height:1.35}
.diag-explain{background:rgba(26,39,68,.5);border-left:3px solid var(--blue);padding:.9rem 1.1rem;border-radius:0 6px 6px 0;margin-bottom:.9rem}
.diag-explain p{font-size:.84rem;line-height:1.72;color:var(--mut)}
.diag-tip{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.28);border-radius:6px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.82rem;line-height:1.7;color:var(--goldl)}
.diag-tip strong{color:var(--gold)}
.diag-selfrate{text-align:center;padding:.8rem 0 .3rem}
.diag-selfrate-q{font-family:'IBM Plex Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:.7rem}
.diag-rate-btns{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap}
.diag-rate-btn{padding:.7rem 1.1rem;border-radius:7px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;border:1px solid;transition:all .2s;font-weight:600}
.rate-nailed{background:rgba(76,175,128,.1);border-color:var(--green);color:var(--green)}
.rate-nailed:hover{background:rgba(76,175,128,.18)}
.rate-nearly{background:rgba(224,147,58,.1);border-color:var(--orange);color:var(--orange)}
.rate-nearly:hover{background:rgba(224,147,58,.18)}
.rate-missed{background:rgba(224,80,96,.1);border-color:var(--red);color:var(--red)}
.rate-missed:hover{background:rgba(224,80,96,.18)}
/* WRONG BUT CONVINCING */
.wbc-question{background:rgba(26,39,68,.5);border-left:3px solid var(--purple);padding:1rem 1.25rem;border-radius:0 6px 6px 0;margin-bottom:1rem}
.wbc-q-lbl{font-family:'IBM Plex Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;color:var(--purple);margin-bottom:.4rem}
.wbc-question p{font-size:.93rem;line-height:1.7;color:var(--txt)}
.wbc-instr{font-size:.82rem;color:var(--mut);margin-bottom:.95rem;opacity:.85;line-height:1.65}
.wbc-instr strong{color:var(--goldl)}
.wbc-answers{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1rem}
.wbc-answer{background:rgba(255,255,255,.04);border:2px solid var(--bdr);border-radius:9px;padding:.9rem 1.05rem;cursor:pointer;transition:all .18s;position:relative}
.wbc-answer:hover:not(.locked){border-color:var(--gold);background:rgba(201,168,76,.06)}
.wbc-answer.locked{cursor:default}
.wbc-answer-label{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.11em;text-transform:uppercase;color:var(--mut);margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.wbc-answer-verdict{font-family:'IBM Plex Mono',monospace;font-size:.56rem;padding:.14rem .45rem;border-radius:3px;letter-spacing:.05em;display:none}
.wbc-answer.revealed .wbc-answer-verdict{display:inline-block}
.wbc-answer.revealed-strong{border-color:var(--green)!important;background:rgba(76,175,128,.06)!important}
.wbc-answer.revealed-strong .wbc-answer-verdict{background:rgba(76,175,128,.18);color:var(--green);border:1px solid var(--green)}
.wbc-answer.revealed-flawed{border-color:var(--red)!important;background:rgba(224,80,96,.05)!important}
.wbc-answer.revealed-flawed .wbc-answer-verdict{background:rgba(224,80,96,.15);color:var(--red);border:1px solid var(--red)}
.wbc-answer-text{font-size:.85rem;line-height:1.72;color:var(--txt)}
.wbc-answer-why{display:none;margin-top:.7rem;padding-top:.7rem;border-top:1px solid rgba(46,63,96,.7);font-size:.8rem;line-height:1.7;color:var(--mut)}
.wbc-answer.revealed .wbc-answer-why{display:block;animation:fadeIn .3s}
.wbc-answer-why strong{color:var(--txt)}
.wbc-flaw-box{background:rgba(74,127,181,.07);border:1px solid rgba(74,127,181,.28);border-radius:7px;padding:.8rem 1.05rem;margin-top:.6rem;display:none}
.wbc-answer.revealed .wbc-flaw-box{display:block}
.wbc-flaw-name{font-family:'IBM Plex Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--bluel);margin-bottom:.35rem}
.wbc-flaw-desc{font-size:.78rem;line-height:1.65;color:var(--mut);font-style:italic}
/* BUTTONS */
.btn{padding:.75rem 1.15rem;border:none;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-weight:600}
.bg{background:linear-gradient(135deg,#b8922a,var(--gold));color:var(--navyd)}
.bg:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.35)}
.bg:disabled{opacity:.4;cursor:default}
.bs{background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--mut)}
.bs:hover{background:rgba(255,255,255,.12);color:var(--txt)}
/* SUMMARY */
.summary-hero{text-align:center;padding:1.8rem 1rem 1rem}
.summary-eye{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.55rem}
.summary-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;margin-bottom:.25rem}
.summary-num{font-family:'Cormorant Garamond',serif;font-size:4.5rem;font-weight:700;color:var(--goldl);line-height:1;margin:.6rem 0 .25rem}
.summary-max{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--mut);opacity:.65;margin-bottom:1rem}
.summary-pct{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--goldl);margin-bottom:.8rem}
.summary-break{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap;margin:1rem auto 1.5rem;max-width:560px}
.summary-stat{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:7px;padding:.7rem .95rem;min-width:115px;text-align:center}
.summary-stat-num{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--goldl)}
.summary-stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);opacity:.75;margin-top:.15rem}
.summary-btns{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap;margin-top:1rem}
/* GENERIC */
.center{text-align:center}
.mt{margin-top:1rem}
.diag-svg-box{margin-bottom:.9rem;text-align:center}
.diag-svg-box svg{max-width:100%;height:auto;box-shadow:0 4px 14px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08)}
@media(max-width:650px){
  header{padding:0 1rem;height:64px}
  .htit{font-size:1.05rem}
  .hbdg{display:none}
  .app{padding:1.1rem 1rem}
  .hub-hero h1{font-size:2rem}
}

.hub-btn{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);padding:.3rem .75rem;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block}
.hub-btn:hover{background:rgba(255,255,255,.12);color:var(--txt)}

/* econOS topbar */
.sim-topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9999;font-family:'Inter',system-ui,sans-serif;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.sim-topbar-left{display:flex;align-items:center;gap:.75rem}
.sim-logo{display:flex;align-items:center;gap:.4rem;text-decoration:none}
.sim-logo-dots{display:block}
.sim-logo-word{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;font-family:'Inter',sans-serif}
.sim-econ{color:#0F172A}.sim-os{color:#2563EB}
.sim-divider{width:1px;height:20px;background:#E2E8F0;margin:0 .25rem}
.sim-page-name{font-size:.8rem;font-weight:600;color:#64748B;font-family:'Inter',sans-serif}
.sim-back-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem;font-weight:600;color:#475569;text-decoration:none;padding:.4rem .75rem;border-radius:8px;border:1px solid #E2E8F0;background:#F8FAFC;transition:all .12s;font-family:'Inter',sans-serif}
.sim-back-btn:hover{background:#F1F5F9;color:#0F172A;border-color:#CBD5E1}
</style>
</head>
<body>
<nav class="sim-topbar">
  <div class="sim-topbar-left">
    <a href="/" class="sim-logo">
      <svg class="sim-logo-dots" width="52" height="16" viewBox="0 0 52 16" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="5" y1="8" x2="43" y2="8" stroke="#CBD5E1" stroke-width="1.5"/><circle cx="5" cy="8" r="4.5" fill="#22C55E"/><circle cx="22" cy="8" r="5.5" fill="#F59E0B"/><circle cx="43" cy="8" r="7.5" fill="#2563EB"/></svg>
      <span class="sim-logo-word"><span class="sim-econ">econ</span><span class="sim-os">OS</span></span>
    </a>
    <span class="sim-divider"></span>
    <span class="sim-page-name">The Macro Gym</span>
  </div>
  <div>

var FLAW_DESCRIPTIONS = {
  "Unconditional assertion": "States a conclusion without specifying the conditions that make it true. Top-band answers always condition on the state of the economy, elasticity, time horizon, or institutional context.",
  "Ignores elasticity": "Discusses price or quantity changes without considering how responsive agents are. The size of multipliers, PED, and transmission strength are almost always decisive in Paper 2 questions.",
  "Absolute": "Uses 'always', 'never', 'definitely', or 'completely' where economic reasoning requires 'it depends on'. Any unconditional claim in economics is almost always wrong.",
  "Ignores market failure": "Dismisses intervention without identifying the specific failure (externality, asymmetric information, missing market) that justifies government action.",
  "Confuses concepts": "Uses two related but distinct ideas interchangeably — e.g. growth vs development, cyclical vs structural unemployment, AD-side vs LRAS-side growth, within-country vs between-country inequality.",
  "Correlation not causation": "Observes that two variables move together and infers a causal link without justification or mechanism.",
  "Stops at analysis": "Describes a mechanism correctly but fails to connect it to the welfare, policy, or evaluation point that the question actually asks about.",
  "Wrong time horizon": "Applies short-run analysis to a long-run question or vice versa — e.g. treating the SRPC trade-off as permanent, or ignoring J-curve lags."
};

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function render(html){
  document.getElementById('root').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}
function pct(num,den){return den>0?Math.round(num/den*100):0;}

    +'<div class="hub-foot"><p>No accounts &middot; No tracking &middot; Session resets when you close the tab</p></div>'
  );
}

// ══════════════════════════════════════════════════════════════
//  MACHINE 2 — CHAIN BUILDER
// ══════════════════════════════════════════════════════════════
var C={i:0, score:0, chains:[], placed:[], pool:[], submitted:false};

function goChain(){
  document.getElementById('homeBtn').style.display='inline-block';
  C={i:0, score:0, chains:shuffle(CHAINS), placed:[], pool:[], submitted:false};
  drawChain();
}

function drawChain(){
  if(C.i >= C.chains.length){ return chainSummary(); }
  var ch = C.chains[C.i];
  // Build pool: all correct steps + imposters, shuffled
  var allSteps = ch.steps.concat(ch.imposters).map(function(txt,idx){
    return { txt: txt, isImposter: idx >= ch.steps.length, origIdx: idx };
  });
  C.pool = shuffle(allSteps);
  C.placed = [];
  C.submitted = false;

  renderChainState(ch);
}

function renderChainState(ch){
  var poolHTML = C.pool.map(function(step,i){
    return '<div class="chain-step" onclick="chainPick('+i+')">'
      +'<span class="chain-step-num">+</span>'
      +'<span class="chain-step-txt">'+step.txt+'</span>'
      +'</div>';
  }).join('') || '<div style="color:var(--mut);opacity:.6;font-size:.8rem;text-align:center;padding:1.5rem 0">All steps placed.</div>';

  var placedHTML = C.placed.map(function(step,i){
    return '<div class="chain-step ordered" onclick="chainUnpick('+i+')">'
      +'<span class="chain-step-num">'+(i+1)+'</span>'
      +'<span class="chain-step-txt">'+step.txt+'</span>'
      +'</div>';
  }).join('') || '<div style="color:var(--mut);opacity:.6;font-size:.8rem;text-align:center;padding:1.5rem 0">Tap steps from the left to place them here, in order.</div>';

  render(
    '<div class="card">'
    +'<div class="sess-header">'
    +'<div><div class="sess-title">Chain Builder</div><div class="sess-subtitle">'+ch.framework+' &middot; order the steps, skip the imposters</div></div>'
    +'<div class="sess-counter">Chain '+(C.i+1)+' / '+C.chains.length+'<div class="sess-score">'+C.score+' pts</div></div>'
    +'</div>'
    +'<div class="sess-progress"><div class="sess-pfill" style="width:'+pct(C.i,C.chains.length)+'%"></div></div>'
    +'<div class="cb">'
    +'<div class="chain-trigger"><div class="chain-trigger-lbl">&#128204; Trigger</div><p>'+ch.trigger+'</p></div>'
    +'<div class="chain-instr">Tap steps from the <strong>Available</strong> column to add them to <strong>Your Chain</strong>. Two of the available steps are <strong>imposters</strong> that don&#39;t belong in the chain &mdash; leave them behind. Tap a placed step to remove it.</div>'
    +'<div class="chain-columns">'
    +'<div class="chain-col"><div class="chain-col-title">Available steps</div>'+poolHTML+'</div>'
    +'<div class="chain-col active"><div class="chain-col-title">Your chain (top to bottom)</div>'+placedHTML+'</div>'
    +'</div>'
    +'<div class="chain-submit"><button class="btn bg" onclick="chainSubmit()">Submit Chain &rarr;</button></div>'
    +'<div id="chainResult"></div>'
    +'</div></div>'
  );
}

function chainPick(i){
  if(C.submitted)return;
  var step = C.pool.splice(i,1)[0];
  C.placed.push(step);
  renderChainState(C.chains[C.i]);
}
function chainUnpick(i){
  if(C.submitted)return;
  var step = C.placed.splice(i,1)[0];
  C.pool.push(step);
  renderChainState(C.chains[C.i]);
}

function chainSubmit(){
  if(C.submitted)return;
  C.submitted = true;
  var ch = C.chains[C.i];
  // Score: +5 per correct step in correct position, -2 per imposter placed
  var correctSteps = ch.steps; // the correct sequence
  var earned = 0;
  var details = [];

  for(var i=0; i<C.placed.length; i++){
    var step = C.placed[i];
    if(step.isImposter){
      earned -= 2;
      details.push({ok:false, txt:step.txt, reason:'Imposter &mdash; this step does not belong in the chain.'});
    } else if(correctSteps[i] === step.txt){
      earned += 5;
      details.push({ok:true, txt:step.txt, reason:'Correctly placed at position '+(i+1)+'.'});
    } else {
      // Right step but wrong position
      var correctPos = correctSteps.indexOf(step.txt);
      details.push({ok:false, txt:step.txt, reason:'Right step, wrong position &mdash; belongs at position '+(correctPos+1)+'.'});
    }
  }
  // Bonus: if all correct steps placed in right order and no imposters
  var perfect = (C.placed.length === correctSteps.length)
    && C.placed.every(function(s,i){return !s.isImposter && correctSteps[i]===s.txt;});
  if(perfect) earned += 5; // completion bonus
  earned = Math.max(0, earned);
  C.score += earned;

  // Build result HTML
  var correctChainHTML = correctSteps.map(function(txt,i){
    return '<li><strong>Step '+(i+1)+':</strong> '+txt+'</li>';
  }).join('');

  var resHTML = '<div class="chain-result '+(perfect?'ok':'bad')+' show">'
    +'<div class="chain-result-title">'+(perfect ? '&#10003; Perfect chain!' : '&#9432; Review the correct chain below')+' &middot; '+earned+' pts</div>'
    +'<p style="font-size:.82rem;color:var(--mut);margin-bottom:.55rem;line-height:1.7"><strong style="color:var(--txt)">The correct sequence for this trigger:</strong></p>'
    +'<ol>'+correctChainHTML+'</ol>'
    +'<p style="font-size:.8rem;color:var(--mut);line-height:1.7;margin-top:.6rem">'
    +'<strong style="color:var(--goldl)">The two imposters:</strong> '+ch.imposters.map(function(t){return '&ldquo;'+t+'&rdquo;';}).join(' and ')+' &mdash; these sound economic but don&#39;t belong in this specific chain.'
    +'</p>'
    +'<div class="mt center"><button class="btn bg" onclick="chainNext()">Next Chain &rarr;</button></div>'
    +'</div>';
  document.getElementById('chainResult').innerHTML = resHTML;
  document.querySelector('.sess-score').textContent = C.score+' pts';
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

function chainNext(){
  C.i++;
  drawChain();
}

function chainSummary(){
  var max = C.chains.length * 35; // 5 per 6 steps + 5 completion bonus = max 35
  var p = pct(C.score, max);
  render(
    '<div class="card"><div class="cb">'
    +'<div class="summary-hero">'
    +'<div class="summary-eye">Chain Builder &middot; Complete</div>'
    +'<div class="summary-title">Session Results</div>'
    +'<div class="summary-num">'+C.score+'</div>'
    +'<div class="summary-max">points</div>'
    +'<div class="summary-pct">'+C.chains.length+' chains attempted &middot; '+p+'%</div>'
    +'</div>'
    +'<div class="summary-btns">'
    +'<button class="btn bg" onclick="goChain()">&#8635; Play Again</button>'
    +'<button class="btn bs" onclick="goHub()">&larr; Back to Hub</button>'
    +'</div></div></div>'
  );
}

// ══════════════════════════════════════════════════════════════
//  MACHINE 3 — DIAGRAM SPRINT
// ══════════════════════════════════════════════════════════════
var D={i:0, diagrams:[], nailed:0, nearly:0, missed:0, timeLeft:0, revealed:false};

function goDiagram(){
  document.getElementById('homeBtn').style.display='inline-block';
  D={i:0, diagrams:shuffle(DIAGRAMS), nailed:0, nearly:0, missed:0, timeLeft:0, revealed:false};
  drawDiagram();
}

function drawDiagram(){
  if(D.i >= D.diagrams.length){ return diagramSummary(); }
  var d = D.diagrams[D.i];
  D.revealed = false;

  render(
    '<div class="card">'
    +'<div class="sess-header">'
    +'<div><div class="sess-title">Diagram Sprint</div><div class="sess-subtitle">90 seconds to sketch &middot; self-rate after reveal</div></div>'
    +'<div class="sess-counter">Diagram '+(D.i+1)+' / '+D.diagrams.length+'</div>'
    +'</div>'
    +'<div class="sess-progress"><div class="sess-pfill" style="width:'+pct(D.i,D.diagrams.length)+'%"></div></div>'
    +'<div class="cb">'
    +'<div class="diag-prompt">'
    +'<div class="diag-framework">'+d.framework+'</div>'
    +'<div class="diag-title">'+d.title+'</div>'
    +'<div class="diag-prompt-text">'+d.prompt+'</div>'
    +'</div>'
    +'<div class="diag-instr"><strong>&#9999; Sketch on paper.</strong> Aim to draw the axes, all curves, the key points, and the labels. When 90 seconds is up (or when you&#39;re ready), click <strong>Reveal</strong> to see the model answer and self-assess.</div>'
    +'<div class="diag-timer">'
    +'<div class="diag-timer-circle" id="dtc"><div class="diag-timer-num" id="dtn">90</div></div>'
    +'</div>'
    +'<div class="diag-btn-row"><button class="btn bg" id="drbtn" onclick="diagramReveal()">Reveal Answer &rarr;</button></div>'
    +'<div class="diag-reveal" id="dreveal"></div>'
    +'</div></div>'
  );
  startDiagramTimer();
}

function startDiagramTimer(){
  D.timeLeft = 90;
  var tnum = document.getElementById('dtn');
  var tcirc = document.getElementById('dtc');
  if(window._timerID)clearInterval(window._timerID);
  var tick = function(){
    D.timeLeft--;
    if(tnum) tnum.textContent = D.timeLeft;
    if(tcirc){
      var deg = (90-D.timeLeft)/90 * 360;
      tcirc.style.background = 'conic-gradient(var(--gold) '+deg+'deg, var(--bdr) '+deg+'deg)';
    }
    if(D.timeLeft <= 0){
      clearInterval(window._timerID); window._timerID=null;
      if(!D.revealed) diagramReveal();
    }
  };
  window._timerID = setInterval(tick,1000);
}

function diagramReveal(){
  if(D.revealed)return;
  D.revealed = true;
  if(window._timerID){clearInterval(window._timerID);window._timerID=null;}
  var d = D.diagrams[D.i];

  var labelsHTML = d.labels.map(function(l){
    return '<div class="diag-label-chip">'+l+'</div>';
  }).join('');

  var imgSrc = DIAGRAM_IMGS[d.id] || '';
  var revealHTML =
    (imgSrc ? '<div class="diag-svg-box"><img src="'+imgSrc+'" style="width:100%;max-width:520px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.3)" alt="'+d.title+'"></div>' : '')
    +'<div class="diag-labels-box">'
    +'<div class="diag-labels-title">&#128218; Labels you should have included</div>'
    +'<div class="diag-labels-grid">'+labelsHTML+'</div>'
    +'</div>'
    +'<div class="diag-explain"><p><strong style="color:var(--goldl)">What the diagram shows:</strong> '+d.explain+'</p></div>'
    +'<div class="diag-tip"><strong>&#127942; Exam tip:</strong> '+d.examTip+'</div>'
    +'<div class="diag-selfrate">'
    +'<div class="diag-selfrate-q">How did your sketch compare?</div>'
    +'<div class="diag-rate-btns">'
    +'<button class="diag-rate-btn rate-nailed" onclick="diagramRate(\'nailed\')">&#10003; Nailed it</button>'
    +'<button class="diag-rate-btn rate-nearly" onclick="diagramRate(\'nearly\')">~ Nearly</button>'
    +'<button class="diag-rate-btn rate-missed" onclick="diagramRate(\'missed\')">&#10007; Missed it</button>'
    +'</div></div>';

  var rev = document.getElementById('dreveal');
  rev.innerHTML = revealHTML;
  rev.classList.add('show');
  document.getElementById('drbtn').style.display='none';
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

function diagramRate(r){
  D[r]++;
  D.i++;
  drawDiagram();
}

function diagramSummary(){
  render(
    '<div class="card"><div class="cb">'
    +'<div class="summary-hero">'
    +'<div class="summary-eye">Diagram Sprint &middot; Complete</div>'
    +'<div class="summary-title">Session Results</div>'
    +'<div class="summary-num">'+D.nailed+'</div>'
    +'<div class="summary-max">nailed of '+D.diagrams.length+'</div>'
    +'<div class="summary-pct">Self-assessed: '+pct(D.nailed,D.diagrams.length)+'% confident</div>'
    +'</div>'
    +'<div class="summary-break">'
    +'<div class="summary-stat"><div class="summary-stat-num" style="color:var(--green)">'+D.nailed+'</div><div class="summary-stat-lbl">&#10003; Nailed it</div></div>'
    +'<div class="summary-stat"><div class="summary-stat-num" style="color:var(--orange)">'+D.nearly+'</div><div class="summary-stat-lbl">~ Nearly</div></div>'
    +'<div class="summary-stat"><div class="summary-stat-num" style="color:var(--red)">'+D.missed+'</div><div class="summary-stat-lbl">&#10007; Missed</div></div>'
    +'</div>'
    +'<p style="text-align:center;font-size:.82rem;color:var(--mut);opacity:.75;max-width:480px;margin:0 auto 1rem;line-height:1.7">Focus your next revision on the diagrams you rated &ldquo;Missed it&rdquo;. Drawing them fresh on paper twice more is worth far more than looking at model answers.</p>'
    +'<div class="summary-btns">'
    +'<button class="btn bg" onclick="goDiagram()">&#8635; Play Again</button>'
    +'<button class="btn bs" onclick="goHub()">&larr; Back to Hub</button>'
    +'</div></div></div>'
  );
}

// ══════════════════════════════════════════════════════════════
//  MACHINE 4 — WRONG BUT CONVINCING
// ══════════════════════════════════════════════════════════════
var W={i:0, score:0, correct:0, triads:[], answered:false};

function goWBC(){
  document.getElementById('homeBtn').style.display='inline-block';
  W={i:0, score:0, correct:0, triads:shuffle(TRIADS), answered:false};
  drawWBC();
}

function drawWBC(){
  if(W.i >= W.triads.length){ return wbcSummary(); }
  var t = W.triads[W.i];
  W.answered = false;

  // Shuffle answer display order (store indices)
  var order = shuffle([0,1,2]);

  var ansHTML = order.map(function(origIdx, displayIdx){
    var a = t.answers[origIdx];
    var letter = String.fromCharCode(65+displayIdx);
    return '<div class="wbc-answer" data-orig="'+origIdx+'" onclick="wbcPick('+origIdx+')">'
      +'<div class="wbc-answer-label"><span>Answer '+letter+'</span><span class="wbc-answer-verdict"></span></div>'
      +'<div class="wbc-answer-text">'+a.text+'</div>'
      +'<div class="wbc-answer-why"></div>'
      +'<div class="wbc-flaw-box"></div>'
      +'</div>';
  }).join('');

  render(
    '<div class="card">'
    +'<div class="sess-header">'
    +'<div><div class="sess-title">Wrong but Convincing</div><div class="sess-subtitle">'+t.framework+' &middot; identify the strong answer</div></div>'
    +'<div class="sess-counter">Question '+(W.i+1)+' / '+W.triads.length+'<div class="sess-score">'+W.score+' pts</div></div>'
    +'</div>'
    +'<div class="sess-progress"><div class="sess-pfill" style="width:'+pct(W.i,W.triads.length)+'%"></div></div>'
    +'<div class="cb">'
    +'<div class="wbc-question"><div class="wbc-q-lbl">&#128221; Question</div><p>'+t.question+'</p></div>'
    +'<div class="wbc-instr">Below are three possible answers. One is genuinely strong. Two are plausible but flawed. <strong>Tap the one you think is strongest.</strong></div>'
    +'<div class="wbc-answers">'+ansHTML+'</div>'
    +'<div class="mt center"><button class="btn bg" id="wbcNext" onclick="wbcNext()" style="display:none">Next &rarr;</button></div>'
    +'</div></div>'
  );
}

function wbcPick(origIdx){
  if(W.answered) return;
  W.answered = true;
  var t = W.triads[W.i];
  var chosen = t.answers[origIdx];
  var isStrong = (chosen.verdict === 'strong');
  var earned = isStrong ? 10 : 0;
  if(isStrong) W.correct++;
  W.score += earned;

  // Reveal all three
  document.querySelectorAll('.wbc-answer').forEach(function(el){
    el.classList.add('locked');
    el.onclick = null;
    var oi = parseInt(el.getAttribute('data-orig'));
    var a = t.answers[oi];
    el.classList.add('revealed');
    if(a.verdict === 'strong'){
      el.classList.add('revealed-strong');
      el.querySelector('.wbc-answer-verdict').textContent = '&#10003; Strong';
      el.querySelector('.wbc-answer-verdict').innerHTML = '&#10003; Strong';
    } else {
      el.classList.add('revealed-flawed');
      el.querySelector('.wbc-answer-verdict').innerHTML = '&#10007; Flawed';
    }
    el.querySelector('.wbc-answer-why').innerHTML = '<strong>'+(a.verdict==='strong'?'Why this is strong:':'Why this is flawed:')+'</strong> '+a.why;
    if(a.flaw){
      el.querySelector('.wbc-flaw-box').innerHTML =
        '<div class="wbc-flaw-name">&#9432; Flaw type: '+a.flaw+'</div>'
        +'<div class="wbc-flaw-desc">'+(FLAW_DESCRIPTIONS[a.flaw]||'')+'</div>';
    }
  });

  document.getElementById('wbcNext').style.display = 'inline-block';
  document.querySelector('.sess-score').textContent = W.score+' pts';
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

function wbcNext(){
  W.i++;
  drawWBC();
}

function wbcSummary(){
  var max = W.triads.length * 10;
  var p = pct(W.score, max);
  render(
    '<div class="card"><div class="cb">'
    +'<div class="summary-hero">'
    +'<div class="summary-eye">Wrong but Convincing &middot; Complete</div>'
    +'<div class="summary-title">Session Results</div>'
    +'<div class="summary-num">'+W.score+'</div>'
    +'<div class="summary-max">points &middot; max '+max+'</div>'
    +'<div class="summary-pct">'+W.correct+' correct out of '+W.triads.length+' &middot; '+p+'%</div>'
    +'</div>'
    +'<div class="summary-break">'
    +'<div class="summary-stat"><div class="summary-stat-num">'+W.correct+'</div><div class="summary-stat-lbl">Strong picks</div></div>'
    +'<div class="summary-stat"><div class="summary-stat-num">'+(W.triads.length-W.correct)+'</div><div class="summary-stat-lbl">Missed</div></div>'
    +'<div class="summary-stat"><div class="summary-stat-num">'+p+'%</div><div class="summary-stat-lbl">Overall</div></div>'
    +'</div>'
    +'<p style="text-align:center;font-size:.82rem;color:var(--mut);opacity:.75;max-width:480px;margin:0 auto 1rem;line-height:1.7">Look back at the flaw types you missed. Naming the flaw (unconditional, ignores elasticity, confuses concepts) is the first step to not making it yourself.</p>'
    +'<div class="summary-btns">'
    +'<button class="btn bg" onclick="goWBC()">&#8635; Play Again</button>'
    +'<button class="btn bs" onclick="goHub()">&larr; Back to Hub</button>'
    +'</div></div></div>'
  );
}

(function(){
  var hash = window.location.hash.replace('#','');
  if(hash === 'chain')        { goChain();   }
  else if(hash === 'diagram') { goDiagram(); }
  else if(hash === 'wbc')     { goWBC();    }
  else                        { goHub();    }
})();
