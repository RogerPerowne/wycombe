<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Spot the Flaw</title>
<link rel="stylesheet" href="../assets/css/econos.css">
<style>
.flaw-layout { max-width:760px; margin:0 auto; }
.flaw-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:2rem; box-shadow:var(--shadow-sm); margin-bottom:1.5rem; }
.flaw-stage-pill { display:inline-flex; align-items:center; gap:0.375rem; background:var(--learn-light); color:var(--learn-dark); font-size:0.7rem; font-weight:700; padding:0.25rem 0.625rem; border-radius:var(--r-full); margin-bottom:0.75rem; }
.flaw-question { font-size:1rem; font-weight:700; color:var(--navy); line-height:1.55; margin-bottom:1.5rem; }
.flaw-answers { display:flex; flex-direction:column; gap:0.75rem; }
.flaw-answer {
  padding:1rem 1.25rem; border:1.5px solid var(--border); border-radius:var(--r-md);
  cursor:pointer; transition:all var(--t-base); font-size:0.875rem; color:var(--text-primary); line-height:1.55;
  background:var(--bg-card);
}
.flaw-answer:hover { border-color:var(--land-light); background:var(--land-light); }
.flaw-answer.selected { border-color:var(--land); background:var(--land-light); }
.flaw-answer.correct-reveal { border-color:var(--learn); background:var(--learn-light); }
.flaw-answer.wrong-reveal { border-color:#EF4444; background:#FEF2F2; }
.flaw-answer.flawed-reveal { border-color:#F59E0B; background:#FFFBEB; }
.flaw-answer .letter { font-weight:800; margin-right:0.5rem; color:var(--text-muted); }
.flaw-answer.selected .letter,
.flaw-answer.correct-reveal .letter { color:var(--learn-dark); }
.flaw-answer.wrong-reveal .letter { color:#DC2626; }
.flaw-answer.flawed-reveal .letter { color:#92400E; }
.flaw-explanation { font-size:0.8rem; margin-top:0.625rem; padding:0.625rem 0.875rem; border-radius:var(--r-sm); display:none; line-height:1.5; }
.flaw-answer.correct-reveal .flaw-explanation { display:block; background:#DCFCE7; color:#166534; }
.flaw-answer.wrong-reveal .flaw-explanation { display:block; background:#FEE2E2; color:#991B1B; }
.flaw-answer.flawed-reveal .flaw-explanation { display:block; background:#FEF3C7; color:#92400E; }
.flaw-actions { display:flex; gap:0.75rem; margin-top:1.5rem; }
.flaw-result { border-radius:var(--r-md); padding:1rem 1.25rem; font-size:0.875rem; font-weight:600; margin-top:1rem; display:none; }
.flaw-result.correct { background:var(--learn-light); color:var(--learn-dark); border:1px solid var(--learn); }
.flaw-result.wrong   { background:#FEF3C7; color:#92400E; border:1px solid #FDE68A; }
.score-summary { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:1.25rem; box-shadow:var(--shadow-sm); display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.score-item { text-align:center; }
.score-item .val { font-size:1.5rem; font-weight:900; color:var(--navy); }
.score-item .lbl { font-size:0.7rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; }
.skel { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="main-header">
      <div class="header-title">
        <div style="font-size:1.125rem;font-weight:700;color:var(--navy);">Spot the Flaw</div>
        <div style="font-size:0.75rem;color:var(--text-muted);">Find the flawed economic reasoning</div>
      </div>
      <div class="header-actions">
        <div class="streak-badge"><span class="flame">🔥</span><span id="header-streak">—</span></div>
        <div class="user-avatar" id="header-avatar">?</div>
      </div>
    </header>
    <div class="page-body">
      <div class="flaw-layout">
        <div class="score-summary">
          <div class="score-item"><div class="val" id="sc-correct">0</div><div class="lbl">Correct</div></div>
          <div class="score-item"><div class="val" id="sc-wrong">0</div><div class="lbl">Wrong</div></div>
          <div class="score-item"><div class="val" id="sc-remaining">—</div><div class="lbl">Remaining</div></div>
          <div class="score-item"><div class="val" id="sc-pct">—</div><div class="lbl">Accuracy</div></div>
        </div>
        <div class="flaw-card" id="flaw-card">
          <div class="flaw-stage-pill">🔍 Spot the Flaw</div>
          <div id="question-num" style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.5rem;">Question 1 of …</div>
          <div class="flaw-question" id="flaw-question"><div class="skel" style="height:20px;margin-bottom:0.5rem;"></div><div class="skel" style="height:20px;width:70%;"></div></div>
          <div class="flaw-answers" id="flaw-answers">
            <div class="skel" style="height:60px;border-radius:var(--r-md);"></div>
            <div class="skel" style="height:60px;border-radius:var(--r-md);"></div>
            <div class="skel" style="height:60px;border-radius:var(--r-md);"></div>
          </div>
          <div class="flaw-result" id="flaw-result"></div>
          <div class="flaw-actions" id="flaw-actions" style="display:none;">
            <button onclick="checkAnswer()" id="check-btn" class="btn btn-primary btn-lg">Check answer</button>
            <button onclick="nextQuestion()" id="next-btn" class="btn btn-secondary btn-lg" style="display:none;">Next question →</button>
          </div>
        </div>
        <div id="finish-card" style="display:none;">
          <div class="flaw-card" style="text-align:center;">
            <div style="font-size:3rem;margin-bottom:1rem;" id="finish-emoji">🏆</div>
            <h3 style="font-size:1.5rem;font-weight:800;color:var(--navy);margin-bottom:0.5rem;">Session complete!</h3>
            <p style="color:var(--text-secondary);font-size:0.9rem;" id="finish-msg"></p>
            <div style="margin-top:1.5rem;display:flex;gap:0.75rem;justify-content:center;">
              <button onclick="restart()" class="btn btn-ghost btn-lg">Play again</button>
              <a href="exam-mode" class="btn btn-primary btn-lg">Exam Mode →</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/nav.js"></script>
<script>
let questions = [], currentIdx = 0, selectedChoice = null;
let correctCount = 0, wrongCount = 0;
let userId = null;

async function init() {
  const auth = await Auth.requireStudent();
  if (!auth) return;
  const { session, profile } = auth;
  userId = session.user.id;
  const initials = (profile.full_name||'U').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  buildSidebar('spotflaw', 'student', { name: profile.full_name, initials, school: profile.school_name||'', yearGroup: profile.year_group||'Year 12' });
  document.getElementById('header-avatar').textContent = initials;
  try {
    const [flawQs, streakData] = await Promise.all([
      API.getFlawQuestions(null, 8),
      API.getStreakData(userId)
    ]);
    document.getElementById('header-streak').textContent = streakData.streak + ' day streak';
    if (!flawQs.length) {
      document.getElementById('flaw-card').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);">No spot-the-flaw questions available yet. Check back soon!</div>';
      return;
    }
    questions = shuffle(flawQs);
    document.getElementById('sc-remaining').textContent = questions.length;
    renderQuestion();
  } catch (err) {
    console.error('[Flaw]', err);
    document.getElementById('flaw-question').textContent = 'Could not load questions. Please refresh.';
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderQuestion() {
  if (currentIdx >= questions.length) { showFinish(); return; }
  const q = questions[currentIdx];
  selectedChoice = null;
  document.getElementById('question-num').textContent = `Question ${currentIdx+1} of ${questions.length}`;
  document.getElementById('flaw-question').textContent = q.question_text;
  document.getElementById('flaw-result').style.display = 'none';
  document.getElementById('check-btn').style.display = 'inline-flex';
  document.getElementById('check-btn').disabled = true;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('flaw-actions').style.display = 'flex';
  document.getElementById('sc-remaining').textContent = questions.length - currentIdx;
  const answers = Array.isArray(q.flaw_answers) ? q.flaw_answers : [];
  const letters = ['A','B','C','D'];
  document.getElementById('flaw-answers').innerHTML = answers.map((ans, i) => `
    <div class="flaw-answer" id="ans-${i}" onclick="selectAnswer(${i})">
      <span class="letter">${letters[i]}.</span>${ans.text}
      <div class="flaw-explanation" id="exp-${i}">${ans.explanation || ''}</div>
    </div>`).join('');
}

function selectAnswer(idx) {
  selectedChoice = idx;
  document.querySelectorAll('.flaw-answer').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('check-btn').disabled = false;
}

async function checkAnswer() {
  if (selectedChoice === null) return;
  const q = questions[currentIdx];
  const answers = Array.isArray(q.flaw_answers) ? q.flaw_answers : [];
  const flawedIdx = answers.findIndex(a => a.is_flawed);
  const isCorrect = selectedChoice === flawedIdx;
  if (isCorrect) correctCount++;
  else wrongCount++;
  answers.forEach((ans, i) => {
    const el = document.getElementById('ans-' + i);
    if (i === flawedIdx) el.classList.add('flawed-reveal');
    else if (i === selectedChoice && !isCorrect) el.classList.add('wrong-reveal');
    else el.classList.add('correct-reveal');
    el.style.cursor = 'default';
    el.onclick = null;
  });
  const resultEl = document.getElementById('flaw-result');
  resultEl.style.display = 'block';
  resultEl.className = 'flaw-result ' + (isCorrect ? 'correct' : 'wrong');
  resultEl.textContent = isCorrect
    ? '✅ Correct! You identified the flawed reasoning.'
    : `⚠ Not quite — answer ${['A','B','C','D'][flawedIdx]} contained the flaw.`;
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'inline-flex';
  updateScore();
  if (userId) Auth.recordActivity('flaw', q.topic?.title || null, null, isCorrect ? 1 : 0, 1, null);
}

function nextQuestion() { currentIdx++; renderQuestion(); }

function updateScore() {
  const total = correctCount + wrongCount;
  document.getElementById('sc-correct').textContent = correctCount;
  document.getElementById('sc-wrong').textContent   = wrongCount;
  document.getElementById('sc-pct').textContent     = total > 0 ? Math.round((correctCount/total)*100) + '%' : '—';
}

function showFinish() {
  document.getElementById('flaw-card').style.display   = 'none';
  document.getElementById('finish-card').style.display = 'block';
  const total = correctCount + wrongCount;
  const pct   = total > 0 ? Math.round((correctCount/total)*100) : 0;
  document.getElementById('finish-emoji').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : '💪';
  document.getElementById('finish-msg').textContent   = `You scored ${correctCount}/${total} (${pct}%). ${pct>=80?'Outstanding critical thinking!':pct>=60?'Good work — keep practising!':'Keep going — economic reasoning takes practice.'}`;
}

function restart() {
  questions = shuffle(questions);
  currentIdx = 0; correctCount = 0; wrongCount = 0;
  document.getElementById('flaw-card').style.display   = 'block';
  document.getElementById('finish-card').style.display = 'none';
  updateScore();
  renderQuestion();
}

init();
</script>
</body>
</html>
