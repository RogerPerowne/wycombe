<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Learn It</title>
<link rel="stylesheet" href="../assets/css/econos.css">
<style>
.learn-layout { display:grid; grid-template-columns:1fr 300px; gap:1.75rem; align-items:start; }
.learn-content-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:2rem; box-shadow:var(--shadow-sm); }
.learn-breadcrumb { font-size:0.75rem; color:var(--text-muted); margin-bottom:1.25rem; display:flex; align-items:center; gap:0.375rem; }
.learn-breadcrumb a { color:var(--text-muted); text-decoration:none; }
.learn-breadcrumb a:hover { color:var(--land); }
.learn-stage-pill { display:inline-flex; align-items:center; gap:0.375rem; background:var(--learn-light); color:var(--learn-dark); font-size:0.7rem; font-weight:700; padding:0.25rem 0.625rem; border-radius:var(--r-full); margin-bottom:0.75rem; }
.learn-title { font-size:1.5rem; font-weight:800; color:var(--navy); letter-spacing:-0.02em; margin-bottom:0.5rem; }
.learn-meta-row { font-size:0.8rem; color:var(--text-muted); margin-bottom:1.75rem; display:flex; align-items:center; gap:1rem; }
.learn-body h2 { font-size:1.125rem; font-weight:700; color:var(--navy); margin:1.5rem 0 0.75rem; }
.learn-body h3 { font-size:1rem; font-weight:700; color:var(--navy); margin:1.25rem 0 0.5rem; }
.learn-body p { font-size:0.9rem; line-height:1.75; color:var(--text-primary); margin-bottom:0.875rem; }
.learn-body ul, .learn-body ol { padding-left:1.5rem; margin-bottom:0.875rem; }
.learn-body li { font-size:0.9rem; line-height:1.7; color:var(--text-primary); margin-bottom:0.25rem; }
.learn-body strong { color:var(--navy); font-weight:700; }
.content-formula { background:var(--bg-subtle); border-left:3px solid var(--land); border-radius:0 var(--r-sm) var(--r-sm) 0; padding:0.75rem 1rem; font-size:0.875rem; font-weight:700; color:var(--navy); margin:1rem 0; font-family:monospace; }
.content-callout { border-radius:var(--r-md); padding:0.875rem 1rem; margin:1rem 0; font-size:0.85rem; }
.content-callout.info { background:#EFF6FF; border:1px solid #BFDBFE; color:#1E40AF; }
.content-callout.warn { background:#FFFBEB; border:1px solid #FDE68A; color:#92400E; }
.learn-sidebar-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:1.5rem; box-shadow:var(--shadow-sm); margin-bottom:1rem; position:sticky; top:1.5rem; }
.key-term-item { padding:0.625rem 0; border-bottom:1px solid var(--border); }
.key-term-item:last-child { border-bottom:none; }
.key-term-name { font-size:0.8rem; font-weight:700; color:var(--navy); margin-bottom:0.25rem; }
.key-term-def  { font-size:0.75rem; color:var(--text-secondary); line-height:1.5; }
.obj-item { display:flex; align-items:flex-start; gap:0.5rem; padding:0.375rem 0; font-size:0.8rem; color:var(--text-primary); line-height:1.4; }
.obj-item::before { content:'→'; color:var(--learn); font-weight:700; flex-shrink:0; margin-top:1px; }
.learn-actions { display:flex; gap:0.75rem; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); }
.mcq-opt { display:flex; align-items:flex-start; gap:0.625rem; padding:0.625rem 0.875rem; border:1.5px solid var(--border); border-radius:var(--r-sm); cursor:pointer; transition:all var(--t-fast); }
.skel { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="main-header">
      <div class="header-title">
        <div style="font-size:1.125rem;font-weight:700;color:var(--navy);">Learn It</div>
        <div style="font-size:0.75rem;color:var(--text-muted);" id="learn-meta-header">Loading…</div>
      </div>
      <div class="header-actions">
        <div class="streak-badge"><span class="flame">🔥</span><span id="header-streak">—</span></div>
        <div class="user-avatar" id="header-avatar">?</div>
      </div>
    </header>
    <div class="page-body">
      <div class="learn-layout">
        <div>
          <div class="learn-content-card">
            <div class="learn-breadcrumb">
              <a href="topics.html">Topics</a> ›
              <span id="bc-topic"></span> ›
              <span id="bc-subtopic"></span>
            </div>
            <div class="learn-stage-pill">📗 Learn It</div>
            <div id="learn-title" class="learn-title"><div class="skel" style="height:36px;width:70%;"></div></div>
            <div id="learn-meta-row" class="learn-meta-row"><div class="skel" style="height:14px;width:100px;display:inline-block;"></div></div>
            <div class="learn-body" id="learn-body">
              <div class="skel" style="height:16px;margin-bottom:0.75rem;"></div>
              <div class="skel" style="height:16px;width:80%;margin-bottom:0.75rem;"></div>
              <div class="skel" style="height:16px;width:90%;"></div>
            </div>
            <div class="learn-actions" id="learn-actions" style="display:none;">
              <button onclick="markComplete()" class="btn btn-primary btn-lg" id="complete-btn">Mark as read ✓</button>
              <a href="link.html" class="btn btn-secondary btn-lg" id="link-btn">Next: Link It →</a>
            </div>
          </div>

          <div id="mcq-section" style="display:none;margin-top:1.5rem;">
            <div class="learn-content-card">
              <h3 style="font-size:1.0625rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">Quick check: test your understanding</h3>
              <div id="mcq-container"></div>
              <div id="mcq-result" style="display:none;margin-top:1rem;"></div>
              <button onclick="submitMCQ()" id="mcq-submit" class="btn btn-primary" style="margin-top:1rem;display:none;">Check answers</button>
            </div>
          </div>
        </div>

        <div>
          <div class="learn-sidebar-card">
            <h4 style="font-size:0.875rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">Learning objectives</h4>
            <div id="objectives-list"><div class="skel" style="height:50px;"></div></div>
          </div>
          <div class="learn-sidebar-card">
            <h4 style="font-size:0.875rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">Key terms</h4>
            <div id="key-terms-list"><div class="skel" style="height:80px;"></div></div>
          </div>
          <div class="learn-sidebar-card">
            <h4 style="font-size:0.875rem;font-weight:700;color:var(--navy);margin-bottom:0.75rem;">Your progress</h4>
            ${['learn','link','land'].map(s => `
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
              <span style="font-size:0.7rem;font-weight:700;color:var(--text-muted);width:50px;text-transform:capitalize;">${s.charAt(0).toUpperCase()+s.slice(1)}</span>
              <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;"><div id="prog-${s}" class="fill fill-${s}" style="height:100%;border-radius:3px;width:0%;transition:width 0.5s;"></div></div>
              <span id="prog-${s}-pct" style="font-size:0.7rem;font-weight:700;color:var(--${s==='land'?'land':''+s+'-dark'});">0%</span>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/nav.js"></script>
<script>
let currentSubtopic = null, currentMastery = null, mcqQuestions = [], userId = null, selectedAnswers = {};

async function init() {
  const auth = await Auth.requireStudent('../login.html');
  if (!auth) return;
  const { session, profile } = auth;
  userId = session.user.id;
  const initials = (profile.full_name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
  buildSidebar('learn', 'student', { name: profile.full_name, initials, school: profile.school_name || '', yearGroup: profile.year_group || 'Year 12' });
  document.getElementById('header-avatar').textContent = initials;

  const params = new URLSearchParams(window.location.search);
  const subtopicId = params.get('subtopic');

  try {
    let subtopic = null;
    if (subtopicId) {
      const { data } = await window._sb.from('subtopics').select('*, topic:topics(id, title, slug, theme_number, theme_name)').eq('id', subtopicId).single();
      subtopic = data;
    }
    if (!subtopic) {
      const { data } = await window._sb.from('subtopics').select('*, topic:topics(id, title, slug, theme_number, theme_name)').limit(1).single();
      subtopic = data;
    }
    if (!subtopic) { document.getElementById('learn-body').innerHTML = '<p style="color:#EF4444;">No content available. <a href="topics.html">Browse topics →</a></p>'; return; }
    currentSubtopic = subtopic;
    renderSubtopic(subtopic);

    const [mastery, questions, streakData] = await Promise.all([
      API.getSubtopicMastery(userId, subtopic.id),
      API.getMCQForSubtopic(subtopic.id, 5),
      API.getStreakData(userId)
    ]);
    currentMastery = mastery;
    document.getElementById('header-streak').textContent = streakData.streak + ' day streak';
    updateProgressBars(mastery);
    if (questions.length) renderMCQ(questions);
  } catch (err) {
    console.error('[Learn]', err);
    document.getElementById('learn-body').innerHTML = '<p style="color:#EF4444;">Could not load content. Please refresh.</p>';
  }
}

function renderSubtopic(st) {
  document.title = 'econOS – Learn: ' + st.title;
  document.getElementById('learn-meta-header').textContent = st.topic?.theme_name || '';
  document.getElementById('bc-topic').innerHTML = `<a href="topics.html" style="color:var(--text-muted);text-decoration:none;">${st.topic?.title || 'Topics'}</a>`;
  document.getElementById('bc-subtopic').textContent = st.title;
  document.getElementById('learn-title').textContent = st.title;
  document.getElementById('learn-meta-row').innerHTML = `<span>⏱ ~${st.estimated_minutes || 10} minutes</span><span>📗 Learn It</span>`;
  document.getElementById('learn-body').innerHTML = st.content_html || '<p style="color:var(--text-muted);">Content coming soon. Use your textbook for this topic.</p>';
  const objs = Array.isArray(st.learning_objectives) ? st.learning_objectives : [];
  document.getElementById('objectives-list').innerHTML = objs.length ? objs.map(o => `<div class="obj-item">${o}</div>`).join('') : '<div style="font-size:0.8rem;color:var(--text-muted);">See your specification.</div>';
  const terms = Array.isArray(st.key_terms) ? st.key_terms : [];
  document.getElementById('key-terms-list').innerHTML = terms.length ? terms.map(t => `<div class="key-term-item"><div class="key-term-name">${t.term}</div><div class="key-term-def">${t.def}</div></div>`).join('') : '<div style="font-size:0.8rem;color:var(--text-muted);">No key terms listed.</div>';
  document.getElementById('link-btn').href = `link.html?subtopic=${st.id}`;
  document.getElementById('learn-actions').style.display = 'flex';
}

function updateProgressBars(m) {
  ['learn','link','land'].forEach(s => {
    const pct = m?.[s + '_score'] || 0;
    document.getElementById('prog-' + s).style.width = pct + '%';
    document.getElementById('prog-' + s + '-pct').textContent = pct + '%';
  });
}

function renderMCQ(questions) {
  mcqQuestions = questions;
  document.getElementById('mcq-section').style.display = 'block';
  document.getElementById('mcq-container').innerHTML = questions.map((q, qi) => {
    const opts = Array.isArray(q.options) ? q.options : [];
    return `<div style="margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);" id="q${qi}-wrap">
      <div style="font-size:0.875rem;font-weight:600;color:var(--navy);margin-bottom:0.75rem;">${qi+1}. ${q.question_text}</div>
      <div style="display:flex;flex-direction:column;gap:0.5rem;">
        ${opts.map((opt, oi) => `<label class="mcq-opt" data-q="${qi}" data-o="${oi}" onclick="selectOpt(${qi},${oi},this)">
          <input type="radio" name="q${qi}" value="${oi}" style="margin-top:2px;accent-color:var(--land);">
          <span style="font-size:0.85rem;">${opt.text}</span>
        </label>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('mcq-submit').style.display = 'inline-block';
}

function selectOpt(qi, oi, clicked) {
  selectedAnswers[qi] = oi;
  document.querySelectorAll(`[data-q="${qi}"]`).forEach(el => {
    el.style.borderColor = el.dataset.o == oi ? 'var(--land)' : 'var(--border)';
    el.style.background  = el.dataset.o == oi ? 'var(--land-light)' : '';
  });
}

async function submitMCQ() {
  const btn = document.getElementById('mcq-submit');
  btn.disabled = true; btn.textContent = 'Checking…';
  let correct = 0;
  mcqQuestions.forEach((q, qi) => {
    const opts = Array.isArray(q.options) ? q.options : [];
    const chosen = selectedAnswers[qi];
    const correctIdx = opts.findIndex(o => o.correct);
    const isCorrect = chosen === correctIdx;
    if (isCorrect) correct++;
    document.querySelectorAll(`[data-q="${qi}"]`).forEach(el => {
      const oi = parseInt(el.dataset.o);
      if (oi === correctIdx) { el.style.borderColor = 'var(--learn)'; el.style.background = 'var(--learn-light)'; }
      else if (oi === chosen && !isCorrect) { el.style.borderColor = '#EF4444'; el.style.background = '#FEF2F2'; }
    });
    if (opts[correctIdx]?.explanation) {
      const wrap = document.getElementById(`q${qi}-wrap`);
      if (wrap) {
        const exp = document.createElement('div');
        exp.style.cssText = 'font-size:0.8rem;color:var(--text-secondary);background:var(--bg-subtle);padding:0.625rem 0.875rem;border-radius:var(--r-sm);margin-top:0.5rem;';
        exp.textContent = '💡 ' + (isCorrect ? 'Correct! ' : 'Not quite. ') + opts[correctIdx].explanation;
        wrap.appendChild(exp);
      }
    }
  });
  const pct = Math.round((correct / mcqQuestions.length) * 100);
  const resultEl = document.getElementById('mcq-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<div style="background:${pct>=70?'var(--learn-light)':'#FEF3C7'};border:1px solid ${pct>=70?'var(--learn)':'var(--link)'};border-radius:var(--r-md);padding:1rem;font-size:0.875rem;font-weight:600;color:${pct>=70?'var(--learn-dark)':'var(--link-dark)'}">${pct>=70?'✅':'⚡'} You scored ${correct}/${mcqQuestions.length} (${pct}%)${pct>=70?' — excellent!':' — review the explanations, then try Link It.'}</div>`;
  btn.style.display = 'none';
  if (userId && currentSubtopic) {
    const newScore = Math.max(currentMastery?.learn_score || 0, pct);
    try { const up = await API.upsertMastery(userId, currentSubtopic.id, { learn_score: newScore, attempts: (currentMastery?.attempts||0)+1 }); currentMastery=up; updateProgressBars(up); } catch(e){}
    Auth.recordActivity('learn', currentSubtopic.topic?.title, currentSubtopic.title, correct, mcqQuestions.length, null);
  }
}

async function markComplete() {
  const btn = document.getElementById('complete-btn');
  btn.textContent = '✓ Marked complete'; btn.disabled = true;
  if (userId && currentSubtopic) {
    const newScore = Math.max(currentMastery?.learn_score || 0, 70);
    try { const up = await API.upsertMastery(userId, currentSubtopic.id, { learn_score: newScore, attempts: (currentMastery?.attempts||0)+1 }); currentMastery=up; updateProgressBars(up); } catch(e){}
    Auth.recordActivity('learn', currentSubtopic.topic?.title, currentSubtopic.title, newScore, 100, null);
  }
  setTimeout(() => { window.location.href = `link.html?subtopic=${currentSubtopic?.id||''}`; }, 1000);
}

init();
</script>
</body>
</html>
