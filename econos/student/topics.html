<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>econOS – Topic Map</title>
<link rel="stylesheet" href="../assets/css/econos.css">
<style>
.filter-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.75rem; flex-wrap:wrap; gap:0.75rem; }
.filter-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; }
.filter-tab { padding:0.375rem 0.875rem; border-radius:var(--r-full); font-size:0.8rem; font-weight:600; border:1.5px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; transition:all var(--t-fast); }
.filter-tab.active { border-color:var(--land); background:var(--land-light); color:var(--land); }

.readiness-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.75rem; }
.summary-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl); padding:1.25rem; box-shadow:var(--shadow-sm); }
.summary-card .label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); margin-bottom:0.375rem; }
.summary-card .value { font-size:1.75rem; font-weight:900; letter-spacing:-0.03em; }
.summary-card .sub { font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem; }

.theme-section { margin-bottom:2rem; }
.theme-heading { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:0.875rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }

.topic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }
.topic-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-xl);
  padding:1.25rem 1.5rem; box-shadow:var(--shadow-sm); cursor:pointer;
  transition:all var(--t-fast);
}
.topic-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); border-color:var(--land-light); }

.topic-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1rem; gap:0.75rem; }
.topic-title { font-size:0.9375rem; font-weight:700; color:var(--navy); line-height:1.3; }
.topic-count-badge { font-size:0.65rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:var(--r-full); white-space:nowrap; flex-shrink:0; }

.stage-rows { display:flex; flex-direction:column; gap:0.5rem; }
.stage-row { display:flex; align-items:center; gap:0.625rem; }
.stage-row .stage-label { font-size:0.7rem; font-weight:700; width:54px; flex-shrink:0; }
.stage-row .bar-wrap { flex:1; height:6px; background:var(--border); border-radius:var(--r-full); overflow:hidden; }
.stage-row .bar-fill { height:100%; border-radius:var(--r-full); transition:width 0.6s ease; }
.stage-row .bar-pct { font-size:0.7rem; font-weight:700; width:28px; text-align:right; flex-shrink:0; }

.topic-footer { display:flex; align-items:center; justify-content:space-between; margin-top:1rem; padding-top:0.875rem; border-top:1px solid var(--border); }
.start-link { font-size:0.75rem; font-weight:700; color:var(--land); }

.empty-state { text-align:center; padding:3rem 1rem; }
.empty-state .icon { font-size:3rem; margin-bottom:0.75rem; }
.empty-state h3 { font-size:1rem; font-weight:700; color:var(--navy); margin-bottom:0.375rem; }
.empty-state p { font-size:0.875rem; color:var(--text-muted); }

.skel { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/topics-data.js"></script>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="main-header">
      <div class="header-title">
        <div style="font-size:1.125rem;font-weight:700;color:var(--navy);">Topic Map</div>
        <div style="font-size:0.75rem;color:var(--text-muted);" id="topics-sub">Loading…</div>
      </div>
      <div class="header-actions">
        <a href="settings"><div class="user-avatar" id="header-avatar">?</div></a>
      </div>
    </header>

    <div class="page-body">
      <!-- READINESS SUMMARY -->
      <div class="readiness-summary" id="summary-row">
        <div class="summary-card"><div class="label">Topics started</div><div class="value skel" style="height:40px;width:40px;"></div></div>
        <div class="summary-card"><div class="label">Learn it avg</div><div class="value skel" style="height:40px;width:60px;"></div></div>
        <div class="summary-card"><div class="label">Link it avg</div><div class="value skel" style="height:40px;width:60px;"></div></div>
        <div class="summary-card"><div class="label">Land it avg</div><div class="value skel" style="height:40px;width:60px;"></div></div>
      </div>

      <!-- FILTER TABS -->
      <div class="filter-row">
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all',this)">All topics</button>
          <button class="filter-tab" onclick="setFilter('in-progress',this)">In progress</button>
          <button class="filter-tab" onclick="setFilter('not-started',this)">Not started</button>
          <button class="filter-tab" onclick="setFilter('mastered',this)">Mastered</button>
        </div>
      </div>

      <!-- TOPIC MAP -->
      <div id="topics-container">
        <div class="topic-grid">
          <div class="skel" style="height:170px;border-radius:var(--r-xl);"></div>
          <div class="skel" style="height:170px;border-radius:var(--r-xl);"></div>
          <div class="skel" style="height:170px;border-radius:var(--r-xl);"></div>
          <div class="skel" style="height:170px;border-radius:var(--r-xl);"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/nav.js"></script>
<script>
let _topics = [];
let _masteryMap = {};
let _currentFilter = 'all';

const THEME_COLORS = [
  { bg: '#DBEAFE', color: '#1D4ED8' },
  { bg: '#DCFCE7', color: '#15803D' },
  { bg: '#FEF3C7', color: '#B45309' },
  { bg: '#EDE9FE', color: '#6D28D9' },
  { bg: '#FFE4E6', color: '#BE123C' },
  { bg: '#CCFBF1', color: '#0F766E' },
];

function getMastery(subtopicId) {
  return _masteryMap[subtopicId] || { learn_score: 0, link_score: 0, land_score: 0 };
}

function getTopicStatus(subtopics) {
  if (!subtopics.length) return 'not-started';
  const hasAny = subtopics.some(s => {
    const m = getMastery(s.id);
    return m.learn_score > 0 || m.link_score > 0 || m.land_score > 0;
  });
  if (!hasAny) return 'not-started';
  const avg = Math.round(subtopics.reduce((sum, s) => {
    const m = getMastery(s.id);
    return sum + Math.round((m.learn_score + m.link_score + m.land_score) / 3);
  }, 0) / subtopics.length);
  return avg >= 80 ? 'mastered' : 'in-progress';
}

function setFilter(f, btn) {
  _currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}

function renderTopics() {
  const container = document.getElementById('topics-container');
  if (!_topics.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📚</div><h3>No topics available yet</h3><p>Your teacher hasn't added any topics yet. Check back soon.</p></div>`;
    return;
  }

  const grouped = {};
  _topics.forEach(t => {
    const key = t.theme_name || 'General';
    if (!grouped[key]) grouped[key] = { theme_number: t.theme_number || 0, topics: [] };
    grouped[key].topics.push(t);
  });

  const sortedThemes = Object.entries(grouped).sort((a, b) => a[1].theme_number - b[1].theme_number);
  let html = '';
  let totalShown = 0;

  sortedThemes.forEach(([themeName, themeData], idx) => {
    const color = THEME_COLORS[idx % THEME_COLORS.length];
    const visible = themeData.topics.filter(t => {
      if (_currentFilter === 'all') return true;
      return getTopicStatus(t.subtopics || []) === _currentFilter;
    });
    if (!visible.length) return;
    totalShown += visible.length;

    html += `<div class="theme-section">
      <div class="theme-heading">${themeData.theme_number ? 'Theme ' + themeData.theme_number + ': ' : ''}${themeName}</div>
      <div class="topic-grid">${visible.map(t => renderCard(t, color)).join('')}</div>
    </div>`;
  });

  if (!totalShown) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>No topics match this filter</h3><p>Try a different filter or start practising to build progress.</p></div>`;
    return;
  }
  container.innerHTML = html;
}

function renderCard(topic, color) {
  const subs = topic.subtopics || [];
  const status = getTopicStatus(subs);

  const avgLearn = subs.length ? Math.round(subs.reduce((s, sub) => s + getMastery(sub.id).learn_score, 0) / subs.length) : 0;
  const avgLink  = subs.length ? Math.round(subs.reduce((s, sub) => s + getMastery(sub.id).link_score,  0) / subs.length) : 0;
  const avgLand  = subs.length ? Math.round(subs.reduce((s, sub) => s + getMastery(sub.id).land_score,  0) / subs.length) : 0;

  const learnColor = avgLearn < 50 ? '#EF4444' : avgLearn < 75 ? 'var(--link)' : 'var(--learn)';
  const linkColor  = avgLink  < 50 ? '#EF4444' : avgLink  < 75 ? 'var(--link)' : 'var(--learn)';
  const landColor  = avgLand  < 50 ? '#EF4444' : avgLand  < 75 ? 'var(--link)' : 'var(--learn)';

  const statusPill = status === 'mastered'
    ? `<span class="stage-pill pill-learn">✓ Mastered</span>`
    : status === 'in-progress'
    ? `<span class="stage-pill pill-link">In progress</span>`
    : `<span class="stage-pill" style="background:var(--bg-subtle);color:var(--text-muted);">Not started</span>`;

  const firstSubId = subs.length ? subs[0].id : '';
  const staticSlug = window.ECONOS_TOPICS && topic.slug && window.ECONOS_TOPICS[topic.slug] ? topic.slug : null;
  const href = staticSlug ? `../learn-cards?topic=${staticSlug}` : firstSubId ? `learn?subtopic=${firstSubId}` : '#';
  const ctaLabel = status === 'mastered' ? 'Review →' : status === 'in-progress' ? 'Continue →' : 'Start →';

  return `<div class="topic-card" onclick="window.location.href='${href}'">
    <div class="topic-card-header">
      <div class="topic-title">${topic.title}</div>
      <span class="topic-count-badge" style="background:${color.bg};color:${color.color};">${subs.length} subtopic${subs.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="stage-rows">
      <div class="stage-row">
        <span class="stage-label" style="color:var(--learn-dark);">Learn it</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${avgLearn}%;background:${learnColor};"></div></div>
        <span class="bar-pct" style="color:${learnColor};">${avgLearn}%</span>
      </div>
      <div class="stage-row">
        <span class="stage-label" style="color:var(--link-dark);">Link it</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${avgLink}%;background:${linkColor};"></div></div>
        <span class="bar-pct" style="color:${linkColor};">${avgLink}%</span>
      </div>
      <div class="stage-row">
        <span class="stage-label" style="color:var(--land);">Land it</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${avgLand}%;background:${landColor};"></div></div>
        <span class="bar-pct" style="color:${landColor};">${avgLand}%</span>
      </div>
    </div>
    <div class="topic-footer">
      ${statusPill}
      <span class="start-link">${ctaLabel}</span>
    </div>
  </div>`;
}

async function init() {
  const auth = await Auth.requireStudent();
  if (!auth) return;
  const { session, profile } = auth;
  const userId = session.user.id;
  const initials = (profile.full_name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
  buildSidebar('topics', 'student', { name: profile.full_name, initials, school: profile.school_name || '', yearGroup: profile.year_group || 'Year 12' });
  document.getElementById('header-avatar').textContent = initials;

  try {
    const [topics, masteryData] = await Promise.all([
      API.getTopics(),
      API.getStudentMastery(userId)
    ]);

    _topics = topics;
    _masteryMap = {};
    masteryData.forEach(m => { _masteryMap[m.subtopic_id] = m; });

    const readiness = API.calcReadiness(masteryData);
    document.getElementById('topics-sub').textContent = `${topics.length} topic${topics.length !== 1 ? 's' : ''} · ${masteryData.length} subtopic${masteryData.length !== 1 ? 's' : ''} practised`;
    document.getElementById('summary-row').innerHTML = `
      <div class="summary-card"><div class="label">Topics started</div><div class="value" style="color:var(--navy);">${masteryData.length}</div><div class="sub">Subtopics practised</div></div>
      <div class="summary-card"><div class="label">Learn it avg</div><div class="value" style="color:var(--learn-dark);">${readiness.learn}%</div><div class="sub">Recall &amp; concepts</div></div>
      <div class="summary-card"><div class="label">Link it avg</div><div class="value" style="color:var(--link-dark);">${readiness.link}%</div><div class="sub">Reasoning chains</div></div>
      <div class="summary-card"><div class="label">Land it avg</div><div class="value" style="color:var(--land);">${readiness.land}%</div><div class="sub">Written analysis</div></div>`;

    renderTopics();
  } catch (err) {
    console.error('[Topics]', err);
    document.getElementById('topics-sub').textContent = 'Could not load topics.';
    document.getElementById('topics-container').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error loading topics</h3><p>Please refresh the page.</p></div>`;
  }
}

init();
</script>
</body>
</html>
