<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco's Pizzeria — Wycombe Abbey Economics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navyd:#0f1729;--gold:#c9a84c;--goldl:#e2c47a;--cream:#f0e3c2;--green:#4caf80;--red:#e05060;--orange:#e0933a;--blue:#4a7fb5;--bluel:#6fa8d8;--teal:#2a9d8f;--pizza:#c0392b;--pizzal:#e74c3c;--warm:#f39c12;--purple:#9775b5;--txt:#fff;--mut:#dde3f0;--bdr:#2e3f60}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navyd);color:var(--txt);font-family:'Nunito','Segoe UI',sans-serif;font-size:16px;min-height:100vh}
header{background:linear-gradient(135deg,var(--navyd),var(--navy) 60%,#1e3060);border-bottom:2px solid var(--gold);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hl{display:flex;align-items:center;gap:.9rem}
.hlogo{height:48px;width:48px;object-fit:contain;border-radius:4px}
.hsch{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:var(--goldl);line-height:1.2}
.htit{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:700;color:var(--txt)}
.hsub{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.7}
.hbdg{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.09em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);padding:.24rem .78rem;border-radius:3px;background:rgba(201,168,76,.08)}
.hnav{display:flex;align-items:center;gap:.6rem}
.hbtn{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);padding:.28rem .72rem;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block}
.hbtn:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.app{max-width:1060px;margin:0 auto;padding:1.4rem 1.8rem}
@media(max-width:650px){header{padding:0 1rem;height:64px}.htit{font-size:.95rem}.hbdg{display:none}.app{padding:1rem}}

/* HUB */
.hub-hero{text-align:center;padding:2rem 1rem 1.2rem}
.hub-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;opacity:.85}
.hub-title{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;line-height:1.1;margin-bottom:.3rem;color:var(--txt)}
.hub-emoji{font-size:2.4rem;display:block;margin-bottom:.4rem}
.hub-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--goldl);margin-bottom:.9rem}
.hub-intro{font-size:.9rem;color:var(--mut);max-width:640px;margin:0 auto 1.4rem;line-height:1.8;opacity:.88}

/* HUB ZONES */
.zone{margin-bottom:2rem}
.zone-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.7rem;padding:0 .2rem;border-bottom:1px solid var(--bdr);padding-bottom:.45rem}
.zone-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--txt)}
.zone-title .zt-num{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);opacity:.75;margin-right:.55rem;font-weight:500;display:inline-block;vertical-align:middle}
.zone-sub{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);opacity:.5}

/* FOUNDATION CARDS — lighter, parchment feel */
.found-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:.7rem;margin-bottom:.6rem}
.fc-card{background:linear-gradient(180deg,rgba(240,227,194,.07),rgba(240,227,194,.03));border:1px solid rgba(240,227,194,.22);border-radius:10px;padding:.95rem 1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-align:left}
.fc-card:hover{border-color:rgba(240,227,194,.5);background:linear-gradient(180deg,rgba(240,227,194,.12),rgba(240,227,194,.05));transform:translateY(-2px)}
.fc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cream);opacity:.45}
.fc-icon{font-size:1.4rem;margin-bottom:.3rem;display:block}
.fc-num{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--cream);opacity:.6;margin-bottom:.15rem}
.fc-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--txt);margin-bottom:.25rem;line-height:1.2}
.fc-tag{font-size:.7rem;color:var(--mut);opacity:.7;line-height:1.5}

/* PHASE CARDS — coloured accents (existing visual language) */
.phase-map{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.6rem;margin-bottom:.8rem}
.pm-card{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:.8rem .85rem;position:relative;overflow:hidden;cursor:pointer;transition:all .2s;text-align:left}
.pm-card:hover{border-color:rgba(201,168,76,.4);background:rgba(26,39,68,.7);transform:translateY(-2px)}
.pm-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--bdr))}
.pm-n{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);opacity:.5;margin-bottom:.2rem}
.pm-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:700;margin-bottom:.2rem;color:var(--txt)}
.pm-concepts{font-size:.68rem;color:var(--mut);opacity:.65;line-height:1.45}
.start-btn{display:block;margin:.6rem auto 0;padding:.95rem 2.6rem;background:linear-gradient(135deg,var(--pizza),var(--pizzal));border:none;border-radius:8px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(192,57,43,.4)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(192,57,43,.5)}
.start-hint{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);opacity:.5;margin-top:.5rem}

/* LESSON / PHASE HEADER */
.phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.3rem;background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px 9px 0 0;gap:1rem}
.ph-left{flex:1}
.ph-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.25rem}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--txt)}
.ph-right{text-align:right;flex-shrink:0}
.ph-score-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);opacity:.6}
.ph-score{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--goldl)}
.phase-progress{height:4px;background:var(--bdr);margin-bottom:1.1rem}
.phase-pfill{height:100%;transition:width .4s;background:linear-gradient(90deg,var(--pizza),var(--warm))}
.phase-pfill.found{background:linear-gradient(90deg,var(--cream),var(--goldl))}

/* RECAP PILL */
.recap-pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(240,227,194,.08);border:1px solid rgba(240,227,194,.28);color:var(--cream);padding:.2rem .55rem;border-radius:3px;margin-bottom:.6rem;cursor:pointer;transition:all .15s;text-decoration:none}
.recap-pill:hover{background:rgba(240,227,194,.15);color:var(--txt)}

/* BLOCKS */
.story-box{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:0 0 9px 9px;padding:1.2rem 1.4rem;margin-bottom:1rem;font-size:.9rem;line-height:1.8;color:var(--txt)}
.story-box em{color:var(--goldl);font-style:italic}
.concept-strip{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.cbadge{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.06em;text-transform:uppercase;padding:.14rem .42rem;border-radius:3px}
.cb-cost{background:rgba(74,127,181,.12);border:1px solid rgba(74,127,181,.3);color:var(--bluel)}
.cb-rev{background:rgba(76,175,128,.12);border:1px solid rgba(76,175,128,.3);color:var(--green)}
.cb-mkt{background:rgba(151,117,181,.12);border:1px solid rgba(151,117,181,.3);color:#c3a8e8}
.cb-eff{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--goldl)}
.cb-spec{background:rgba(42,157,143,.1);border:1px solid rgba(42,157,143,.3);color:#52c9bc}
.cb-found{background:rgba(240,227,194,.08);border:1px solid rgba(240,227,194,.3);color:var(--cream)}
.data-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.65rem;margin-bottom:1rem}
.data-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.8rem .9rem}
.data-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.55;margin-bottom:.2rem}
.data-val{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--goldl);line-height:1;margin-bottom:.12rem}
.data-note{font-size:.7rem;color:var(--mut);opacity:.65;line-height:1.4}

/* DIAGRAM */
.diagram-wrap{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:9px;padding:1.1rem;margin-bottom:1rem}
.diag-title{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem;opacity:.9}
.diag-live{display:flex;justify-content:center;gap:1rem;margin-top:.8rem;flex-wrap:wrap}
.live-box{text-align:center;background:rgba(26,39,68,.6);border:1px solid var(--bdr);border-radius:7px;padding:.55rem .8rem;min-width:95px}
.live-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.6}
.live-val{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--goldl)}
.live-val.profit{color:var(--green)}.live-val.loss{color:var(--red)}
.slider-wrap{text-align:center;margin:.6rem 0}
.slider-lbl{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);opacity:.7;margin-bottom:.4rem}
input[type=range]{-webkit-appearance:none;width:100%;max-width:400px;height:6px;background:var(--bdr);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--pizza);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 8px rgba(192,57,43,.4)}

/* DRAG & DROP CATEGORISER (Lesson 2) */
.dd-wrap{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:9px;padding:1.1rem;margin-bottom:1rem}
.dd-pool{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;min-height:50px;padding:.6rem;background:rgba(15,23,41,.4);border:1px dashed var(--bdr);border-radius:7px;margin-bottom:.85rem}
.dd-item{display:inline-block;font-size:.78rem;background:rgba(26,39,68,.7);border:1px solid var(--bdr);border-radius:6px;padding:.45rem .75rem;cursor:grab;user-select:none;transition:all .15s}
.dd-item:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}
.dd-item.dragging{opacity:.4;cursor:grabbing}
.dd-item.placed-fc{background:rgba(74,127,181,.18);border-color:var(--blue)}
.dd-item.placed-vc{background:rgba(76,175,128,.18);border-color:var(--green)}
.dd-item.placed-wrong{background:rgba(224,80,96,.18);border-color:var(--red)}
.dd-bins{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.dd-bin{background:rgba(15,23,41,.5);border:2px dashed var(--bdr);border-radius:8px;padding:.8rem;min-height:140px;transition:all .15s}
.dd-bin.over{border-style:solid;background:rgba(15,23,41,.7);border-color:var(--gold)}
.dd-bin-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.55rem;text-align:center}
.dd-bin.bin-fc .dd-bin-title{color:var(--bluel)}
.dd-bin.bin-vc .dd-bin-title{color:var(--green)}
.dd-bin-items{display:flex;flex-wrap:wrap;gap:.4rem}
.dd-feedback{margin-top:.7rem;padding:.55rem .8rem;font-size:.78rem;color:var(--mut);text-align:center;border-radius:5px;display:none}
.dd-feedback.show{display:block;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:var(--cream)}
@media(max-width:540px){.dd-bins{grid-template-columns:1fr}}

/* KITCHEN STORY (Lesson 3) */
.kitchen-narrative{background:rgba(15,23,41,.5);border:1px solid var(--bdr);border-radius:8px;padding:1rem 1.2rem;margin-top:.6rem;min-height:90px;transition:all .25s}
.kn-stage{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem}
.kn-stage.falling{color:var(--green)}
.kn-stage.bottom{color:var(--gold)}
.kn-stage.rising{color:var(--red)}
.kn-text{font-size:.86rem;line-height:1.65;color:var(--txt)}
.kn-text em{color:var(--goldl);font-style:italic}

/* QUESTIONS */
.q-section-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.55;margin-bottom:.65rem}
.q-stem-box{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:.8rem}
.q-spec-link{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;color:var(--teal);background:rgba(42,157,143,.1);border:1px solid rgba(42,157,143,.28);padding:.14rem .4rem;border-radius:3px;display:inline-block;margin-bottom:.45rem}
.q-stem{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:600;line-height:1.45;color:var(--txt)}
.q-opts{display:flex;flex-direction:column;gap:.55rem;margin-bottom:.9rem}
.q-opt{background:rgba(26,39,68,.45);border:2px solid var(--bdr);border-radius:9px;padding:.85rem 1.1rem;cursor:pointer;transition:all .18s;display:flex;gap:.8rem;align-items:flex-start;text-align:left;width:100%;font-family:inherit}
.q-opt:hover:not(.locked){border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.05)}
.q-opt.locked{cursor:default}
.q-opt.correct{border-color:var(--green)!important;background:rgba(76,175,128,.1)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(224,80,96,.08)!important}
.q-opt.reveal{border-color:var(--green)!important;background:rgba(76,175,128,.04)!important}
.q-letter{font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:700;width:20px;flex-shrink:0}
.q-opt.correct .q-letter{color:var(--green)}.q-opt.wrong .q-letter{color:var(--red)}.q-opt.reveal .q-letter{color:var(--green)}
.q-text{font-size:.86rem;line-height:1.6;color:var(--mut)}
.q-opt.correct .q-text,.q-opt.reveal .q-text{color:var(--txt)}
.q-fb{border-radius:8px;padding:.9rem 1.2rem;display:none;animation:fadeIn .3s;margin-bottom:.9rem}
.q-fb.show{display:block}
.q-fb.ok{background:rgba(76,175,128,.1);border:1px solid rgba(76,175,128,.3)}
.q-fb.bad{background:rgba(224,80,96,.08);border:1px solid rgba(224,80,96,.3)}
.fb-head{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem}
.q-fb.ok .fb-head{color:var(--green)}.q-fb.bad .fb-head{color:var(--red)}
.key-learn{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:5px;padding:.5rem .75rem;margin-bottom:.6rem}
.kl-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:.2rem}
.kl-text{font-size:.8rem;line-height:1.55;color:var(--txt)}
.fb-text{font-size:.84rem;line-height:1.72;color:var(--mut)}
.fb-text strong{color:var(--txt)}
.econ-box{background:rgba(74,127,181,.08);border:1px solid rgba(74,127,181,.28);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:1rem}
.econ-lbl{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bluel);margin-bottom:.5rem}
.econ-text{font-size:.84rem;line-height:1.75;color:var(--mut)}
.econ-text strong{color:var(--txt)}
.ms-box{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1rem}
.ms-lbl{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--goldl);margin-bottom:.5rem}
.ms-text{font-size:.82rem;line-height:1.72;color:var(--mut)}
.ms-text strong{color:var(--txt)}

/* SHUTDOWN */
.sd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.8rem;margin-bottom:1rem}
.sd-box{border-radius:9px;padding:1rem 1.1rem}
.sd-continue{background:rgba(76,175,128,.1);border:2px solid rgba(76,175,128,.4)}
.sd-close{background:rgba(224,80,96,.09);border:2px solid rgba(224,80,96,.35)}
.sd-neutral{background:rgba(224,147,58,.1);border:2px solid rgba(224,147,58,.35)}
.sd-title{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.45rem}
.sd-continue .sd-title{color:var(--green)}.sd-close .sd-title{color:var(--red)}.sd-neutral .sd-title{color:var(--orange)}
.sd-condition{font-size:.8rem;line-height:1.65;color:var(--mut)}
.sd-condition strong{color:var(--txt)}

/* OBJECTIVES & EFFICIENCY */
.obj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:.7rem;margin-bottom:1rem}
.obj-box{border-radius:8px;padding:.85rem 1rem;position:relative;overflow:hidden}
.obj-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.obj-pm{background:rgba(76,175,128,.1);border:1px solid rgba(76,175,128,.28)}.obj-pm::before{background:var(--green)}
.obj-srm{background:rgba(224,147,58,.09);border:1px solid rgba(224,147,58,.28)}.obj-srm::before{background:var(--orange)}
.obj-out{background:rgba(74,127,181,.08);border:1px solid rgba(74,127,181,.25)}.obj-out::before{background:var(--blue)}
.obj-sat{background:rgba(151,117,181,.09);border:1px solid rgba(151,117,181,.28)}.obj-sat::before{background:var(--purple)}
.obj-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.09em;text-transform:uppercase;margin-bottom:.3rem}
.obj-pm .obj-title{color:var(--green)}.obj-srm .obj-title{color:var(--orange)}.obj-out .obj-title{color:var(--bluel)}.obj-sat .obj-title{color:#c3a8e8}
.obj-rule{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--txt);margin-bottom:.3rem}
.obj-detail{font-size:.74rem;color:var(--mut);line-height:1.55;opacity:.85}
.eff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.8rem;margin-bottom:1rem}
.eff-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:1.1rem 1.2rem;position:relative;overflow:hidden}
.eff-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ec,var(--bdr))}
.eff-name{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;margin-bottom:.25rem}
.eff-score{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:.25rem}
.eff-verdict{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.06em;text-transform:uppercase;padding:.12rem .38rem;border-radius:3px;display:inline-block;margin-bottom:.5rem}
.ev-high{background:rgba(76,175,128,.15);border:1px solid rgba(76,175,128,.35);color:var(--green)}
.ev-med{background:rgba(224,147,58,.12);border:1px solid rgba(224,147,58,.3);color:var(--orange)}
.ev-low{background:rgba(224,80,96,.1);border:1px solid rgba(224,80,96,.3);color:var(--red)}
.eff-text{font-size:.76rem;line-height:1.65;color:var(--mut)}
.eff-text strong{color:var(--txt)}

/* DEBRIEF */

<script>
// ════════════════════════════════════════════════════════════════
//  COST MODEL — Nike-tick MC throughout
//  VC(Q) = 10Q − 0.15Q² + 0.00125Q³
//  MC(Q) = 10 − 0.3Q + 0.00375Q²    (U-shaped: min £4 at Q=40)
//  AVC(Q) = 10 − 0.15Q + 0.00125Q²  (min £5.50 at Q=60, MC=AVC there)
//  AC(Q)  = FC/Q + AVC(Q)           (min ≈£8.45 at Q≈75, MC=AC there)
// ════════════════════════════════════════════════════════════════
var FC=200;
function vc(q){return 10*q - 0.15*q*q + 0.00125*q*q*q}
function tc(q){return FC+vc(q)}
function mc(q){return 10 - 0.3*q + 0.00375*q*q}
function avc(q){return q>0 ? 10 - 0.15*q + 0.00125*q*q : 10}
function ac(q){return q>0 ? FC/q + avc(q) : 1e9}
function trv(q,p){return p*q}

// State
var G={node:'hub',answers:[],phaseScore:0,foundScore:0,locked:false,chosenQ:60,chosenP:10,kitchenStage:1,FCp1:200,FCp2:300};

// Render helper
function render(html){document.getElementById('root').innerHTML='<div class="fade-in">'+html+'</div>';window.scrollTo({top:0,behavior:'smooth'});}

// Headers/badges
function lessHdr(n,total,title,colour){
  return '<div class="phase-hdr"><div class="ph-left"><div class="ph-eyebrow" style="color:'+colour+'">Foundation '+n+' of '+total+'</div><div class="ph-title">'+title+'</div></div></div>'
    +'<div class="phase-progress"><div class="phase-pfill found" style="width:'+(n/total*100).toFixed(0)+'%"></div></div>';
}
function phHdr(n,total,title,colour){
  return '<div class="phase-hdr"><div class="ph-left"><div class="ph-eyebrow" style="color:'+colour+'">Phase '+n+' of '+total+'</div><div class="ph-title">'+title+'</div></div></div>'
    +'<div class="phase-progress"><div class="phase-pfill" style="width:'+(n/total*100).toFixed(0)+'%"></div></div>';
}
function bdg(items){
  return '<div class="concept-strip">'+items.map(function(a){return '<span class="cbadge '+a[1]+'">'+a[0]+'</span>';}).join('')+'</div>';
}
function recap(lessNum,title){
  return '<a class="recap-pill" onclick="goLesson('+lessNum+')">&#8634; Recap: Foundation '+lessNum+' — '+title+'</a>';
}
function qOpt(i,text,kind,id){
  return '<button class="q-opt" onclick="ans('+i+',\''+kind+'\',\''+id+'\')">'
    +'<span class="q-letter">'+['A','B','C','D'][i]+'</span>'

}
function msBox(text){return '<div class="ms-box"><div class="ms-lbl">&#9670; Exam Technique</div><div class="ms-text">'+text+'</div></div>';}
function econBox(text){return '<div class="econ-box"><div class="econ-lbl">&#9632; Economics Commentary</div><div class="econ-text">'+text+'</div></div>';}

// Answer keys
var CORRECT={
  l1:1, l2:1, l3:2, l4:0,
  p1:1, p2:1, p3:1, p4:0, p5:2
};

var KEY_LEARN={
  l1:'Total revenue = price × quantity. You can grow it by selling more or charging more, but they normally trade off — higher prices tend to mean fewer customers.',
  l2:'Costs split into two families: fixed (don\'t move with output) and variable (do). Average cost falls as output rises because fixed costs get spread across more units.',
  l3:'Marginal cost is the cost of one more unit. Its Nike-tick shape isn\'t a textbook artefact — it\'s the lived experience of a kitchen. Specialisation drives MC down at first; diminishing returns to a fixed factor drive it back up.',
  l4:'Profit is maximised where MC = MR — not where AC is minimised, and not where TR is highest. This is the single most important rule in microeconomics.',
  p1:'Profit is maximised where MC=MR (=P for a price-taker). This is not the same as minimum AC (productive efficiency). Confusing the two is a very common exam error.',
  p2:'Shut-down rule: produce in the SR if P≥AVC (revenue covers variable costs, contributing to FC). Close in the LR if P<AC persistently. Losses do not automatically mean shut down.',
  p3:'Under monopolistic competition: MC=MR gives profit-max output; read the demand curve for price. P>MC creates allocative inefficiency. In the LR, entry erodes supernormal profit until the demand curve is tangent to AC (normal profit only).',
  p4:'Baumol\'s sales revenue maximisation (SRM) sets MR=0. This maximises TR but collapses profit — a minimum profit constraint is needed in practice. SRM differs from profit max (MC=MR) and output max (P=AC).',
  p5:'When ownership and control divorce, the principal-agent problem appears: the manager (agent) does not automatically pursue the owner\'s (principal\'s) goals. Two consequences: <strong>X-inefficiency</strong> (Leibenstein) — operating above minimum AC because of organisational slack — and <strong>profit satisficing</strong> (Simon) — targeting "good enough" profit while pursuing other objectives such as community standing.'
};

var FEEDBACKS={
  l1:{ok:'Correct. TR = P × Q. Charging £20 might sound appealing, but if customers walk away the quantity drops faster than the price rises, and total revenue falls. Marco needs to find the price that maximises P × Q, not just the highest P. We\'ll meet the exact rule (MR = 0) in a later lesson.',
       bad:'TR = P × Q always. The flaw in "just charge £20" is that customers respond to price — at £20, demand might collapse. Higher prices don\'t always mean higher revenue, because Q falls. Revenue depends on <strong>both levers</strong>, and they normally trade off.'},
  l2:{ok:'Correct. AC fell from £15 to £6 because total fixed cost (£200) is now divided across many more pizzas. £200/20 = £10 per pizza in FC; £200/80 = £2.50 per pizza. The "spreading effect" is one of the most important reasons scale matters in business — it\'s the foundation of <strong>economies of scale</strong>, which we\'ll meet again in Phase 6.',
       bad:'The dominant force here is the <strong>spreading of fixed costs</strong>. FC is £200 regardless of output. At Q=20, that\'s £10 of FC per pizza. At Q=80, just £2.50. Variable cost per pizza changes too, but at moderate output the spreading effect dominates. This is why bigger firms often have lower per-unit costs.'},
  l3:{ok:'Correct. The Nike tick reflects two opposing forces. <strong>Specialisation and division of labour</strong> drive MC down early — extra workers can specialise (one preps, one bakes, one delivers), so each new pizza takes less labour to produce. Eventually <strong>diminishing marginal returns to the variable factor</strong> kick in — too many cooks crowded around one fixed oven means each new worker contributes less, so each new pizza costs more. The shape is fundamental to microeconomics.',
       bad:'MC doesn\'t move because of ingredient prices or demand — it\'s a <strong>production</strong> concept, not a market one. The Nike tick comes from two forces inside Marco\'s kitchen: <strong>specialisation and division of labour</strong> (early gains as workers specialise) and <strong>diminishing marginal returns</strong> (later losses as workers crowd around fixed capital — the one oven). Both forces are about how output responds to adding workers when capital is fixed.'},
  l4:{ok:'Correct. The profit peak sits exactly where MC = MR. At Q=50, MC=£4.4 and MR=£10 — every extra pizza adds £5.6 more to revenue than to cost, so produce more. Keep going until MC has risen to meet MR. Past that point, each extra pizza costs more than it earns and profit falls. <strong>This is the single most important rule in microeconomics</strong> — every Edexcel question on the firm comes back to it.',
       bad:'When MC < MR, every extra pizza adds more to revenue than to cost — so make more. When MC > MR, every extra pizza costs more than it earns — so make fewer. The profit-max output is the unique point where MC = MR. <strong>Producing fewer</strong> at MC=£4.4, MR=£10 leaves £5.60 of profit on the table per pizza. <strong>Producing the same</strong> ignores the rule. The right answer is "more, until MC rises to meet MR."'},
  p1:{ok:'Correct. Setting MC=MR=£12 on the rising part of the U-shaped MC curve gives <strong>Q≈86</strong>. TR=12×86=£1,032. TC=£746. Profit ≈£286/day. Note: AC is minimised earlier at Q≈75 (productive efficiency), where AC≈£8.45. These are <strong>different outputs</strong> — Edexcel mark schemes test this distinction explicitly.',
       bad:'The profit-maximising rule is <strong>MC=MR</strong> (=P for a price-taker). At Q=40, MC=£4 < £12 — produce more. At Q=110, MC≈£20 > £12 — those last pizzas lose money. At Q=75, AC is minimised (productive efficiency, ≈£8.45) — but profit is still rising there because MC<MR. Profit max sits at Q≈86, beyond min AC. Profit max ≠ cost min.'},
  p2:{ok:'Correct. At P=£6, MC=MR=P gives Q≈63. AVC(63)≈£5.51. Since P=£6 > AVC=£5.51, each pizza covers its variable cost <em>and</em> contributes a small amount toward FC. Loss from operating ≈ £269; loss from shutting = FC = £300. Better to operate by ~£31. <strong>Long run</strong>: AC(63) ≈ £10.27, far above £6 — exit unless price recovers or costs fall.',
       bad:'The shut-down decision compares <strong>P with AVC</strong>, not AC. Even with a total loss, if P≥AVC the firm covers variable costs and contributes to FC — operating beats shutting. Min AVC is £5.50 (at Q=60). At P=£6, P>AVC → produce. Only when P<AVC does producing worsen the loss. The LR exit condition is different: P<AC persistently → exit. Always distinguish these in exam answers.'},
  p3:{ok:'Correct. Setting MC=MR gives <strong>Q≈71</strong>. Reading up to the demand curve: P=22−0.1(71)=<strong>£14.90</strong>. AC(71)≈£8.47, so supernormal profit ≈ (14.90−8.47)×71 ≈ <strong>£457/day</strong>. In the <strong>long run</strong>, rivals enter attracted by supernormal profit, shifting Marco\'s demand curve left until tangent to AC — only normal profit remains. This tangency is the defining feature of monopolistic competition.',
       bad:'MR<P at every output because demand slopes down. £12 ignores Marco\'s new pricing power; £22 sells almost nothing. Correct: set MC=MR (Q≈71), then read up to demand for price (≈£15). Revenue max (MR=0) is a different objective at a higher output — we meet it in Phase 4.'},
  p4:{ok:'Correct. TR=PQ=22Q−0.1Q². TR maximised where MR=0: 22−0.2Q=0 → Q=110, P=£11. TR=£1,210. TC(110)=£1,149, giving a <strong>profit of just £61/day</strong> — a collapse from £457/day at profit max. Baumol\'s SRM doesn\'t bankrupt Marco, but it sacrifices ~87% of his profit. In practice, managerial firms add a <strong>minimum profit constraint</strong> — they maximise revenue <em>subject to</em> keeping profit above a floor that satisfies shareholders. This is why managerial firms typically <em>satisfice</em> rather than purely maximise either revenue or profit.',
       bad:'Sales revenue max sets MR=0 — the peak of the TR curve, NOT MC=MR. TR=22Q−0.1Q² peaks at Q=110, P=£11. At Q=71 (profit max), MR is still positive, so TR is still rising. Profit-maximisers stop at MC=MR; revenue-maximisers push to MR=0. The numbers prove the trade-off: TR(110)=£1,210 > TR(71)=£1,058, so revenue is higher — but profit collapses from £457 to just £61, because TC has risen from £601 to £1,149.'},
  p5:{ok:'Correct. Two distinct phenomena, two distinct responses. <strong>Cost slack</strong> (kitchen running above minimum AC, lazy procurement, idle staffing) is <strong>X-inefficiency</strong> — avoidable waste arising from the principal-agent gap. The remedy is incentive design: performance pay, profit-sharing, equity stake, sharper monitoring. <strong>Pricing below profit-max for goodwill</strong> is something else entirely — it is <strong>satisficing</strong> (Simon, 1956), a deliberate trade-off of profit for reputation, customer loyalty and community standing. The "popularity premium" is real economic value even if it does not appear on the P&amp;L. Fold the two together and Marco either over-corrects (squeezing Sofia until she damages the brand) or under-corrects (treating cost slack as a legitimate trade-off when it is not).',
       bad:'Two different things are happening and they need different responses. <strong>X-inefficiency</strong> (Leibenstein, 1966) is operating <em>above</em> minimum AC — production possibilities are being left on the table. It is avoidable waste, addressed through monitoring and incentive alignment. <strong>Profit satisficing</strong> (Simon, 1956) is the rational pursuit of multiple objectives — Sofia trades a bit of profit for the goodwill that comes with being seen as a fair, local, well-loved business. That goodwill is genuine value (repeat custom, lower marketing spend, resilience in downturns). Conflating the two leads either to over-correction (squeezing the brand to chase a profit-max output that customers will resent) or under-correction (excusing real cost slack as a "trade-off"). The exam-grade answer separates the diagnosis from the remedy.'}
};

function l1(){
  var html=lessHdr(1,4,'Opening Day — What Can I Earn?','#e2c47a')
    +bdg([['Total Revenue','cb-rev'],['Price','cb-rev'],['Quantity','cb-rev'],['Foundation','cb-found']])
    +'<div class="story-box">It is Monday morning. Marco\'s Pizzeria has just opened. The oven is hot, the dough is proved, the doors are unlocked. Marco\'s cousin Luca leans on the counter with a coffee and asks the obvious question: <em>"How much money can this place actually make?"</em><br><br>Today is purely about the money coming in. Costs are tomorrow\'s problem. The two levers Marco can pull are <strong>price</strong> (how much each pizza sells for) and <strong>quantity</strong> (how many he sells). The total money flowing in is called <strong>total revenue</strong>.</div>'
    +'<div class="diagram-wrap"><div class="diag-title">&#9632; Interactive — Move Both Sliders to Explore Total Revenue</div>'

    +'<svg viewBox="0 0 540 240" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;display:block;margin:.4rem auto">'
    +'<line x1="60" y1="20" x2="60" y2="200" stroke="#2e3f60" stroke-width="1.5"/>'
    +'<line x1="60" y1="200" x2="510" y2="200" stroke="#2e3f60" stroke-width="1.5"/>'

    +'</svg>'
    +'<div class="diag-live">'
    +'<div class="live-box"><div class="live-lbl">Price</div><div class="live-val" id="l1lP">£10</div></div>'

function updL1(){

  // Bar: x scales with Q (60-510 pixels = 0-100 pizzas), height scales with TR (200-20 = 0-1500)

// Drag and drop initialiser for Lesson 2
function initDD(){
  var items=document.querySelectorAll('.dd-item');
  var bins=document.querySelectorAll('.dd-bin');
  items.forEach(function(it){
    it.addEventListener('dragstart',function(e){
      e.dataTransfer.setData('text/plain',it.dataset.id);
      e.dataTransfer.setData('type',it.dataset.type);
      it.classList.add('dragging');
    });
    it.addEventListener('dragend',function(){it.classList.remove('dragging');});
  });
  bins.forEach(function(b){
    b.addEventListener('dragover',function(e){e.preventDefault();b.classList.add('over');});
    b.addEventListener('dragleave',function(){b.classList.remove('over');});
    b.addEventListener('drop',function(e){
      e.preventDefault();b.classList.remove('over');
      var id=e.dataTransfer.getData('text/plain');
      var type=e.dataTransfer.getData('type');
      var bin=b.dataset.bin;
      var src=document.querySelector('.dd-item[data-id="'+id+'"]');
      if(!src) return;
      if(type===bin){
        src.classList.remove('placed-wrong');
        src.classList.add(bin==='fc'?'placed-fc':'placed-vc');
      } else {
        src.classList.remove('placed-fc','placed-vc');
        src.classList.add('placed-wrong');
        setTimeout(function(){src.classList.remove('placed-wrong');},650);
        return;
      }
      src.setAttribute('draggable','false');
      b.querySelector('.dd-bin-items').appendChild(src);
      var pool=document.getElementById('l2pool');
      if(pool && pool.children.length===0){
        document.getElementById('l2dd').classList.add('show');
      }
    });
  });
}

function updL2(){
  var q=parseInt(document.getElementById('l2q').value);
  var fcpu=200/q, avcpu=avc(q), acpu=ac(q);
  document.getElementById('l2qv').textContent=q;
  document.getElementById('l2lQ').textContent=q;
  document.getElementById('l2lFC').textContent='£'+fcpu.toFixed(2);
  document.getElementById('l2lAVC').textContent='£'+avcpu.toFixed(2);
  document.getElementById('l2lAC').textContent='£'+acpu.toFixed(2);
  // Build AC curve points
  var pts=[];
  for(var i=10;i<=100;i+=2){
    var x=60+(i-0)*(450/100);
    var v=ac(i);
    var y=200-(v/30*180);
    if(y>=15&&y<=200) pts.push(x.toFixed(1)+','+y.toFixed(1));
  }
  document.getElementById('l2acC').setAttribute('points',pts.join(' '));
  // Marker
  var mx=60+q*(450/100), my=200-(acpu/30*180);
  document.getElementById('l2qline').setAttribute('x1',mx);document.getElementById('l2qline').setAttribute('x2',mx);
  document.getElementById('l2dot').setAttribute('cx',mx);document.getElementById('l2dot').setAttribute('cy',my);
}

    +'<div class="sd-grid">'
    +'<div class="sd-box sd-continue"><div class="sd-title">&#10003; Stay Open (Short Run)</div><div class="sd-condition">Condition: <strong>P ≥ AVC</strong><br><br>At P=£6, MC=MR=P at Q≈'+qStar+'.<br>AVC('+qStar+') ≈ <strong>£'+avcStar.toFixed(2)+'</strong>.<br>P=£6 &gt; AVC=£'+avcStar.toFixed(2)+' ✓ → Produce<br><br>Loss from operating: TR−TC<br>= '+Math.round(trStar)+' − '+Math.round(tcStar)+' = <strong>−£'+Math.abs(Math.round(lossOp))+'</strong><br>Loss from shutting: FC = <strong>−£'+FCp+'</strong><br>Better to operate by ~£'+(FCp-Math.abs(Math.round(lossOp)))+'.</div></div>'

function goPhase(n){G.node='p'+n;G.locked=false;
  if(n>=1&&n<=5){[null,p1,p2,p3,p4,p5][n]();}
  else if(n===6){pAudit();}
}

// Answer handler — works for both lessons and phases
function ans(chosen,kind,id){
  if(G.locked) return;
  G.locked=true;
  var correct=CORRECT[id];
  var ok=chosen===correct;
  if(ok){
    if(kind==='l') G.foundScore++;
    else G.phaseScore++;
  }
  G.answers.push({id:id,kind:kind,ok:ok,chosen:chosen,correct:correct});
  document.querySelectorAll('.q-opt').forEach(function(el,i){
    el.classList.add('locked');
    if(i===correct) el.classList.add(ok?'correct':'reveal');
    if(i===chosen&&!ok) el.classList.add('wrong');
  });
  var fb=document.getElementById('fb-'+id);
  fb.className='q-fb show '+(ok?'ok':'bad');
  fb.innerHTML='<div class="fb-head">'+(ok?'&#10003; Correct':'&#10007; Not quite — here\'s the economics')+'</div>'
    +'<div class="key-learn"><div class="kl-lbl">Key Learning</div><div class="kl-text">'+KEY_LEARN[id]+'</div></div>'
    +'<div class="fb-text">'+(ok?FEEDBACKS[id].ok:FEEDBACKS[id].bad)+'</div>';
  document.getElementById('nx-'+id).style.display='flex';
  G.locked=false;
}

    +'<div class="data-box"><div class="data-lbl">Profit Sacrificed</div><div class="data-val" style="color:var(--red)">≈87%</div><div class="data-note">£'+Math.round(pPM-pTR)+' lost moving from MC=MR to MR=0</div></div>'

    +'<div style="font-size:.78rem;color:var(--mut);opacity:.75;line-height:1.65;margin-top:.4rem"><strong style="color:var(--txt)">Diagnose them separately.</strong> The left frame shows <em>cost slack</em> — Sofia\'s kitchen sits above its own minimum AC. This is avoidable; the firm could be cheaper if it tried. The right frame shows <em>price restraint</em> — Sofia sets P2 below the profit-max P1, which moves her further down the demand curve to a higher output (Q2 &gt; Q1). She sells more pizzas, but each one earns a slimmer margin (P2 is closer to AC), and total profit ends up below the MC=MR optimum. This is a chosen trade-off — volume and goodwill bought at the cost of margin — not waste. Same person, same business, two different economic stories.</div>'

  var p1ok=!!by.p1, p2ok=!!by.p2, p3ok=!!by.p3, p4ok=!!by.p4, p5ok=!!by.p5;

  var prodText=p1ok
    ? 'Marco understands the difference between profit max (MC=MR, Q≈86 in Phase 1) and productive efficiency (min AC, Q≈75). Under perfect competition, both conditions can hold in the long run as entry erodes supernormal profit. With pricing power (Phase 3 onwards) Marco produces below min AC — productively inefficient by definition, but consistent with profit-maximising behaviour. <strong>Productive efficiency requires AC = min AC.</strong>'
    : '<strong>Productive efficiency</strong> occurs at minimum average cost (where MC=AC). Under perfect competition long-run equilibrium, firms produce here because of zero economic profit and free entry. With pricing power (monopolistic competition, oligopoly), profit-maximising firms produce below min AC and so are productively inefficient. Marco\'s differentiated business after Phase 3 trades productive efficiency for differentiation rents.';

  var allocText=p3ok
    ? 'Allocative efficiency requires <strong>P = MC</strong>. Marco achieved this only in Phase 1 (perfect competition: P=MR=MC=£12). After differentiation (Phase 3), P&gt;MC even in long-run normal profit equilibrium — Marco\'s artisan pizzeria is allocatively inefficient. Interestingly, Sofia\'s satisficing in Phase 5 nudges price <em>closer</em> to MC than profit-max would — a small allocative gain bought at the cost of supernormal profit. The welfare loss from monopoly power is the gap between consumer willingness to pay (P) and resource cost (MC).'
    : 'Allocative efficiency requires <strong>P = MC</strong>, where price equals marginal cost. Achieved in perfect competition (P=MR=MC). NOT achieved in monopolistic competition or monopoly — these produce P&gt;MC and create deadweight loss. The intuition: when P&gt;MC, customers value extra units more than they cost to produce, so society is under-producing. Pricing restraint by satisficing managers can partly close the gap, but at the cost of supernormal profit.';

  var dynText=(p3ok&&p4ok)
    ? 'Dynamic efficiency is about <strong>improvement over time</strong> — innovation, R&amp;D, new products and processes. Marco\'s wood-fired oven and artisan brand (Phase 3) and the willingness to experiment with different business objectives (Phase 4) both reflect dynamic efficiency in action. Schumpeter argued monopoly profits fund innovation; the counter-view is that competition forces it. Edexcel marks both perspectives — show evaluation. Note the tension with X-efficiency: the same supernormal profit that funds dynamic efficiency can also breed the slack that X-inefficiency feeds on.'
    : 'Dynamic efficiency means <strong>improvements over time</strong> — innovation, new products, lower costs through R&amp;D. Schumpeter\'s thesis: monopoly profits give firms the resources and incentive to innovate. Counter-view: competitive pressure forces innovation while market power breeds complacency. Strong A-level answers acknowledge both. Marco\'s Phase 3 differentiation (artisan oven, brand) is dynamic efficiency in action — funded by the supernormal profit pricing power allows.';

  var xText=p5ok
    ? 'Phase 5 was the X-efficiency moment. <strong>X-efficiency (Leibenstein, 1966)</strong> is whether a firm operates on its production possibility frontier — no managerial slack, no waste. The principal-agent gap that opened when Marco hired Sofia is the textbook setup for X-inefficiency: pricing power means no competitive discipline, an absent owner means no monitoring discipline, and the manager\'s objectives differ from the owner\'s. The remedy is incentive design — performance pay, profit share, equity — which aligns Sofia\'s payoff with Marco\'s. Crucially, Sofia\'s satisficing on price is <em>not</em> X-inefficiency: it is a chosen trade-off for goodwill. Distinguishing avoidable slack from legitimate trade-offs is the hard part.'
    : '<strong>X-efficiency (Leibenstein, 1966)</strong> means a firm operating on its PPF — no slack, no waste. Market power and absent oversight create X-inefficiency risk: insulated from competition and from the owner, managers may tolerate slack. Phase 5 set this up explicitly — Sofia\'s kitchen running above its own minimum AC is X-inefficiency. The remedy is not micromanagement but incentive design: align the agent\'s payoff with the principal\'s through performance pay, profit share or equity. Note that satisficing on price (sub-profit-max output) is something different — a deliberate trade-off, not avoidable waste.';

  var html='<div class="phase-hdr"><div class="ph-left"><div class="ph-eyebrow" style="color:#6fa8d8">Phase 6 — Final Report</div><div class="ph-title">The Efficiency Audit</div></div><div class="ph-right"><div class="ph-score-lbl">Phase Score</div><div class="ph-score">'+ok+'/'+total+'</div></div></div>'
    +'<div class="phase-progress"><div class="phase-pfill" style="width:100%"></div></div>'
    +'<div class="story-box">Marco\'s Pizzeria has come a long way — from a single restaurant finding its sweet spot, through a price crisis, into a differentiated artisan brand with multiple objectives, and now run by a manager whose goals do not perfectly match the owner\'s. How <em>efficient</em> is the business? Economics recognises four distinct types of efficiency — each one tells a different story about resource allocation, and each one has shown up somewhere in Marco\'s journey.</div>'
    +'<div class="eff-grid">'
    +effBlock('Productive Efficiency','#4a7fb5',p1ok?'Understood':'Developing',p1ok?'ev-high':'ev-med',prodText)
    +effBlock('Allocative Efficiency','#4caf80','Partially Achieved','ev-med',allocText)
    +effBlock('Dynamic Efficiency','#c9a84c',(p3ok&&p4ok)?'Strong':'Developing',(p3ok&&p4ok)?'ev-high':'ev-med',dynText)
    +effBlock('X-Efficiency','#2a9d8f',p5ok?'Diagnosed':'At Risk',p5ok?'ev-high':'ev-med',xText)
    +'</div>'
    +msBox('<strong>In efficiency essays</strong>: always specify WHICH efficiency type and connect it to the specific market structure. Perfect competition (LR): both productive AND allocative efficiency. Monopoly: neither — P&gt;MC and Q below min AC. Monopolistic competition (LR): neither — P&gt;MC (allocative inefficiency) and tangency above min AC (productive inefficiency, excess capacity). For X-efficiency, the trigger is weak competitive pressure <em>or</em> divorce of ownership and control (Berle &amp; Means, 1932) — Marco\'s pizzeria after Sofia takes over is the canonical setup. <strong>Edexcel mark scheme phrase</strong>: "Productive efficiency occurs where average cost is minimised (MC=AC). Allocative efficiency occurs where P=MC, representing the socially optimal allocation of resources. X-inefficiency arises when a firm fails to minimise its average costs at a given output, often associated with a lack of competitive pressure or the divorce of ownership from control."')
    +'<div class="section-lbl" style="font-family:\'IBM Plex Mono\',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.55;margin-bottom:.5rem">AI Economics Tutor &mdash; Personalised Debrief</div>'
    +'<div class="debrief-box" id="debriefBox"><div class="debrief-loading">Reviewing your journey through Marco\'s<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span></div></div>'
    +'<div class="btn-row" style="margin-top:1rem"><button class="btn b-pizza" onclick="goHub()">&#8635; Play Again</button><button class="btn b-sec" onclick="goHub()">&larr; Hub</button></div>'
    +'<div style="height:2rem"></div>';
  render(html);
  fetchDebrief(ok,total);
}

// ════════════════════════════════════════════════════════════════
//  AI DEBRIEF (uses Anthropic API)
// ════════════════════════════════════════════════════════════════
function fetchDebrief(ok,total){
  var phaseAnswers=G.answers.filter(function(a){return a.kind==='p';});
  var foundAnswers=G.answers.filter(function(a){return a.kind==='l';});
  var summary=phaseAnswers.map(function(a){
    var n=parseInt(a.id.replace('p',''));
    var names={1:'Profit max under perfect competition (MC=MR vs min AC)',2:'Shut-down rule (P vs AVC)',3:'Monopolistic competition pricing &amp; LR tangency',4:'Baumol\'s sales revenue maximisation',5:'Principal-agent, X-inefficiency &amp; satisficing'};
    return 'Phase '+n+' ('+names[n]+'): '+(a.ok?'Correct':'Incorrect');
  }).join('; ');
  var foundSummary=foundAnswers.length>0
    ? 'Foundation lessons completed: '+foundAnswers.length+'/4 ('+foundAnswers.filter(function(a){return a.ok;}).length+' correct).'
    : 'Foundation lessons not attempted.';

  var prompt='You are an experienced A-level Economics teacher at a UK independent school giving personalised feedback after a 10-stage business economics simulation called Marco\'s Pizzeria — covering core Edexcel Paper 1 microeconomics (4 foundation lessons + 5 phases + 1 efficiency audit). Write in UK English, in a warm but academically rigorous tone. Plain paragraphs only — no bullet points, no headers, no markdown asterisks. Three focused paragraphs.\n\n'
    +'Phase score: '+ok+'/'+total+'. '+foundSummary+'\nPhase breakdown: '+summary+'.\n\n'
    +'Paragraph 1: Identify any phases where the student answered incorrectly and explain the economic concept they misapplied. Use precise Edexcel terminology: MC=MR profit maximisation, productive efficiency (minimum AC), shut-down condition (P>=AVC), monopolistic competition long-run tangency, Baumol\'s sales revenue maximisation (MR=0, minimum profit constraint), principal-agent problem (Berle and Means 1932, divorce of ownership and control), X-inefficiency (Leibenstein 1966), profit satisficing (Simon 1956, bounded rationality), allocative efficiency (P=MC). If all correct, deepen analysis of the most nuanced concept — typically the distinction between X-inefficiency and satisficing in Phase 5.\n\n'
    +'Paragraph 2: Discuss the progression the student experienced — from perfect competition (Phase 1-2) through monopolistic competition (Phase 3-4) to the principal-agent setup (Phase 5) — and what the efficiency outcomes were at each stage. Connect explicitly to the four efficiency types (productive, allocative, dynamic, X-efficiency) and how they change as the firm gains market power and as ownership divorces from control. Reference the Nike-tick MC curve from Foundation 3 as the underlying production reality. Emphasise that Phase 5 is where X-efficiency becomes the live concept: pricing power plus an absent owner is the textbook setup for X-inefficiency.\n\n'
    +'Paragraph 3: Give two specific, targeted Edexcel Paper 1 exam technique tips tailored to the gaps revealed by this student\'s performance — referencing specific question types (4-mark explain, 8-mark diagram, 25-mark essay), mark scheme language, and the specific concepts this student needs to practise.';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var box=document.getElementById('debriefBox');
    if(box){
      var paras=text.split(/\n\n+/).filter(function(p){return p.trim();});
      box.innerHTML=paras.map(function(p){return '<p>'+p.trim()+'</p>';}).join('');
    }
  })
  .catch(function(){
    var box=document.getElementById('debriefBox');
    if(box)box.innerHTML='<p>Debrief unavailable — check your connection.</p>';
  });
}
