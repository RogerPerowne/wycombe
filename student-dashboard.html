<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Progress - Wycombe Abbey Economics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="quiz-styles.css">
<style>
.dash-hero{text-align:center;padding:1.8rem 1rem 1.2rem}
.dash-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700}
.dash-class{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--bluel);margin-top:.25rem}
.dash-stats{display:flex;justify-content:center;gap:2rem;margin-top:1rem;flex-wrap:wrap}
.stat-box{text-align:center}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;line-height:1}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);opacity:.55;margin-top:.2rem}

.theme-section{margin-bottom:1.6rem}
.theme-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--bdr)}
.theme-tag{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .6rem;border-radius:3px;font-weight:700}
.theme-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700}

.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.55rem}
.qcard{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.7rem .85rem;position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:all .18s}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-col,var(--bdr))}
.qcard:hover{border-color:var(--card-col,var(--bdr));background:rgba(26,39,68,.8);transform:translateY(-1px)}
.qcard-name{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:700;line-height:1.3;margin-bottom:.3rem}
.qcard-score{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:700;margin-bottom:.15rem}
.qcard-meta{font-family:'IBM Plex Mono',monospace;font-size:.46rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);opacity:.5}
.qcard.not-done{opacity:.45}
.qcard.not-done .qcard-score{color:var(--mut)}

.login-prompt{text-align:center;padding:4rem 2rem}
.login-prompt h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:.8rem}
.login-prompt p{color:var(--mut);margin-bottom:1.5rem;font-size:.9rem}
</style>
</head>
<body>

<header>
  <div class="hl">
    <img class="hlogo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Wycombe_Abbey_Lozenge_Grey_on_Blue_for_Wikipedia_19.02.20_KL.jpg" alt="WA" onerror="this.style.display='none'">
    <div>
      <div class="htit">My Progress</div>
      <div class="hsub">A-Level Economics &middot; Quiz Dashboard</div>
    </div>
  </div>
  <div class="hnav">
    <a href="micro-quiz.html" class="hbtn">Paper 1</a>
    <a href="macro-quiz.html" class="hbtn">Paper 2</a>
  </div>
</header>

<div class="app" id="root">
  <div style="text-align:center;padding:4rem 0;color:var(--mut);opacity:.5">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="quiz-data.js"></script>
<script src="tracker.js"></script>
<script>
(async function(){
  var root = document.getElementById('root');
  var user = getCurrentUser();

  if (!user) {
    root.innerHTML =
      '<div class="login-prompt">'
      + '<h2>Student Dashboard</h2>'
      + '<p>Log in to see your quiz progress and scores across all topics.</p>'
      + '<button class="btn b-blue" onclick="showLoginModal()" style="font-size:.7rem;padding:.8rem 1.6rem">Log In</button>'
      + '<p style="margin-top:1.5rem;font-size:.75rem;opacity:.4">'
      + '<a href="micro-quiz.html" style="color:var(--goldl);text-decoration:none">Browse quizzes without logging in &rarr;</a></p>'
      + '</div>';
    return;
  }

  // Fetch attempts
  var sb = getSupabase();
  var attempts = [];
  if (sb) {
    try {
      var { data } = await sb.rpc('get_my_attempts', { p_profile_id: user.id });
      if (data) attempts = data;
    } catch(e) { console.warn(e); }
  }

  // Build best-score map: quizId -> { best, latest, count }
  var scoreMap = {};
  attempts.forEach(function(a) {
    if (!scoreMap[a.quiz_id]) scoreMap[a.quiz_id] = { best: 0, latest: 0, count: 0, maxScore: a.max_score };
    scoreMap[a.quiz_id].count++;
    var pct = Math.round(a.score / a.max_score * 100);
    if (pct > scoreMap[a.quiz_id].best) scoreMap[a.quiz_id].best = pct;
    scoreMap[a.quiz_id].latest = pct; // last in array (sorted desc)
  });
  // Fix: first attempt in desc array is actually the latest
  attempts.forEach(function(a) {
    if (!scoreMap[a.quiz_id]._latestSet) {
      scoreMap[a.quiz_id].latest = Math.round(a.score / a.max_score * 100);
      scoreMap[a.quiz_id]._latestSet = true;
    }
  });

  // Summary stats
  var totalQuizzes = Object.keys(QUIZZES).length;
  var completed = Object.keys(scoreMap).length;
  var avgBest = 0;
  if (completed > 0) {
    var sum = 0;
    Object.keys(scoreMap).forEach(function(k){ sum += scoreMap[k].best; });
    avgBest = Math.round(sum / completed);
  }

  // Theme structure (from THEMES in quiz-data.js)
  var themeStructure = [];
  if (typeof THEMES !== 'undefined') {
    ['micro','macro'].forEach(function(paper) {
      if (THEMES[paper]) THEMES[paper].forEach(function(t) {
        themeStructure.push({ tag: t.label + ' · ' + t.paper, name: t.name, colour: t.colour, topics: t.topics });
      });
    });
  }

  // Build HTML
  var html = '<div class="dash-hero">'
    + '<div class="dash-name">' + escHtml(user.display_name) + '</div>'
    + '<div class="dash-class">' + escHtml(user.class_set) + '</div>'
    + '<div class="dash-stats">'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--bluel)">' + completed + '<span style="font-size:1rem;color:var(--mut);opacity:.4"> / ' + totalQuizzes + '</span></div><div class="stat-lbl">Quizzes completed</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:' + (avgBest >= 70 ? 'var(--green)' : avgBest >= 40 ? 'var(--goldl)' : 'var(--red)') + '">' + (completed > 0 ? avgBest + '%' : '&mdash;') + '</div><div class="stat-lbl">Average best score</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--coral)">' + attempts.length + '</div><div class="stat-lbl">Total attempts</div></div>'
    + '</div></div>';

  // Group quizzes by theme
  if (themeStructure.length > 0) {
    themeStructure.forEach(function(theme) {
      html += '<div class="theme-section">'
        + '<div class="theme-header">'
        + '<span class="theme-tag" style="color:' + theme.colour + ';border:1px solid ' + theme.colour + '55;background:' + theme.colour + '15">' + theme.tag + '</span>'
        + '<span class="theme-name">' + theme.name + '</span></div>'
        + '<div class="quiz-grid">';

      theme.topics.forEach(function(t) {
        var s = scoreMap[t.id];
        var col, scoreTxt, metaTxt, cls;
        if (s) {
          col = s.best >= 70 ? 'var(--green)' : s.best >= 40 ? 'var(--goldl)' : 'var(--red)';
          scoreTxt = '<span style="color:' + col + '">' + s.best + '%</span>';
          metaTxt = s.count + ' attempt' + (s.count > 1 ? 's' : '') + (s.count > 1 ? ' &middot; latest ' + s.latest + '%' : '');
          cls = '';
        } else {
          col = 'var(--bdr)';
          scoreTxt = '&mdash;';
          metaTxt = 'Not yet attempted';
          cls = ' not-done';
        }

        html += '<a href="quiz.html?topic=' + t.id + '" class="qcard' + cls + '" style="--card-col:' + col + '">'
          + '<div class="qcard-name">' + t.name + '</div>'
          + '<div class="qcard-score">' + scoreTxt + '</div>'
          + '<div class="qcard-meta">' + metaTxt + '</div></a>';
      });

      html += '</div></div>';
    });
  } else {
    // Fallback: flat list
    html += '<div class="quiz-grid">';
    Object.keys(QUIZZES).forEach(function(qid) {
      var q = QUIZZES[qid];
      var s = scoreMap[qid];
      var col = s ? (s.best >= 70 ? 'var(--green)' : s.best >= 40 ? 'var(--goldl)' : 'var(--red)') : 'var(--bdr)';
      html += '<a href="quiz.html?topic=' + qid + '" class="qcard' + (s ? '' : ' not-done') + '" style="--card-col:' + col + '">'
        + '<div class="qcard-name">' + q.title + '</div>'
        + '<div class="qcard-score">' + (s ? '<span style="color:' + col + '">' + s.best + '%</span>' : '&mdash;') + '</div>'
        + '<div class="qcard-meta">' + (s ? s.count + ' attempt' + (s.count > 1 ? 's' : '') : 'Not attempted') + '</div></a>';
    });
    html += '</div>';
  }

  root.innerHTML = html;
})();
</script>
</body>
</html>
