<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wa-root" content="../">
<title>Teacher Dashboard - Wycombe Abbey Economics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

<header>
  <div class="hl">
    <img class="hlogo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Wycombe_Abbey_Lozenge_Grey_on_Blue_for_Wikipedia_19.02.20_KL.jpg" alt="WA" onerror="this.style.display='none'">
    <div>
      <div class="htit">Teacher Dashboard</div>
      <div class="hsub">A-Level Economics &middot; Read-only</div>
    </div>
  </div>
  <div class="hnav">
    <a href="../micro-quiz.html" class="hbtn">Paper 1</a>
    <a href="../macro-quiz.html" class="hbtn">Paper 2</a>
  </div>
</header>

<div class="app" id="root">
  <div id="teacher-login" class="t-login">
    <h2>Teacher Access</h2>
    <div class="sub">Enter your username and password</div>
    <input id="t-user" type="text" class="t-input" placeholder="Username" autocomplete="off" autocapitalize="off" aria-label="Username">
    <input id="t-pass" type="password" class="t-input" placeholder="Password" aria-label="Teacher password">
    <div id="t-err" class="t-err" role="alert"></div>
    <button class="btn b-blue" id="t-login-btn" style="width:100%">Enter</button>
  </div>

  <div id="teacher-dash" style="display:none">
    <div class="tabs">
      <div class="tab active" data-tab="scores"  onclick="switchTab('scores')">Scores Overview</div>
      <div class="tab"        data-tab="detail"  onclick="switchTab('detail')">Student Detail</div>
    </div>

    <!-- Scores Panel -->
    <div id="panel-scores" class="panel active">
      <div class="scores-controls">
        <select id="class-filter"  onchange="renderScores()"><option value="all">All classes</option></select>
        <select id="paper-filter"  onchange="renderScores()">
          <option value="all">All papers</option>
          <option value="micro">Paper 1 (Micro)</option>
          <option value="macro">Paper 2 (Macro)</option>
        </select>
        <select id="theme-filter"  onchange="renderScores()"><option value="all">All themes</option></select>
        <select id="sort-by" onchange="renderScores()">
          <option value="name">Sort by name</option>
          <option value="score">Sort by avg score</option>
        </select>
      </div>
      <div id="scores-table" class="scores-wrap"></div>
    </div>

    <!-- Student Detail Panel -->
    <div id="panel-detail" class="panel">
      <div class="scores-controls">
        <select id="detail-student" onchange="renderStudentDetail()"><option value="">— Select a student —</option></select>
      </div>
      <div id="student-detail-content"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../quiz-data.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/db/client.js"></script>
<script src="../assets/js/db/auth.js"></script>
<script src="../assets/js/db/admin.js"></script>
<script>
var TEACHER_USER = '';
var TEACHER_PASS = '';
var DATA = { students: [], attempts: [] };

(function init() {
  if (!getSupabase()) {
    document.getElementById('root').innerHTML =
      '<div class="db-error"><h2>Database not configured</h2>'
      + '<p>Set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> in <code>assets/js/config.js</code>.</p></div>';
    return;
  }
  var uIn = document.getElementById('t-user');
  var pIn = document.getElementById('t-pass');
  var btn = document.getElementById('t-login-btn');
  btn.onclick = doTeacherLogin;
  [uIn, pIn].forEach(function(el){ el.addEventListener('keydown', function(e){ if (e.key==='Enter') doTeacherLogin(); }); });
})();

async function doTeacherLogin() {
  var user   = document.getElementById('t-user').value;
  var pw     = document.getElementById('t-pass').value;
  var errDiv = document.getElementById('t-err');
  var btn    = document.getElementById('t-login-btn');
  if (!user || !pw) { errDiv.textContent = 'Please enter username and password'; return; }
  btn.textContent = '...'; btn.disabled = true; errDiv.textContent = '';
  var result = await teacherLogin(user, pw);
  if (!result.ok) {
    errDiv.textContent = result.error || 'Invalid credentials';
    btn.textContent = 'Enter'; btn.disabled = false; return;
  }
  TEACHER_USER = user; TEACHER_PASS = pw;
  document.getElementById('teacher-login').style.display = 'none';
  document.getElementById('teacher-dash').style.display  = 'block';
  await loadData();
}

async function loadData() {
  var result = await getTeacherData(TEACHER_USER, TEACHER_PASS);
  if (result.ok) {
    DATA = result.data;
    populateFilters();
    renderScores();
    populateStudentDropdown();
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab===name); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.toggle('active', p.id==='panel-'+name); });
}

function populateFilters() {
  var classes = [], themes = [];
  DATA.students.forEach(function(s){ if (classes.indexOf(s.class_set)===-1) classes.push(s.class_set); });
  classes.sort();

  var cSel = document.getElementById('class-filter');
  while (cSel.options.length > 1) cSel.remove(1);
  classes.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; cSel.appendChild(o); });

  // Populate theme filter from THEMES
  var themeSel = document.getElementById('theme-filter');
  while (themeSel.options.length > 1) themeSel.remove(1);
  ['micro','macro'].forEach(function(paper){
    if (!THEMES[paper]) return;
    THEMES[paper].forEach(function(th){
      var o = document.createElement('option');
      o.value = th.label; o.textContent = th.label + ' — ' + th.name;
      themeSel.appendChild(o);
    });
  });
}

function populateStudentDropdown() {
  var sel = document.getElementById('detail-student');
  while (sel.options.length > 1) sel.remove(1);
  var sorted = DATA.students.slice().sort(function(a,b){ return (a.class_set+a.display_name).localeCompare(b.class_set+b.display_name); });
  sorted.forEach(function(s){
    var o = document.createElement('option');
    o.value = s.id; o.textContent = s.display_name + ' (' + s.class_set + ')';
    sel.appendChild(o);
  });
}

function getFilteredQuizIds() {
  var paperFilter = document.getElementById('paper-filter').value;
  var themeFilter = document.getElementById('theme-filter').value;
  return Object.keys(QUIZZES).filter(function(qid){
    var q = QUIZZES[qid];
    if (paperFilter !== 'all' && q.paper !== paperFilter) return false;
    if (themeFilter !== 'all') {
      var found = false;
      ['micro','macro'].forEach(function(paper){
        if (!THEMES[paper]) return;
        THEMES[paper].forEach(function(th){
          if (th.label === themeFilter && th.topics.some(function(t){ return t.id===qid; })) found=true;
        });
      });
      if (!found) return false;
    }
    return true;
  });
}

function renderScores() {
  var classFilter = document.getElementById('class-filter').value;
  var sortBy      = document.getElementById('sort-by').value;
  var quizIds     = getFilteredQuizIds();

  var students = DATA.students.filter(function(s){ return classFilter==='all' || s.class_set===classFilter; });

  var bestMap = {};
  DATA.attempts.forEach(function(a){
    if (!bestMap[a.profile_id]) bestMap[a.profile_id] = {};
    var pct = Math.round(a.score/a.max_score*100);
    if (!bestMap[a.profile_id][a.quiz_id] || pct > bestMap[a.profile_id][a.quiz_id])
      bestMap[a.profile_id][a.quiz_id] = pct;
  });

  // Compute averages for sorting
  if (sortBy === 'score') {
    students = students.slice().sort(function(a, b) {
      var avgA = computeAvg(bestMap[a.id], quizIds);
      var avgB = computeAvg(bestMap[b.id], quizIds);
      return avgB - avgA;
    });
  }

  if (students.length === 0) {
    document.getElementById('scores-table').innerHTML =
      '<div style="text-align:center;padding:2rem;color:var(--mut);opacity:.5">No students found.</div>';
    return;
  }

  // Class averages
  var classGroups = {};
  students.forEach(function(s){ (classGroups[s.class_set] = classGroups[s.class_set]||[]).push(s); });

  var html = '<table class="scores"><thead><tr><th>Student</th>';
  quizIds.forEach(function(qid){
    var title = QUIZZES[qid].title; if (title.length>18) title=title.substring(0,16)+'…';
    html += '<th title="'+escHtml(QUIZZES[qid].title)+'">'+escHtml(title)+'</th>';
  });
  html += '<th>Avg</th></tr></thead><tbody>';

  Object.keys(classGroups).sort().forEach(function(cls){
    var clsStudents = classGroups[cls];
    clsStudents.forEach(function(s){
      html += '<tr><td>'+escHtml(s.display_name)+'<span class="student-class">'+escHtml(s.class_set)+'</span></td>';
      var sum=0, count=0;
      quizIds.forEach(function(qid){
        var best = bestMap[s.id] && bestMap[s.id][qid];
        if (typeof best==='number') {
          html += '<td class="'+(best>=70?'cell-g':best>=40?'cell-a':'cell-r')+'">'+best+'</td>';
          sum+=best; count++;
        } else { html += '<td class="cell-e">&middot;</td>'; }
      });
      var avg=count>0?Math.round(sum/count):'';
      html += '<td class="'+(avg>=70?'cell-g':avg>=40?'cell-a':avg?'cell-r':'cell-e')+'" style="font-weight:700;border-left:1px solid var(--bdr)">'+(avg||'&middot;')+'</td></tr>';
    });
    // Class average row
    html += '<tr style="background:rgba(255,255,255,.03);font-style:italic"><td style="font-size:.68rem;opacity:.55;padding-left:.5rem">'+escHtml(cls)+' avg</td>';
    quizIds.forEach(function(qid){
      var vals=[]; clsStudents.forEach(function(s){ var v=bestMap[s.id]&&bestMap[s.id][qid]; if(typeof v==='number') vals.push(v); });
      if (vals.length) { var a=Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length); html+='<td class="'+(a>=70?'cell-g':a>=40?'cell-a':'cell-r')+'" style="opacity:.65">'+a+'</td>'; }
      else html+='<td class="cell-e">&middot;</td>';
    });
    html += '<td style="border-left:1px solid var(--bdr)"></td></tr>';
  });

  html += '</tbody></table>';
  document.getElementById('scores-table').innerHTML = html;
}

function computeAvg(quizMap, quizIds) {
  if (!quizMap) return -1;
  var sum=0, count=0;
  quizIds.forEach(function(qid){ if (typeof quizMap[qid]==='number') { sum+=quizMap[qid]; count++; } });
  return count>0 ? sum/count : -1;
}

function renderStudentDetail() {
  var studentId = parseInt(document.getElementById('detail-student').value);
  var container = document.getElementById('student-detail-content');
  if (!studentId) { container.innerHTML = ''; return; }

  var student = DATA.students.filter(function(s){ return s.id===studentId; })[0];
  if (!student) return;

  var attempts = DATA.attempts.filter(function(a){ return a.profile_id===studentId; });

  // Build per-quiz stats
  var quizStats = {};
  attempts.forEach(function(a){
    if (!quizStats[a.quiz_id]) quizStats[a.quiz_id] = { best:0, latest:null, count:0, dates:[] };
    var pct = Math.round(a.score/a.max_score*100);
    if (pct > quizStats[a.quiz_id].best) quizStats[a.quiz_id].best = pct;
    quizStats[a.quiz_id].count++;
    quizStats[a.quiz_id].dates.push({ pct:pct, at: a.completed_at });
  });
  // Set latest (most recent by date)
  Object.keys(quizStats).forEach(function(qid){
    var sorted = quizStats[qid].dates.slice().sort(function(a,b){ return b.at.localeCompare(a.at); });
    quizStats[qid].latest = sorted[0].pct;
    quizStats[qid].lastDate = sorted[0].at ? sorted[0].at.substring(0,10) : '';
  });

  var attempted   = Object.keys(quizStats);
  var totalQuizzes = Object.keys(QUIZZES).length;
  var avgBest = 0;
  if (attempted.length) {
    avgBest = Math.round(attempted.reduce(function(s,qid){ return s+quizStats[qid].best; },0) / attempted.length);
  }

  var html = '<div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.4rem;padding:.8rem 1rem;background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px">'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--bluel)">'+attempted.length+' <span style="font-size:1rem;color:var(--mut);opacity:.4">/ '+totalQuizzes+'</span></div><div class="stat-lbl">Topics attempted</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:'+(avgBest>=70?'var(--green)':avgBest>=40?'var(--goldl)':'var(--red)')+'">'+( attempted.length ? avgBest+'%' : '—')+'</div><div class="stat-lbl">Average best</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--mut)">'+attempts.length+'</div><div class="stat-lbl">Total attempts</div></div>'
    + '</div>';

  if (attempted.length === 0) {
    html += '<div style="text-align:center;padding:2rem;color:var(--mut);opacity:.5">No quiz attempts yet.</div>';
    document.getElementById('student-detail-content').innerHTML = html;
    return;
  }

  html += '<div class="scores-wrap"><table class="scores"><thead><tr>'
    + '<th style="text-align:left">Quiz</th><th>Best</th><th>Latest</th><th>Tries</th><th>Last attempt</th></tr></thead><tbody>';

  // Attempted topics
  var allTopics = [];
  ['micro','macro'].forEach(function(paper){ if (THEMES[paper]) THEMES[paper].forEach(function(th){ th.topics.forEach(function(t){ if(QUIZZES[t.id]) allTopics.push(t); }); }); });

  allTopics.forEach(function(t){
    var s = quizStats[t.id];
    if (!s) return;
    var bc = s.best>=70?'cell-g':s.best>=40?'cell-a':'cell-r';
    var lc = s.latest>=70?'cell-g':s.latest>=40?'cell-a':'cell-r';
    html += '<tr><td style="font-family:Nunito,sans-serif;text-align:left">'+escHtml(t.name)+'</td>'
      +'<td class="'+bc+'">'+s.best+'%</td>'
      +'<td class="'+lc+'">'+s.latest+'%</td>'
      +'<td>'+s.count+'</td>'
      +'<td style="font-size:.6rem;color:var(--mut)">'+s.lastDate+'</td></tr>';
  });

  // Not yet attempted
  var notAttempted = allTopics.filter(function(t){ return !quizStats[t.id]; });
  if (notAttempted.length) {
    notAttempted.forEach(function(t){
      html += '<tr style="opacity:.3"><td style="font-family:Nunito,sans-serif;text-align:left">'+escHtml(t.name)+'</td>'
        +'<td class="cell-e">&middot;</td><td class="cell-e">&middot;</td><td class="cell-e">&middot;</td><td class="cell-e">—</td></tr>';
    });
  }

  html += '</tbody></table></div>';
  document.getElementById('student-detail-content').innerHTML = html;
}
</script>
</body>
</html>
