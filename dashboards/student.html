<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Progress - Wycombe Abbey Economics</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

<header>
  <div class="hl">
    <img class="hlogo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Wycombe_Abbey_Lozenge_Grey_on_Blue_for_Wikipedia_19.02.20_KL.jpg" alt="WA" onerror="this.style.display='none'">
    <div>
      <div class="htit">My Progress</div>
      <div class="hsub">A-Level Economics &middot; Quiz Dashboard</div>
    </div>
  </div>
  <div class="hnav" id="hnav-root">
    <a href="../micro-quiz.html" class="hbtn">Paper 1</a>
    <a href="../macro-quiz.html" class="hbtn">Paper 2</a>
  </div>
</header>

<div class="app" id="root">
  <div style="text-align:center;padding:4rem 0;color:var(--mut);opacity:.5">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/data/quiz-data.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/db/client.js"></script>
<script src="../assets/js/db/auth.js"></script>
<script src="../assets/js/db/attempts.js"></script>
<script>
(async function(){
  var root = document.getElementById('root');
  var user = getCurrentUser();

  if (!user) {
    root.innerHTML =
      '<div style="text-align:center;padding:4rem 2rem">'
      + '<h2 style="font-family:\'Cormorant Garamond\',serif;font-size:1.8rem;margin-bottom:.8rem">Student Dashboard</h2>'
      + '<p style="color:var(--mut);margin-bottom:1.5rem;font-size:.9rem">Log in to see your quiz progress and scores across all topics.</p>'
      + '<button class="btn b-blue" onclick="showLoginModal()" style="font-size:.7rem;padding:.8rem 1.6rem">Log In</button>'
      + '<p style="margin-top:1.5rem;font-size:.75rem;opacity:.4">'
      + '<a href="../micro-quiz.html" style="color:var(--goldl);text-decoration:none">Browse quizzes without logging in &rarr;</a></p>'
      + '</div>';
    return;
  }

  var attempts = await getMyAttempts(user.id);

  // Build score map
  var scoreMap = {};
  attempts.forEach(function(a){
    if (!scoreMap[a.quiz_id]) scoreMap[a.quiz_id] = { best: 0, latest: 0, count: 0, _latestSet: false };
    var pct = Math.round(a.score / a.max_score * 100);
    if (pct > scoreMap[a.quiz_id].best) scoreMap[a.quiz_id].best = pct;
    if (!scoreMap[a.quiz_id]._latestSet) { scoreMap[a.quiz_id].latest = pct; scoreMap[a.quiz_id]._latestSet = true; }
    scoreMap[a.quiz_id].count++;
  });

  var totalQuizzes = Object.keys(QUIZZES).length;
  var completed    = Object.keys(scoreMap).length;
  var avgBest = 0;
  if (completed > 0) {
    var sum = 0;
    Object.keys(scoreMap).forEach(function(k){ sum += scoreMap[k].best; });
    avgBest = Math.round(sum / completed);
  }

  var html = '<div style="text-align:center;padding:1.8rem 1rem 1.2rem">'
    + '<div style="font-family:\'Cormorant Garamond\',serif;font-size:2rem;font-weight:700">' + (user.display_name || user.full_name) + '</div>'
    + '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--bluel);margin-top:.25rem">' + user.class_set + '</div>'
    + '<div class="dash-stats">'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--bluel)">' + completed + '<span style="font-size:1rem;color:var(--mut);opacity:.4"> / ' + totalQuizzes + '</span></div><div class="stat-lbl">Quizzes completed</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:' + (avgBest >= 70 ? 'var(--green)' : avgBest >= 40 ? 'var(--goldl)' : 'var(--red)') + '">' + (completed > 0 ? avgBest + '%' : '&mdash;') + '</div><div class="stat-lbl">Average best score</div></div>'
    + '<div class="stat-box"><div class="stat-val" style="color:var(--coral)">' + attempts.length + '</div><div class="stat-lbl">Total attempts</div></div>'
    + '</div></div>';

  // Theme structure
  var themeList = [];
  if (typeof THEMES !== 'undefined') {
    ['micro','macro'].forEach(function(p){
      if (THEMES[p]) THEMES[p].forEach(function(t){ themeList.push(t); });
    });
  }

  if (themeList.length) {
    themeList.forEach(function(theme){
      html += '<div class="theme-section">'
        + '<div class="theme-header">'
        + '<span class="theme-tag" style="color:' + theme.colour + ';border:1px solid ' + theme.colour + '55;background:' + theme.colour + '15">' + theme.label + ' &middot; ' + theme.paper + '</span>'
        + '<span class="theme-name">' + theme.name + '</span></div>'
        + '<div class="quiz-grid">';

      theme.topics.forEach(function(t){
        var s   = scoreMap[t.id];
        var col = s ? (s.best >= 70 ? 'var(--green)' : s.best >= 40 ? 'var(--goldl)' : 'var(--red)') : 'var(--bdr)';
        html += '<a href="../quiz.html?topic=' + t.id + '" class="qcard' + (s ? '' : ' not-done') + '" style="--card-col:' + col + '">'
          + '<div class="qcard-name">' + t.name + '</div>'
          + '<div class="qcard-score">' + (s ? '<span style="color:' + col + '">' + s.best + '%</span>' : '&mdash;') + '</div>'
          + '<div class="qcard-meta">' + (s ? s.count + ' attempt' + (s.count > 1 ? 's' : '') + (s.count > 1 ? ' &middot; latest ' + s.latest + '%' : '') : 'Not yet attempted') + '</div></a>';
      });

      html += '</div></div>';
    });
  }

  root.innerHTML = html;
})();
</script>
</body>
</html>
