<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The CMA Casefile — Wycombe Abbey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navyd:#0f1729;--gold:#c9a84c;--goldl:#e2c47a;--green:#4caf80;--red:#e05060;--orange:#e0933a;--blue:#4a7fb5;--bluel:#6fa8d8;--teal:#2a9d8f;--purple:#9775b5;--txt:#fff;--mut:#dde3f0;--bdr:#2e3f60}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navyd);color:var(--txt);font-family:'Nunito','Segoe UI',sans-serif;font-size:16px;min-height:100vh}
header{background:linear-gradient(135deg,var(--navyd),var(--navy) 60%,#1e3060);border-bottom:2px solid var(--gold);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hl{display:flex;align-items:center;gap:.9rem}
.hlogo{height:48px;width:48px;object-fit:contain;border-radius:4px}
.hsch{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:var(--goldl);line-height:1.2}
.htit{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:700;color:var(--txt)}
.hsub{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.7}
.hbdg{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.09em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);padding:.24rem .78rem;border-radius:3px;background:rgba(201,168,76,.08)}
.hnav{display:flex;align-items:center;gap:.6rem}
.hbtn{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mut);padding:.28rem .72rem;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block}
.hbtn:hover{background:rgba(255,255,255,.1);color:var(--txt)}
.app{max-width:1060px;margin:0 auto;padding:1.4rem 1.8rem}
@media(max-width:650px){header{padding:0 1rem;height:64px}.htit{font-size:.95rem}.hbdg{display:none}.app{padding:1rem}}

/* HUB */
.hub-hero{text-align:center;padding:2.2rem 1rem 1.4rem}
.hub-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;opacity:.85}
.hub-hero h1{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;line-height:1.1;margin-bottom:.35rem;color:var(--txt)}
.hub-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--goldl);margin-bottom:.9rem}
.hub-intro{font-size:.9rem;color:var(--mut);max-width:640px;margin:0 auto 1.4rem;line-height:1.8;opacity:.88}
.cma-process{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.6rem;margin-bottom:1.4rem}
.cp-step{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.8rem .9rem;text-align:center}
.cp-n{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--goldl);line-height:1;margin-bottom:.2rem}
.cp-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.65}
.cp-desc{font-size:.72rem;color:var(--mut);opacity:.55;margin-top:.3rem;line-height:1.4}
.case-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:1rem;margin-bottom:1.5rem}
.case-card{background:rgba(26,39,68,.7);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .22s;display:block;color:var(--txt);text-decoration:none}
.case-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.4);border-color:rgba(201,168,76,.3)}
.case-top{height:4px}
.case-body{padding:1.2rem 1.3rem}
.case-ref{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);opacity:.5;margin-bottom:.3rem}
.case-type{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;opacity:.85}
.case-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;margin-bottom:.25rem}
.case-sector{font-size:.78rem;color:var(--mut);opacity:.65;margin-bottom:.75rem}
.case-issues{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem}
.ci{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.05em;text-transform:uppercase;background:rgba(74,127,181,.1);border:1px solid rgba(74,127,181,.25);color:var(--bluel);padding:.1rem .38rem;border-radius:3px}
.case-diff{display:flex;align-items:center;justify-content:space-between}
.case-diff-lbl{font-family:'IBM Plex Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.5}
.diff-pip{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px}

/* DOSSIER */
.doss-header{background:rgba(26,39,68,.6);border:1px solid var(--bdr);border-radius:9px 9px 0 0;padding:1.1rem 1.4rem}
.doss-ref{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.5;margin-bottom:.3rem}
.doss-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;margin-bottom:.15rem;color:var(--txt)}
.doss-sub{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);opacity:.85}
.doss-stamp{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;border:2px solid var(--red);color:var(--red);padding:.2rem .6rem;border-radius:3px;margin-left:1rem;vertical-align:middle;opacity:.75}
.doss-tabs{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto}
.doss-tab{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.07em;text-transform:uppercase;padding:.6rem 1rem;cursor:pointer;color:var(--mut);opacity:.5;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;background:none;border-top:none;border-left:none;border-right:none}
.doss-tab.active{color:var(--gold);opacity:1;border-bottom-color:var(--gold)}
.doss-tab:hover:not(.active){opacity:.75}
.doss-panel{background:rgba(26,39,68,.35);border:1px solid var(--bdr);border-top:none;padding:1.3rem;margin-bottom:1.2rem;border-radius:0 0 9px 9px;min-height:200px}
.doss-section-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);opacity:.85;margin-bottom:.7rem}
.doss-text{font-size:.86rem;line-height:1.8;color:var(--mut);margin-bottom:.8rem}
.doss-text strong{color:var(--txt)}
.doss-text:last-child{margin-bottom:0}
.data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.7rem;margin-bottom:1rem}
.data-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.85rem 1rem}
.data-label{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);opacity:.55;margin-bottom:.2rem}
.data-value{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--goldl);line-height:1;margin-bottom:.15rem}
.data-note{font-size:.7rem;color:var(--mut);opacity:.55;line-height:1.4}
.claim-card{background:rgba(26,39,68,.4);border-left:3px solid;border-radius:0 7px 7px 0;padding:.85rem 1.1rem;margin-bottom:.65rem}
.claim-card.party{border-color:var(--blue)}
.claim-card.third{border-color:var(--orange)}
.claim-card.concern{border-color:var(--red)}
.claim-who{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.35rem}
.claim-card.party .claim-who{color:var(--bluel)}
.claim-card.third .claim-who{color:var(--orange)}
.claim-card.concern .claim-who{color:var(--red)}
.claim-text{font-size:.82rem;line-height:1.65;color:var(--mut)}
.claim-text strong{color:var(--txt)}
.eff-table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:.82rem}
.eff-table th{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);opacity:.6;padding:.45rem .7rem;border-bottom:1px solid var(--bdr);text-align:left}
.eff-table td{padding:.55rem .7rem;border-bottom:1px solid rgba(46,63,96,.4);color:var(--mut);vertical-align:top}
.eff-table td:first-child{color:var(--txt);font-weight:600}
.badge{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.05em;text-transform:uppercase;padding:.12rem .38rem;border-radius:3px;white-space:nowrap}
.badge-prod{background:rgba(76,175,128,.15);border:1px solid rgba(76,175,128,.3);color:var(--green)}
.badge-dyn{background:rgba(74,127,181,.15);border:1px solid rgba(74,127,181,.3);color:var(--bluel)}
.badge-alloc{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--goldl)}
.badge-x{background:rgba(151,117,181,.15);border:1px solid rgba(151,117,181,.3);color:#c3a8e8}

/* READING GUIDE */
.reading-guide{background:rgba(42,157,143,.08);border:1px solid rgba(42,157,143,.28);border-radius:7px;padding:.8rem 1rem;margin-bottom:1rem;display:flex;gap:.7rem;align-items:flex-start}
.rg-icon{font-size:1rem;flex-shrink:0;margin-top:.1rem}
.rg-label{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.09em;text-transform:uppercase;color:var(--teal);margin-bottom:.3rem}
.rg-text{font-size:.8rem;line-height:1.65;color:var(--mut)}
.rg-text strong{color:var(--txt)}

/* EFFICIENCY TAXONOMY */
.eff-taxonomy{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.6rem;margin-bottom:1.1rem}
.et-box{border-radius:7px;padding:.75rem .9rem}
.et-box.prod{background:rgba(76,175,128,.1);border:1px solid rgba(76,175,128,.28)}
.et-box.dyn{background:rgba(74,127,181,.1);border:1px solid rgba(74,127,181,.28)}
.et-box.alloc{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.28)}
.et-box.x{background:rgba(151,117,181,.1);border:1px solid rgba(151,117,181,.28)}
.et-label{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem}
.et-box.prod .et-label{color:var(--green)}
.et-box.dyn .et-label{color:var(--bluel)}
.et-box.alloc .et-label{color:var(--goldl)}
.et-box.x .et-label{color:#c3a8e8}
.et-text{font-size:.76rem;line-height:1.55;color:var(--mut)}

/* CONCENTRATION RATIO CALCULATOR */
.cr-calc{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:1rem 1.1rem;margin-bottom:1rem;font-family:'IBM Plex Mono',monospace;font-size:.78rem}
.cr-calc-title{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem}
.cr-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.35rem;flex-wrap:wrap;font-size:.76rem;color:var(--mut)}
.cr-row strong{color:var(--txt)}
.cr-row .cr-val{color:var(--goldl);font-weight:700}
.cr-divider{border:none;border-top:1px solid var(--bdr);margin:.5rem 0}
.cr-total{color:var(--green);font-weight:700;font-size:.82rem}

/* QUESTIONS */
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.q-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);opacity:.85}
.q-progress{display:flex;gap:.4rem}
.q-pip{width:10px;height:10px;border-radius:50%;border:2px solid var(--bdr);transition:all .2s}
.q-pip.done{background:var(--green);border-color:var(--green)}
.q-pip.active{background:var(--gold);border-color:var(--gold)}
.q-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.q-concept{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:var(--bluel);background:rgba(74,127,181,.1);border:1px solid rgba(74,127,181,.25);padding:.18rem .48rem;border-radius:3px;display:inline-block}
.q-spec{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;color:var(--goldl);background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.28);padding:.16rem .44rem;border-radius:3px;display:inline-block}
.q-stem{font-family:'Cormorant Garamond',serif;font-size:1.22rem;font-weight:600;line-height:1.45;margin-bottom:.25rem;color:var(--txt)}
.q-context{font-size:.84rem;color:var(--mut);opacity:.8;line-height:1.7;margin-bottom:1rem}
.q-options{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.q-opt{background:rgba(26,39,68,.45);border:2px solid var(--bdr);border-radius:9px;padding:.9rem 1.1rem;cursor:pointer;transition:all .18s;display:flex;gap:.85rem;align-items:flex-start;text-align:left;width:100%}
.q-opt:hover:not(.locked){border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.05)}
.q-opt.locked{cursor:default}
.q-opt.correct{border-color:var(--green)!important;background:rgba(76,175,128,.1)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(224,80,96,.08)!important}
.q-opt.reveal{border-color:var(--green)!important;background:rgba(76,175,128,.05)!important}
.q-opt-letter{font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:700;width:22px;flex-shrink:0;padding-top:.05rem}
.q-opt.correct .q-opt-letter{color:var(--green)}
.q-opt.wrong .q-opt-letter{color:var(--red)}
.q-opt.reveal .q-opt-letter{color:var(--green)}
.q-opt-text{font-size:.86rem;line-height:1.6;color:var(--mut)}
.q-opt.correct .q-opt-text,.q-opt.reveal .q-opt-text{color:var(--txt)}
.q-feedback{border-radius:8px;padding:1rem 1.2rem;margin-bottom:1rem;display:none;animation:fadeIn .3s}
.q-feedback.show{display:block}
.q-feedback.ok{background:rgba(76,175,128,.1);border:1px solid rgba(76,175,128,.3)}
.q-feedback.bad{background:rgba(224,80,96,.08);border:1px solid rgba(224,80,96,.3)}
.q-feedback-label{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem}
.q-feedback.ok .q-feedback-label{color:var(--green)}
.q-feedback.bad .q-feedback-label{color:var(--red)}
.key-learning{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:5px;padding:.55rem .75rem;margin-bottom:.65rem;font-size:.8rem;line-height:1.55;color:var(--txt)}
.kl-label{font-family:'IBM Plex Mono',monospace;font-size:.52rem;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);margin-bottom:.22rem}
.q-feedback-text{font-size:.84rem;line-height:1.72;color:var(--mut)}
.q-feedback-text strong{color:var(--txt)}

/* DECISION */
.decision-summary{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:9px;padding:1.1rem;margin-bottom:1.2rem}
.ds-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);opacity:.6;margin-bottom:.8rem}
.ds-row{display:flex;align-items:center;gap:.8rem;padding:.45rem 0;border-bottom:1px solid rgba(46,63,96,.4);font-size:.82rem}
.ds-row:last-child{border-bottom:none}
.ds-q{color:var(--mut);flex:1;opacity:.8}
.ds-a{font-family:'IBM Plex Mono',monospace;font-size:.56rem;padding:.14rem .42rem;border-radius:3px}
.ds-ok{background:rgba(76,175,128,.15);border:1px solid rgba(76,175,128,.35);color:var(--green)}
.ds-bad{background:rgba(224,80,96,.12);border:1px solid rgba(224,80,96,.3);color:var(--red)}
.decision-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:.7rem;text-align:center;color:var(--txt)}
.decision-opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.85rem;margin-bottom:1.2rem}
.dec-btn{border:2px solid;border-radius:10px;padding:1.15rem 1.1rem;cursor:pointer;transition:all .2s;text-align:center;background:transparent;width:100%}
.dec-btn:hover{transform:translateY(-2px)}
.dec-clear{border-color:rgba(76,175,128,.5)}.dec-clear:hover{border-color:var(--green);box-shadow:0 6px 20px rgba(76,175,128,.2)}
.dec-rem{border-color:rgba(224,147,58,.5)}.dec-rem:hover{border-color:var(--orange);box-shadow:0 6px 20px rgba(224,147,58,.2)}
.dec-block{border-color:rgba(224,80,96,.5)}.dec-block:hover{border-color:var(--red);box-shadow:0 6px 20px rgba(224,80,96,.2)}
.dec-icon{font-size:1.6rem;margin-bottom:.5rem}
.dec-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem}
.dec-clear .dec-label{color:var(--green)}.dec-rem .dec-label{color:var(--orange)}.dec-block .dec-label{color:var(--red)}
.dec-desc{font-size:.76rem;color:var(--mut);line-height:1.5;opacity:.82}
.remedy-opts{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1rem}
.rem-opt{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:7px;padding:.75rem 1rem;cursor:pointer;transition:all .18s;display:flex;gap:.75rem;align-items:flex-start;text-align:left;width:100%}
.rem-opt:hover{border-color:var(--orange);background:rgba(224,147,58,.06)}
.rem-opt-icon{font-size:1.1rem;flex-shrink:0}
.rem-opt-body{flex:1}
.rem-opt-title{font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--orange);margin-bottom:.25rem}
.rem-opt-desc{font-size:.78rem;color:var(--mut);line-height:1.55;opacity:.85}

/* VERDICT */
.verdict-banner{border-radius:10px;padding:1.3rem;margin-bottom:1.2rem;text-align:center}
.verdict-banner.aligned{background:rgba(76,175,128,.1);border:1px solid rgba(76,175,128,.35)}
.verdict-banner.partial{background:rgba(224,147,58,.1);border:1px solid rgba(224,147,58,.35)}
.verdict-banner.misaligned{background:rgba(224,80,96,.09);border:1px solid rgba(224,80,96,.3)}
.vb-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem}
.verdict-banner.aligned .vb-label{color:var(--green)}
.verdict-banner.partial .vb-label{color:var(--orange)}
.verdict-banner.misaligned .vb-label{color:var(--red)}
.vb-text{font-size:.86rem;line-height:1.7;color:var(--mut)}
.vb-text strong{color:var(--txt)}
.score-row{display:flex;justify-content:center;gap:.8rem;flex-wrap:wrap;margin-bottom:1.2rem}
.score-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:8px;padding:.7rem 1rem;text-align:center;min-width:100px}
.score-num{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--goldl)}
.score-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);opacity:.6;margin-top:.15rem}
.verdict-econ{background:rgba(74,127,181,.08);border:1px solid rgba(74,127,181,.28);border-radius:8px;padding:1.1rem 1.3rem;margin-bottom:1rem}
.ve-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bluel);margin-bottom:.6rem}
.ve-text{font-size:.84rem;line-height:1.75;color:var(--mut)}
.ve-text strong{color:var(--txt)}
.diagram-wrap{background:rgba(26,39,68,.4);border:1px solid var(--bdr);border-radius:9px;padding:1rem;margin-bottom:1rem;overflow-x:auto}
.diagram-title{font-family:'IBM Plex Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem;opacity:.9}
.mark-scheme-box{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1rem}
.ms-title{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--goldl);margin-bottom:.6rem}
.ms-text{font-size:.82rem;line-height:1.72;color:var(--mut)}
.ms-text strong{color:var(--txt)}

/* DEBRIEF */
.debrief-box{background:rgba(26,39,68,.5);border:1px solid var(--bdr);border-radius:10px;padding:1.4rem;min-height:100px;font-size:.86rem;line-height:1.8;color:var(--mut)}
.debrief-box p{margin-bottom:.8rem}.debrief-box p:last-child{margin-bottom:0}
.debrief-box strong{color:var(--txt)}
.debrief-loading{text-align:center;padding:2rem;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);opacity:.75}
.typing-dot{display:inline-block;animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

/* UTILITY */
.btn{padding:.75rem 1.2rem;border:none;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-weight:600}
.bg-teal{background:linear-gradient(135deg,#1e8070,var(--teal));color:#fff}
.bg-teal:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(42,157,143,.4)}
.bs{background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--mut)}
.bs:hover{background:rgba(255,255,255,.12);color:var(--txt)}
.btn-row{display:flex;justify-content:center;gap:.7rem;flex-wrap:wrap;margin-top:.8rem}
.section-lbl{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);opacity:.55;margin-bottom:.65rem}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .32s ease both}
</style>

      feedback:{ok:'Correct. The post-merger top 3 is SupraStore (35) + Merged NorthMart-FreshCo (29) + ValueGroc (9) = <strong>73%</strong>, against a pre-merger CR3 of 64% — a delta of +9pp. The elegant principle to commit to memory: when two top-3 firms merge, delta CR3 always equals the share of the pre-merger 4th-largest firm, because that firm is the one promoted into the now-vacated top-3 slot. The same logic gives delta CR5 = +5pp (LocalCo, at 5%, is bumped into the top 5). Both measures show meaningful tightening of an already concentrated market.',bad:'The correct calculation requires identifying the top 3 firms <em>before</em> and <em>after</em> the merger. Pre-merger top 3 = SupraStore (35) + NorthMart (18) + FreshCo (11) = <strong>64%</strong>. Post-merger, the merged NorthMart-FreshCo entity holds 29%, so the new top 3 = SupraStore (35) + Merged (29) + ValueGroc (9) = <strong>73%</strong>. Delta CR3 = +9pp. The frequent error is to assume CR3 is unchanged because the merger happens "within" the top 3 — but a new firm (ValueGroc) is bumped into the slot vacated when NorthMart and FreshCo collapsed into one entity, so concentration genuinely rises.'}
    },
    {
      concept:'Monopsony & Buyer Power',
      specLink:'Theme 3 · Market Failure — Buyer Power',
      keyLearning:'Monopsony is buyer-side market power. The CMA can find an SLC in input markets (suppliers) as well as output markets (consumers). They are separate theories of harm.',
      stem:'The UK Farmers\' Union warns that the combined entity would hold 29% of UK grocery purchasing — monopsony power over suppliers. How should the CMA assess this?',
      context:'Monopsony is buyer-side market power — the ability of a buyer to depress input prices below competitive levels. The CMA must consider effects in input markets (suppliers), not just output (consumer) markets. Both can constitute a substantial lessening of competition (SLC).',
      options:['Ignore it — the SLC test only applies to consumer markets, not supplier markets','Assess it as a separate theory of harm: buyer power harming suppliers may damage long-run supply chain quality, investment, and food security — even if consumer prices fall short-term','Accept the merged entity\'s argument that lower input costs benefit consumers through price pass-through','Buyer power is pro-competitive — it forces efficient suppliers and eliminates inefficient ones'],
      correct:1,
      feedback:{ok:'UK competition law explicitly recognises <strong>buyer power as a theory of harm</strong>. Monopsony harm operates differently from monopoly: suppliers are squeezed below competitive returns, reducing incentives to invest in quality, innovation, and capacity. Even if consumers benefit from lower prices short-term, long-run supply chain degradation is a genuine welfare concern — this appeared in both the Asda/EG Group and Tesco/Booker investigations.',bad:'The SLC test under the Enterprise Act 2002 applies to <strong>any market</strong>, including input markets. Buyer power creating monopsony harm to suppliers is a recognised theory of harm. Lower consumer prices from below-cost buying do not offset supplier harm — the welfare analysis must consider both sides of the market.'}
    },
    {
      concept:'Remedies — Structural vs Behavioural',
      specLink:'Theme 3 · Government Intervention — Competition Policy',
      keyLearning:'Structural remedies (divestiture) are always preferred to behavioural remedies (price caps). Behavioural remedies are difficult to monitor, easy to circumvent, and temporary. The CMA\'s Merger Remedies Guidance 2018 states this explicitly.',
      stem:'Substantial lessening of competition (SLC) found in 47 local markets. Parties propose a five-year price cap in overlap areas. CMA guidance strongly prefers structural remedies. What should be required?',
      context:'Structural remedies (e.g., store divestiture) change market structure permanently. Behavioural remedies (e.g., price caps) require ongoing monitoring and are vulnerable to circumvention via quality reductions, range changes, or service cuts.',
      options:['Accept the five-year price cap — it directly addresses the consumer price concern and is proportionate to the SLC','Require divestiture of stores in all 47 overlap areas to a suitable purchaser — restoring pre-merger competitive conditions structurally','Block the merger entirely — behavioural remedies are always inadequate, so remedies cannot work','Accept price caps in the 12 worst markets only — proportionate to the most severe SLC areas'],
      correct:1,
      feedback:{ok:'The CMA\'s strong preference for <strong>structural remedies</strong> is well-founded. Price caps are problematic: difficult to monitor across hundreds of product lines; firms can circumvent by reducing quality rather than raising headline prices; they expire after five years leaving the structural harm intact. Divestiture of stores to a qualified purchaser (tested for viability) restores the competitive constraint the merger removes — permanently, without ongoing monitoring burden.',bad:'Behavioural remedies like price caps are disfavoured because they are <strong>difficult to monitor, easy to circumvent, and temporary</strong>. A five-year cap does not solve a permanent structural problem — when it expires, the local monopoly remains. The CMA\'s Merger Remedies Guidance (2018) explicitly states structural remedies are preferred because they eliminate the source of the SLC rather than managing its effects.'}
    }
  ],
  remedies:[
    'Require divestiture of stores in all 47 overlap areas to a suitable approved purchaser',
    'Accept five-year price caps in the 12 most concentrated overlap markets',
    'Require behavioural undertakings: no store closures for five years plus independent price monitoring'
  ],
  verdictEcon:'The NorthMart/FreshCo case illustrates the fundamental tension in merger analysis: <strong>productive efficiency versus market power</strong>. The LRAC argument — that larger scale moves firms down the long-run average cost curve toward MES — is economically credible in grocery retail, where logistics and buying costs are significant. However, the CMA\'s framework requires efficiency gains to be merger-specific, verifiable, and passed through to consumers in the relevant market. The diagram above shows the key welfare concern: at the monopoly/cartel price Pm, output falls from Qc to Qm, creating both a <strong>transfer of consumer surplus to producer surplus</strong> (the rectangle) and a permanently destroyed <strong>deadweight welfare loss</strong> (the triangle). In the 12 local monopoly areas, consumers face exactly this outcome. The monopsony concern adds a second theory of harm: even if consumer prices fall, below-competitive supplier returns damage <strong>dynamic efficiency</strong> in the supply chain. The allocatively efficient outcome (P = MC in output markets) may still involve allocative inefficiency in input markets if suppliers earn below-normal profit. Structural divestiture is preferred because it restores the competitive market structure without requiring ongoing regulatory intervention.',
  realWorld:'The closest real-world parallel is the <strong>Sainsbury\'s/Asda proposed merger (2019)</strong>, blocked after the CMA found an SLC in 463 local grocery markets and 132 petrol stations. Asda\'s efficiency arguments were rejected. The monopsony concern also featured, with evidence that buyer power would squeeze supplier returns below competitive levels.',
  markScheme:'<strong>Exam technique for 25-mark essays on competition policy:</strong> Always apply the three-stage framework — (1) define the relevant market precisely, (2) assess the substantial lessening of competition (SLC) using concentration ratios (CR3/CR5) and theories of harm, (3) evaluate remedies against the structural/behavioural hierarchy. For efficiency arguments, always test: merger-specific? verifiable? passed through? Award yourself marks for correctly identifying the <em>type</em> of efficiency — productive, allocative, dynamic, or X-efficiency — as Edexcel mark schemes distinguish these explicitly. A common error is treating the national CR3 as definitive — always flag that grocery markets are local and national figures can mislead.'
},

      specLink:'Theme 3 · Barriers to Entry & Potential Competition',
      keyLearning:'Zero current market share does not preclude an SLC. Potential competition doctrine: a credible pipeline constrains incumbent behaviour NOW, even before entry. This is why high acquisition premiums are themselves evidence of competitive significance.',

      correct:1,
      feedback:{ok:'The doctrine of <strong>potential competition</strong> is well-established in competition law. A firm with a credible, near-term pipeline represents a competitive constraint on incumbents even before market entry — because the incumbent must respond to the threat. Phase II success rate is ~50%, making NovaCept a credible potential entrant. PharmaCorp\'s high premium (11.7× revenue vs 5–7× sector norm) is itself evidence they regard BioNova as a serious future competitive threat.',bad:'Zero current market share does not preclude an SLC finding. <strong>Potential competition doctrine</strong> holds that a credible future entrant constrains incumbent behaviour today. If BioNova posed no competitive threat, PharmaCorp would not pay 11.7× revenue — far above sector norms. The EC\'s Illumina/GRAIL (2022) review applied exactly this reasoning.'}

      correct:1,
      feedback:{ok:'The CMA\'s failing firm defence requires rigorous, independent verification — not reliance on the acquirer\'s assessment. The minority shareholders\' evidence of three PE investors directly challenges PharmaCorp\'s claim. The CMA would commission independent financial analysis of BioNova\'s funding alternatives, test whether a less anti-competitive acquirer (e.g., a smaller pharma firm without NSCLC presence) could have purchased BioNova, and assess whether NovaCept would truly be abandoned or merely delayed.',bad:'The failing firm defence has a <strong>strict three-part test</strong> — all three must be satisfied. PharmaCorp\'s claim that BioNova "cannot fund" Phase III is contested by evidence of PE interest. The CMA cannot accept the acquirer\'s own characterisation of the target\'s financial position — this creates an obvious incentive for acquirers to suppress alternative funding sources before bidding.'}

    {

      stem:'PharmaCorp argues the merger generates dynamic efficiency — faster drug development, better patient outcomes. Critics argue it destroys dynamic efficiency by eliminating competitive pressure for innovation. How do you resolve this?',

    {
      concept:'Decision — Block or Remedy?',

      stem:'You have found a likely substantial lessening of competition (SLC): the evidence suggests PharmaCorp is acquiring BioNova to neutralise NovaCept as a competitive threat. PE funding is available. What is the CMA\'s most appropriate determination?',
      context:'Since 2021, the FTC, EC, and CMA have significantly toughened their approach to "killer acquisitions" in pharmaceutical markets. A determination must match the severity of the SLC. Where the theory of harm is the elimination of a credible independent competitor, remedies may not adequately restore what is lost.',
      options:['Clear unconditionally — PharmaCorp\'s patient welfare argument and LRAC scale economies justify clearing','Clear with IP licensing remedy — require PharmaCorp to license NovaCept patents to one independent rival upon Phase III approval','Block the merger — PE funding is available, the killer acquisition evidence is strong, and no remedy adequately replicates BioNova\'s independence as a competitive innovator','Clear with development milestones — require PharmaCorp to reach Phase III within three years under independent oversight'],
      correct:2,
      feedback:{ok:'Correct. Where PE funding is demonstrably available and the killer acquisition evidence is strong — an 11.7× premium, suppression of PE interest, elimination of a credible Phase II pipeline — no behavioural or IP remedy adequately replicates BioNova\'s value as an <strong>independent competitive innovator</strong>. IP licensing preserves the drug but not the competitive pressure that drives PharmaCorp to innovate on other NSCLC treatments. The FTC\'s increasing willingness to seek preliminary injunctions in pharma mergers reflects exactly this reasoning: where independent entry is viable, permitting the acquisition is the greater harm.',bad:'IP licensing and milestone conditions sound proportionate, but they fail to address the core SLC: the loss of <strong>BioNova as an independent competitive constraint</strong> on PharmaCorp in NSCLC. A licensed NovaCept still removes the incentive for PharmaCorp to invest in the next generation of NSCLC treatments. Since PE funding is available — making BioNova a viable independent company — blocking the merger allows the competitive market to function without requiring ongoing regulatory intervention.'}
    }
  ],
  verdictEcon:'The PharmaCorp/BioNova case illustrates the tension at the heart of pharmaceutical merger policy: <strong>LRAC scale economies versus competitive incentives for innovation</strong>. As the diagram above shows, drug development faces extreme fixed costs — MES is reached only at very high revenue, structurally favouring larger firms. BioNova alone sits high on the LRAC curve; PharmaCorp operates closer to MES. This scale economy argument is real. But the Schumpeterian claim that market power enables R&D must be weighed against the Arrovian counter-argument: competitive pressure is a stronger driver of innovation than monopoly rents. The "killer acquisition" theory (Cunningham et al., 2021) formalises the concern that incumbents with supernormal profits have more to gain from neutralising threats than from competing with them. The CMA\'s decision to block — increasingly common in pharma since 2021 — reflects the principle that where independent funding is viable, competition is better protected by preserving market structure than by designing remedies. Note the distinction between <strong>static efficiency</strong> (PharmaCorp\'s lower LRAC — a snapshot gain) and <strong>dynamic efficiency</strong> (the long-run innovation losses from reduced competitive pressure — a flow harm). The blocking decision prioritises the flow harm over the snapshot gain.',
  realWorld:'The closest parallels are the FTC\'s ongoing enforcement against pharmaceutical "killer acquisitions," and the EC\'s 2022 review of Illumina/GRAIL — blocked on potential competition grounds despite GRAIL having zero revenue. The CMA investigated Sanofi/Pfizer\'s acquisitions of pipeline competitors in 2021–22. The shift in regulatory approach since 2020 reflects academic consensus that pharma killer acquisitions are common and harmful.',
  markScheme:'<strong>Exam technique for dynamic efficiency questions:</strong> Always distinguish static efficiency (productive + allocative — a snapshot) from dynamic efficiency (innovation — a flow over time). Edexcel mark schemes award separate marks for each. A common error is conflating LRAC economies of scale (a static productive efficiency argument) with dynamic efficiency (innovation incentives) — they point in opposite directions in killer acquisition cases. For 25-mark essays: state the Arrovian proposition (competition drives innovation), then evaluate the Schumpeterian counter-argument (scale enables investment), then reach a justified conclusion about which dominates given the market context.'

      correct:1,

  verdictEcon:'The StreamMax/PodcastPro case represents the frontier of competition analysis in <strong>digital platform markets</strong>. Traditional tools — concentration ratios, substantial lessening of competition (SLC) in horizontally overlapping markets — are insufficient because the merger is conglomerate/vertical: the parties do not currently compete. As the two-sided market diagram above shows, the competitive concern is structural: post-merger data integration creates a self-reinforcing feedback loop (more listeners → better algorithm → more listeners) that no new entrant can easily replicate. Baumol\'s contestability theory was developed for industries with low sunk costs and replicable cost structures. Data is different: it exhibits increasing returns to scale, creating positive feedback loops that function as <strong>non-replicable sunk costs</strong>. The FRAND data-access remedy attempts to correct this structural information asymmetry without requiring divestiture — reflecting the regulatory reality that once a data-intensive acquisition closes, full unwinding is nearly impossible. This connects to a core Edexcel concept: <strong>X-efficiency loss under monopoly</strong>. A dominant StreamMax/PodcastPro facing no effective rival would face weaker incentives to improve recommendation quality, invest in creator tools, or compress advertising prices. The efficiency gains from the merger (better recommendations) risk being offset by X-efficiency losses from reduced competitive pressure over time.',

var G = { caseId:null, phase:'hub', tab:'overview', qIndex:0, answers:[], score:0, decision:null, remedy:null, locked:false };
function getCase() { return CASES.find(function(c){return c.id===G.caseId;}); }

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function render(html) {
  document.getElementById('root').innerHTML = '<div class="fade-in">'+html+'</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── HUB ───────────────────────────────────────────────────────
function goHub() {
  G = {caseId:null,phase:'hub',tab:'overview',qIndex:0,answers:[],score:0,decision:null,remedy:null,locked:false};
  render(hubHTML());
}

function hubHTML() {
  var cards = CASES.map(function(c){
    var pips = [1,2,3].map(function(n){
      return '<span class="diff-pip" style="background:'+(n<=c.difficulty?c.colour:'rgba(46,63,96,.5)')+'"></span>';
    }).join('');
    var issues = c.keyIssues.map(function(i){return '<span class="ci">'+i+'</span>';}).join('');
    return '<div class="case-card" onclick="openCase(\''+c.id+'\')">'
      +'<div class="case-top" style="background:'+c.colour+'"></div>'
      +'<div class="case-body">'
      +'<div class="case-ref">'+c.ref+'</div>'
      +'<div class="case-type">'+c.type+'</div>'
      +'<div class="case-title">'+c.icon+' '+c.title+'</div>'
      +'<div class="case-sector">'+c.sector+'</div>'
      +'<div class="case-issues">'+issues+'</div>'
      +'<div class="case-diff"><span class="case-diff-lbl">Difficulty</span><span>'+pips+'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.52rem;color:var(--mut);opacity:.55;margin-left:.4rem">'+c.diffLabel+'</span></span></div>'
      +'</div></div>';
  }).join('');

  return '<div class="hub-hero">'
    +'<div class="hub-eyebrow">A-Level Economics &middot; Competition Policy</div>'
    +'<h1>The CMA Casefile</h1>'
    +'<div class="hub-tagline">Three merger investigations. You are the deciding panel.</div>'
    +'<p class="hub-intro">Each case places you in the role of a CMA investigator. Read the dossier — use the reading guide on each tab — interrogate the evidence, and issue your determination. Not all three cases have the same correct outcome.</p>'
    +'</div>'
    +'<div class="section-lbl">The CMA Investigation Process</div>'
    +'<div class="cma-process">'
    +'<div class="cp-step"><div class="cp-n">1</div><div class="cp-lbl">Market Definition</div><div class="cp-desc">Product and geographic scope</div></div>'
    +'<div class="cp-step"><div class="cp-n">2</div><div class="cp-lbl">Concentration</div><div class="cp-desc">CR3, CR5, market shares</div></div>'
    +'<div class="cp-step"><div class="cp-n">3</div><div class="cp-lbl">Substantial Lessening of Competition (SLC) Test</div><div class="cp-desc">Theories of harm</div></div>'
    +'<div class="cp-step"><div class="cp-n">4</div><div class="cp-lbl">Efficiencies</div><div class="cp-desc">Productive, dynamic, allocative</div></div>'
    +'<div class="cp-step"><div class="cp-n">5</div><div class="cp-lbl">Remedies</div><div class="cp-desc">Structural vs behavioural</div></div>'
    +'</div>'
    +'<div class="section-lbl">Select a Case</div>'
    +'<div class="case-grid">'+cards+'</div>';
}

// ── OPEN CASE ─────────────────────────────────────────────────
function openCase(id) {
  G.caseId=id; G.phase='dossier'; G.tab='overview';
  G.answers=[]; G.score=0; G.qIndex=0; G.decision=null; G.remedy=null; G.locked=false;
  renderDossier();
}

function renderDossier() {
  var c = getCase();
  var d = c.dossier;
  var tabNames = ['overview','data','submissions','efficiencies'];
  var tabLabels = ['Overview','Market Data','Submissions','Efficiencies'];
  var tabs = tabNames.map(function(t,i){
    return '<button class="doss-tab'+(G.tab===t?' active':'')+'" onclick="switchTab(\''+t+'\')">'+tabLabels[i]+'</button>';
  }).join('');

  var guide = c.readingGuide[G.tab] || '';
  var guideBox = '<div class="reading-guide"><div class="rg-icon">&#128270;</div><div><div class="rg-label">Reading Guide</div><div class="rg-text">'+guide+'</div></div></div>';

  var panel = guideBox;

  if (G.tab==='overview') {
    var slcMention = c.id==='pharma'
      ? 'an <strong>SLC</strong>'
      : 'a <strong>substantial lessening of competition (SLC)</strong>';
    panel += '<div class="doss-section-title">Case Summary</div>'
      +'<div class="doss-text">'+d.overview+'</div>'
      +'<div class="doss-section-title" style="margin-top:1rem">Key Issues Under Investigation</div>'
      +'<div class="case-issues" style="margin-bottom:.8rem">'+c.keyIssues.map(function(i){return '<span class="ci">'+i+'</span>';}).join('')+'</div>'
      +'<div class="doss-text">The CMA will assess whether the merger may result in '+slcMention+' under the Enterprise Act 2002, s.35. This requires identifying the relevant market, assessing concentration, evaluating theories of harm, and considering whether claimed efficiencies are merger-specific, verifiable, and passed through to consumers in the affected market.</div>';
  }
  if (G.tab==='data') {
    var boxes = d.marketData.map(function(m){
      return '<div class="data-box"><div class="data-label">'+m.label+'</div><div class="data-value">'+m.value+'</div><div class="data-note">'+m.note+'</div></div>';
    }).join('');
    // CR calculator for grocery case
    var crCalc = '';
    if (c.id==='grocery') {
      crCalc = '<div class="cr-calc">'
        +'<div class="cr-calc-title">&#9632; Worked CR3 / CR5 Calculation — Try This Before Reading the Answer</div>'
        +'<div class="cr-row"><strong>Pre-merger CR3:</strong>&nbsp;35&nbsp;+&nbsp;18&nbsp;+&nbsp;11&nbsp;= <span class="cr-val">64%</span>&nbsp;<span style="opacity:.6">(SupraStore + NorthMart + FreshCo)</span></div>'
        +'<div class="cr-row"><strong>Post-merger CR3:</strong>&nbsp;35&nbsp;+&nbsp;29&nbsp;+&nbsp;9&nbsp;= <span class="cr-val">73%</span>&nbsp;<span style="opacity:.6">(SupraStore + Merged + ValueGroc)</span></div>'
        +'<hr class="cr-divider"/>'
        +'<div class="cr-row cr-total">Delta CR3 = 73% &minus; 64% = +9pp</div>'
        +'<div class="cr-row" style="margin-top:.5rem"><strong>Pre-merger CR5:</strong>&nbsp;35&nbsp;+&nbsp;18&nbsp;+&nbsp;11&nbsp;+&nbsp;9&nbsp;+&nbsp;7&nbsp;= <span class="cr-val">80%</span></div>'
        +'<div class="cr-row"><strong>Post-merger CR5:</strong>&nbsp;35&nbsp;+&nbsp;29&nbsp;+&nbsp;9&nbsp;+&nbsp;7&nbsp;+&nbsp;5&nbsp;= <span class="cr-val">85%</span>&nbsp;&nbsp;<strong>Delta CR5 = +5pp</strong></div>'
        +'<div class="cr-row" style="margin-top:.45rem"><strong>Insight:</strong>&nbsp;When two top-3 firms merge, delta CR3 = the share of the pre-merger 4th-largest firm (here ValueGroc, 9%) — because that firm is bumped into the now-vacant top-3 slot.</div>'
        +'<div class="cr-row" style="margin-top:.3rem;font-size:.7rem;opacity:.65">Edexcel thresholds: CR3 &gt; 60% &rarr; tight oligopoly; CR3 &gt; 80% &rarr; dominated market. A material delta in an already-concentrated market warrants detailed scrutiny.</div>'
        +'</div>';
    }
    panel += '<div class="doss-section-title">Market Data &amp; Concentration Statistics</div>'
      +'<div class="data-grid">'+boxes+'</div>'
      +crCalc
      +'<div class="doss-text" style="font-size:.78rem;opacity:.7;font-style:italic">CR<sub>n</sub> = sum of the market shares of the top n firms. A high or rising CR3 in a concentrated market is one of the structural signals the CMA examines alongside theories of harm under the Merger Assessment Guidelines (2021).</div>';
  }
  if (G.tab==='submissions') {
    var cards2 = d.claims.map(function(cl){
      return '<div class="claim-card '+cl.type+'">'
        +'<div class="claim-who">'+cl.who+'</div>'
        +'<div class="claim-text">'+cl.text+'</div>'
        +'</div>';
    }).join('');
    panel += '<div class="doss-section-title">Party Submissions &amp; Third Party Evidence</div>'+cards2;
  }
  if (G.tab==='efficiencies') {
    var typeBadge = function(t){return {productive:'<span class="badge badge-prod">Productive</span>',dynamic:'<span class="badge badge-dyn">Dynamic</span>',allocative:'<span class="badge badge-alloc">Allocative</span>',x:'<span class="badge badge-x">X-Efficiency</span>'}[t]||'';};
    var rows = d.efficiencies.map(function(e){
      return '<tr><td>'+e.name+'</td><td>'+typeBadge(e.type)+'</td><td>'+e.claim+'</td><td>'+e.credibility+'</td></tr>';
    }).join('');
    panel += '<div class="doss-section-title">Efficiency Taxonomy</div>'
      +'<div class="eff-taxonomy">'
      +'<div class="et-box prod"><div class="et-label">&#9632; Productive Efficiency</div><div class="et-text">Lowest possible average cost — operating on the LRAC curve. Gains from economies of scale, logistics, procurement. Static: a snapshot of cost performance.</div></div>'
      +'<div class="et-box dyn"><div class="et-label">&#9632; Dynamic Efficiency</div><div class="et-text">Innovation over time — new products, processes, quality improvements. Driven by competitive pressure. A merger can improve static efficiency while harming dynamic efficiency.</div></div>'
      +'<div class="et-box alloc"><div class="et-label">&#9632; Allocative Efficiency</div><div class="et-text">P = MC — resources go to their highest-valued uses. Mergers harm allocative efficiency when P > MC post-merger. Consumer surplus is transferred to profit, and a deadweight loss is created.</div></div>'
      +'<div class="et-box x"><div class="et-label">&#9632; X-Efficiency</div><div class="et-text">Productive efficiency achieved through competitive pressure, not just scale. Monopolists sheltered from competition may be X-inefficient — operating above minimum average cost even at MES.</div></div>'
      +'</div>'
      +'<div class="doss-section-title">Efficiency Claims — CMA Assessment</div>'
      +'<div class="doss-text" style="margin-bottom:.9rem">The CMA requires efficiency claims to be: (1) <strong>merger-specific</strong> — not achievable without the merger; (2) <strong>verifiable</strong> — supported by evidence; and (3) <strong>passed through</strong> to consumers in the relevant affected market. Claims failing any criterion are discounted.</div>'
      +'<table class="eff-table"><thead><tr><th>Claimed Efficiency</th><th>Type</th><th>Parties\' Claim</th><th>CMA Assessment</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  render('<div class="doss-header">'
    +'<div class="doss-ref">'+c.ref+'<span class="doss-stamp">Phase 2</span></div>'
    +'<div class="doss-title">'+c.icon+' '+c.title+'</div>'
    +'<div class="doss-sub">'+c.type+' &mdash; '+c.sector+'</div>'
    +'</div>'
    +'<div class="doss-tabs">'+tabs+'</div>'
    +'<div class="doss-panel">'+panel+'</div>'
    +'<div class="btn-row">'
    +'<button class="btn bg-teal" onclick="startInvestigation()">Begin Investigation &rarr;</button>'
    +'<button class="btn bs" onclick="goHub()">&larr; Case Selection</button>'
    +'</div>');
}

function switchTab(t) { G.tab=t; renderDossier(); }

// ── INVESTIGATION ─────────────────────────────────────────────
function startInvestigation() { G.phase='investigation'; G.qIndex=0; renderQuestion(); }

function renderQuestion() {
  var c = getCase();
  var q = c.questions[G.qIndex];
  var pips = c.questions.map(function(_,i){
    var cls = i<G.qIndex?'done':i===G.qIndex?'active':'';
    return '<div class="q-pip '+cls+'"></div>';
  }).join('');
  var opts = q.options.map(function(o,i){
    var letter = ['A','B','C','D'][i];
    return '<button class="q-opt" id="qopt'+i+'" onclick="selectAnswer('+i+')">'
      +'<span class="q-opt-letter">'+letter+'</span>'
      +'<span class="q-opt-text">'+o+'</span>'
      +'</button>';
  }).join('');

  render('<div class="q-header">'
    +'<div class="q-eyebrow">Investigation &mdash; Question '+(G.qIndex+1)+' of '+c.questions.length+'</div>'
    +'<div class="q-progress">'+pips+'</div>'
    +'</div>'
    +'<div class="q-badges">'
    +'<span class="q-concept">'+q.concept+'</span>'
    +'<span class="q-spec">&#9670; '+q.specLink+'</span>'
    +'</div>'
    +'<div class="q-stem">'+q.stem+'</div>'
    +'<div class="q-context">'+q.context+'</div>'
    +'<div class="q-options">'+opts+'</div>'
    +'<div class="q-feedback" id="qfb"></div>'
    +'<div class="btn-row" id="qnext" style="display:none">'
    +'<button class="btn bg-teal" onclick="nextQuestion()">'+(G.qIndex===c.questions.length-1?'Proceed to Decision &rarr;':'Next Question &rarr;')+'</button>'
    +'</div>');
}

function selectAnswer(i) {
  if (G.locked) return;
  G.locked = true;
  var c = getCase();
  var q = c.questions[G.qIndex];
  var correct = q.correct;
  var isOk = i===correct;
  if (isOk) G.score++;
  G.answers.push({q:G.qIndex,chosen:i,correct:correct,ok:isOk});

  var opts = document.querySelectorAll('.q-opt');
  opts.forEach(function(el,idx){
    el.classList.add('locked');
    if (idx===correct) el.classList.add(i===correct?'correct':'reveal');
    if (idx===i && !isOk) el.classList.add('wrong');
  });

  var fb = document.getElementById('qfb');
  fb.className = 'q-feedback show '+(isOk?'ok':'bad');
  fb.innerHTML = '<div class="q-feedback-label">'+(isOk?'&#10003; Correct — CMA-Aligned Reasoning':'&#10007; Not the strongest answer — CMA Guidance')+'</div>'
    +'<div class="key-learning"><div class="kl-label">Key Learning</div>'+q.keyLearning+'</div>'
    +'<div class="q-feedback-text">'+(isOk?q.feedback.ok:q.feedback.bad)+'</div>';

  document.getElementById('qnext').style.display='flex';
  G.locked=false;
}

function nextQuestion() {
  var c = getCase();
  if (G.qIndex<c.questions.length-1) { G.qIndex++; renderQuestion(); }
  else { renderDecision(); }
}

// ── DECISION ──────────────────────────────────────────────────
function renderDecision() {
  var c = getCase();
  var dsRows = G.answers.map(function(a,i){
    var q = c.questions[i];
    return '<div class="ds-row"><div class="ds-q">Q'+(i+1)+': '+q.concept+'</div>'
      +'<div class="ds-a '+(a.ok?'ds-ok':'ds-bad')+'">'+(a.ok?'&#10003; Correct':'&#10007; Incorrect')+'</div></div>';
  }).join('');

  render('<div class="decision-summary">'
    +'<div class="ds-title">Investigation Summary &mdash; '+G.score+' of '+c.questions.length+' questions aligned with CMA reasoning</div>'
    +dsRows
    +'</div>'
    +'<div class="decision-title">Issue Your Determination</div>'
    +'<div class="decision-opts">'
    +'<button class="dec-btn dec-clear" onclick="makeDecision(\'clear\')">'
    +'<div class="dec-icon">&#9989;</div><div class="dec-label">Clear Unconditionally</div>'
    +'<div class="dec-desc">The merger does not substantially lessen competition. No conditions required.</div>'
    +'</button>'
    +'<button class="dec-btn dec-rem" onclick="makeDecision(\'remedies\')">'
    +'<div class="dec-icon">&#9878;</div><div class="dec-label">Clear with Remedies</div>'
    +'<div class="dec-desc">Substantial lessening of competition (SLC) found but can be addressed through structural or behavioural conditions.</div>'
    +'</button>'
    +'<button class="dec-btn dec-block" onclick="makeDecision(\'block\')">'
    +'<div class="dec-icon">&#128683;</div><div class="dec-label">Block</div>'
    +'<div class="dec-desc">An SLC cannot be adequately remedied. The merger is prohibited.</div>'
    +'</button>'
    +'</div>');
}

function makeDecision(d) {
  G.decision=d;
  if (d==='remedies') { renderRemedySelect(); } else { renderVerdict(); }
}

function renderRemedySelect() {
  var c = getCase();
  var opts = c.remedies.map(function(r,i){
    return '<button class="rem-opt" onclick="selectRemedy('+i+')">'
      +'<div class="rem-opt-icon">'+['&#127959;','&#128203;','&#128274;'][i]+'</div>'
      +'<div class="rem-opt-body"><div class="rem-opt-title">Remedy Option '+(i+1)+'</div><div class="rem-opt-desc">'+r+'</div></div>'
      +'</button>';
  }).join('');
  render('<div style="text-align:center;margin-bottom:1.2rem">'
    +'<div class="q-concept" style="display:inline-block">You determined: Clear with Remedies</div>'
    +'<div class="decision-title" style="margin-top:.8rem">Select the Most Appropriate Remedy</div>'
    +'</div>'
    +'<div class="remedy-opts">'+opts+'</div>');
}

function selectRemedy(i) { G.remedy=i; renderVerdict(); }

// ── VERDICT ───────────────────────────────────────────────────
function renderVerdict() {
  var c = getCase();
  var decOk = G.decision===c.correctDecision;
  var remOk = G.decision!=='remedies' || (c.correctRemedy!==undefined && G.remedy===c.correctRemedy);
  var fullyAligned = decOk && remOk;
  var partiallyAligned = decOk && !remOk;

  var bannerClass = fullyAligned?'aligned':partiallyAligned?'partial':'misaligned';
  var bannerLabel = fullyAligned?'Determination: Fully Aligned with CMA Reasoning'
    :partiallyAligned?'Determination: Partially Aligned — Correct Decision, Wrong Remedy'
    :'Determination: Misaligned — Review the CMA\'s Reasoning Below';

  var decisionLabel = {clear:'Clear Unconditionally',remedies:'Clear with Remedies',block:'Block'}[G.decision];
  var remedyText = (G.remedy!==null&&G.decision==='remedies') ? ' ('+c.remedies[G.remedy]+')' : '';

  var correctDesc = c.correctDecision==='block' ? 'Block'
    : c.correctDecision==='clear' ? 'Clear Unconditionally'
    : 'Clear with Remedies — '+c.remedies[c.correctRemedy];

  var bannerBody = fullyAligned
    ? 'Your determination of <strong>'+decisionLabel+remedyText+'</strong> is aligned with how the CMA would approach this case. You correctly identified the key theories of harm and selected the proportionate outcome. Read the detailed economics below to consolidate your understanding.'
    : partiallyAligned
    ? 'You correctly determined the merger requires remedies, but the remedy you selected is not the CMA\'s preferred approach. The CMA\'s guidelines on remedy selection — and why your chosen option falls short — are explained below.'
    : 'The CMA would have determined <strong>'+correctDesc+'</strong>. The key reasoning that led to a different determination is explained below — understanding where the analysis diverged is the most valuable part of this exercise.';

  // Select diagram by case
  var diagram = c.id==='grocery' ? diagDWL() : c.id==='pharma' ? diagLRAC() : diagNetwork();

  render('<div class="verdict-banner '+bannerClass+'">'
    +'<div class="vb-label">'+bannerLabel+'</div>'
    +'<div class="vb-text">'+bannerBody+'</div>'
    +'</div>'

    +'<div class="score-row">'
    +'<div class="score-box"><div class="score-num">'+G.score+'/'+c.questions.length+'</div><div class="score-lbl">Investigation Score</div></div>'
    +'<div class="score-box"><div class="score-num" style="font-size:1.1rem">'+decisionLabel+'</div><div class="score-lbl">Your Determination</div></div>'
    +'<div class="score-box" style="'+(fullyAligned?'border-color:rgba(76,175,128,.4)':partiallyAligned?'border-color:rgba(224,147,58,.4)':'border-color:rgba(224,80,96,.3)')+'"><div class="score-num" style="font-size:1.1rem;color:'+(fullyAligned?'var(--green)':partiallyAligned?'var(--orange)':'var(--red)')+'">'+( fullyAligned?'Aligned':partiallyAligned?'Partial':'Misaligned')+'</div><div class="score-lbl">CMA Alignment</div></div>'
    +'</div>'

    +diagram

    +'<div class="verdict-econ"><div class="ve-title">&#9632; Economics Analysis &mdash; CMA Reasoning</div><div class="ve-text">'+c.verdictEcon+'</div></div>'

    +'<div class="mark-scheme-box"><div class="ms-title">&#9670; Exam Technique &mdash; Mark Scheme Language</div><div class="ms-text">'+c.markScheme+'</div></div>'

    +'<div class="verdict-econ" style="background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.25)"><div class="ve-title" style="color:var(--goldl)">&#9632; Real-World Precedent</div><div class="ve-text">'+c.realWorld+'</div></div>'

    +'<div class="section-lbl" style="margin-bottom:.5rem">AI Economics Tutor &mdash; Personalised Debrief</div>'
    +'<div class="debrief-box" id="debriefBox"><div class="debrief-loading">Reviewing your investigation<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span></div></div>'

    +'<div class="btn-row" style="margin-top:1rem">'
    +'<button class="btn bg-teal" onclick="openCase(\''+c.id+'\')">&circlearrowleft; Retry Case</button>'
    +'<button class="btn bs" onclick="goHub()">&larr; All Cases</button>'
    +'</div><div style="height:2rem"></div>');

  fetchDebrief(c, G.score, G.answers, G.decision, G.remedy, fullyAligned, partiallyAligned);
}

// ── AI DEBRIEF ────────────────────────────────────────────────
function fetchDebrief(c, score, answers, decision, remedy, fullyAligned, partiallyAligned) {
  var qSummary = answers.map(function(a,i){
    return 'Q'+(i+1)+' ('+c.questions[i].concept+'): '+(a.ok?'Correct':'Incorrect — chose option '+['A','B','C','D'][a.chosen]+', correct was '+['A','B','C','D'][a.correct]);
  }).join('; ');

  var decDesc = {clear:'Clear Unconditionally',remedies:'Clear with Remedies'+(remedy!==null?' ('+c.remedies[remedy]+')':''),block:'Block'}[decision];
  var alignment = fullyAligned?'fully aligned with CMA reasoning':partiallyAligned?'correct on determination but incorrect remedy choice':'misaligned with CMA reasoning';

  var prompt = 'You are an experienced A-level Economics teacher at a UK independent school giving personalised feedback after a CMA merger investigation exercise. Warm, academically rigorous tone. Plain paragraphs only — no bullet points, no headers, no markdown. Three focused paragraphs.\n\n'
    +'Case: '+c.title+' ('+c.type+', '+c.sector+'). Investigation score: '+score+'/'+c.questions.length+'. Question breakdown: '+qSummary+'. Student\'s determination: '+decDesc+'. Overall alignment: '+alignment+'. Key issues: '+c.keyIssues.join(', ')+'.\n\n'
    +'Paragraph 1: Focus on any questions the student got wrong — explain the economic concept they misapplied and what correct reasoning requires. Connect to specific Edexcel A-level concepts: market definition, concentration ratios (CR3/CR5), substantial lessening of competition (SLC) test, productive/allocative/dynamic/X-efficiency, LRAC, MES, economies of scale, monopsony, buyer power, potential competition, contestability, network effects, vertical integration, foreclosure, structural vs behavioural remedies, counterfactual, failing firm defence, killer acquisitions. If all correct, deepen the analysis of the most challenging concept.\n\n'
    +'Paragraph 2: Assess their determination and remedy choice. Explain whether it reflects sound competition policy reasoning and how it compares to the CMA\'s framework. Reference the real-world precedent briefly.\n\n'
    +'Paragraph 3: Give two specific exam technique tips for competition policy and market structure questions in Edexcel A-level Economics, tailored to the specific gaps revealed in this student\'s performance on this case.';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var box=document.getElementById('debriefBox');
    if(box){
      var paras=text.split(/\n\n+/).filter(function(p){return p.trim();});
      box.innerHTML=paras.map(function(p){return '<p>'+p.trim()+'</p>';}).join('');
    }
  })
  .catch(function(){
    var box=document.getElementById('debriefBox');
    if(box) box.innerHTML='<p>Debrief unavailable — check your connection.</p>';
  });
}

goHub();
</script>
